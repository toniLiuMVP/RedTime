<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>劇情 3D · 時間裡的兩個妳</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #050608;
    color: #eae6de;
    font-family: "Noto Serif TC", "Cormorant Garamond", Georgia, serif;
  }
  #scene-canvas { position: fixed; inset: 0; z-index: 0; }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  .top-bar {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: auto;
  }
  .title-block {
    background: rgba(8, 6, 10, 0.72); backdrop-filter: blur(10px);
    padding: 8px 16px;
    border: 1px solid rgba(255, 220, 200, 0.22);
    border-radius: 3px;
  }
  .title-block .t1 {
    font-family: "Cormorant Garamond", "Noto Serif TC", serif;
    font-size: 14px; letter-spacing: 0.22em;
    color: rgba(255, 220, 200, 0.95);
  }
  .title-block .t2 {
    font-family: "DM Mono", monospace;
    font-size: 9px; letter-spacing: 0.22em;
    color: rgba(218, 184, 168, 0.55);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .back-link {
    padding: 8px 14px;
    background: rgba(8, 6, 10, 0.72); backdrop-filter: blur(10px);
    color: rgba(238, 232, 220, 0.78);
    text-decoration: none;
    font-size: 11px; letter-spacing: 0.18em;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 3px;
    pointer-events: auto;
  }
  .back-link:hover { color: #fff; border-color: rgba(255, 220, 200, 0.55); }

  /* 章節選單 */
  .chapter-select {
    position: absolute; top: 56px; left: 14px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: auto;
  }
  .chapter-select button {
    padding: 8px 14px;
    background: rgba(8, 6, 10, 0.78); backdrop-filter: blur(10px);
    border: 1px solid rgba(218, 184, 168, 0.32);
    border-radius: 3px;
    font-family: inherit;
    font-size: 11px; letter-spacing: 0.18em;
    color: rgba(238, 232, 220, 0.82);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
  }
  .chapter-select button:hover:not(:disabled) {
    border-color: rgba(228, 70, 80, 0.62);
    color: rgba(255, 220, 200, 0.95);
  }
  .chapter-select button.active {
    background: rgba(228, 70, 80, 0.22);
    border-color: rgba(228, 70, 80, 0.78);
    color: rgba(255, 220, 200, 0.95);
  }
  .chapter-select button:disabled {
    opacity: 0.42;
    cursor: not-allowed;
  }

  /* 台詞 box */
  .dialog-box {
    position: absolute; left: 50%;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
    transform: translateX(-50%);
    width: min(640px, 92vw);
    background: rgba(8, 6, 10, 0.88); backdrop-filter: blur(12px);
    border: 1px solid rgba(228, 70, 80, 0.42);
    border-radius: 6px;
    padding: 18px 22px 14px;
    pointer-events: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
  }
  .dialog-box .speaker {
    font-family: "DM Mono", monospace;
    font-size: 10px; letter-spacing: 0.32em;
    color: rgba(248, 168, 152, 0.92);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .dialog-box .text {
    font-size: 16px; line-height: 1.95;
    color: rgba(238, 232, 220, 0.96);
    margin-bottom: 14px;
    min-height: 60px;
    white-space: pre-wrap;
  }
  .dialog-box .controls {
    display: flex; justify-content: space-between; align-items: center;
    font-family: "DM Mono", monospace;
    font-size: 10px; letter-spacing: 0.22em;
  }
  .dialog-box .beat-num {
    color: rgba(218, 184, 168, 0.55);
  }
  .dialog-box .next-btn {
    padding: 6px 16px;
    background: rgba(228, 70, 80, 0.22);
    border: 1px solid rgba(228, 70, 80, 0.55);
    border-radius: 2px;
    color: rgba(248, 168, 152, 0.95);
    font-family: inherit;
    font-size: 10px; letter-spacing: 0.22em;
    cursor: pointer;
  }
  .dialog-box .next-btn:hover { background: rgba(228, 70, 80, 0.42); }
  .dialog-box .next-btn.replay {
    background: transparent;
    color: rgba(218, 184, 168, 0.62);
    border-color: rgba(218, 184, 168, 0.32);
  }

  .footer-hint {
    position: absolute; right: 14px; bottom: 14px;
    font-family: "DM Mono", monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: rgba(218, 184, 168, 0.55);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="scene-canvas"></canvas>
<div id="ui">
  <div class="top-bar">
    <div class="title-block">
      <div class="t1" id="chapterTitle">劇情 3D · EP 3 · 一眼瞬間</div>
      <div class="t2">VISUAL NOVEL · LM402 · 2005-10-17 11:00</div>
    </div>
    <a class="back-link" href="index.html">← 回首頁</a>
  </div>

  <div class="chapter-select">
    <button data-chapter="ep3" class="active">EP 3 · 一眼瞬間</button>
    <button data-chapter="ep36" disabled>EP 36 · 月台狂奔 (準備中)</button>
    <button data-chapter="ep41" disabled>EP 41 · 我也相信 (準備中)</button>
  </div>

  <div class="dialog-box" id="dialogBox">
    <div class="speaker" id="dlgSpeaker">學長視角</div>
    <div class="text" id="dlgText"></div>
    <div class="controls">
      <span class="beat-num" id="dlgBeatNum">1 / 6</span>
      <button class="next-btn" id="dlgNext" type="button">下一幕 →</button>
    </div>
  </div>

  <div class="footer-hint">點擊台詞框 / 空白鍵 推進劇情</div>
</div>

<script type="module">
import * as THREE from './assets/lm402/vendor-three.module.js';

/* 方向 2 · 劇情 3D 動畫 + 台詞 · EP 3 一眼瞬間 PoC
   依 reader.html EP3 學長視角原文構成 6 beats
   配合 camera animation + 紅線 visualization */

const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x16100c);
scene.fog = new THREE.FogExp2(0x16100c, 0.045);

const cam = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 80);
cam.position.set(0, 1.7, 6);
cam.lookAt(0, 1.5, -3);

/* 利瑪竇大樓 4 樓走廊 — 木地板 + 黃色暖光 */
const floorGeo = new THREE.PlaneGeometry(8, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a1c14, roughness: 0.7, metalness: 0.18 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.z = -8;
scene.add(floor);

/* 牆 + 走廊盡頭窗 */
const wallMat = new THREE.MeshStandardMaterial({ color: 0x1f1812, roughness: 0.85 });
const wallL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3.2, 30), wallMat);
wallL.position.set(-4, 1.6, -8);
scene.add(wallL);
const wallR = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3.2, 30), wallMat);
wallR.position.set(4, 1.6, -8);
scene.add(wallR);
const ceiling = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 30), wallMat);
ceiling.position.set(0, 3.3, -8);
scene.add(ceiling);

/* LM402 教室門(前門 + 後門) */
const doorMat = new THREE.MeshStandardMaterial({ color: 0x3a2418, roughness: 0.45, metalness: 0.05 });
const doorFront = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.1), doorMat);
doorFront.position.set(3.7, 1.1, -3); /* 學長站這裡前門 */
scene.add(doorFront);
const doorBack = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.1), doorMat);
doorBack.position.set(3.7, 1.1, -8); /* 學妹從這走出來後門 */
scene.add(doorBack);

/* LM402 門牌(emissive 暖光) */
function makeSign(label, pos) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 96;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1410';
  ctx.fillRect(0, 0, 256, 96);
  ctx.fillStyle = '#ffd388';
  ctx.font = 'bold 48px "DM Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, 128, 48);
  const tex = new THREE.CanvasTexture(c);
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.26), new THREE.MeshBasicMaterial({ map: tex }));
  sign.position.set(pos.x, pos.y, pos.z);
  sign.rotation.y = -Math.PI / 2;
  return sign;
}
scene.add(makeSign('LM402', { x: 3.0, y: 2.55, z: -3 }));
scene.add(makeSign('LM402', { x: 3.0, y: 2.55, z: -8 }));

/* 學長 — capsule, 飛機頭 + 白 T + 藍牛仔褲 + 粗框眼鏡 */
const longGroup = new THREE.Group();
const longTorso = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.18, 0.65, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0xf6f6f6 })
);
longTorso.position.y = 1.15;
longGroup.add(longTorso);
const longLegs = new THREE.Mesh(
  new THREE.CapsuleGeometry(0.16, 0.6, 4, 8),
  new THREE.MeshStandardMaterial({ color: 0x3d5c8a })
);
longLegs.position.y = 0.45;
longGroup.add(longLegs);
const longHead = new THREE.Mesh(
  new THREE.SphereGeometry(0.16, 16, 12),
  new THREE.MeshStandardMaterial({ color: 0xe8c8b0 })
);
longHead.position.y = 1.6;
longGroup.add(longHead);
/* 飛機頭 — 髮型小錐 */
const longHair = new THREE.Mesh(
  new THREE.ConeGeometry(0.15, 0.18, 8),
  new THREE.MeshStandardMaterial({ color: 0x1a1108 })
);
longHair.position.y = 1.72;
longGroup.add(longHair);
/* 粗框眼鏡 — 2 圈 + 鼻樑 */
const glassMat = new THREE.MeshStandardMaterial({ color: 0x141414 });
const glassL = new THREE.Mesh(new THREE.TorusGeometry(0.045, 0.013, 8, 16), glassMat);
glassL.position.set(-0.05, 1.6, 0.14);
longGroup.add(glassL);
const glassR = new THREE.Mesh(new THREE.TorusGeometry(0.045, 0.013, 8, 16), glassMat);
glassR.position.set(0.05, 1.6, 0.14);
longGroup.add(glassR);
const glassBridge = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.012, 0.012), glassMat);
glassBridge.position.set(0, 1.6, 0.14);
longGroup.add(glassBridge);
/* 手機 — 學長正在打電話 */
const phone = new THREE.Mesh(
  new THREE.BoxGeometry(0.08, 0.14, 0.02),
  new THREE.MeshStandardMaterial({ color: 0x1a1a1a, emissive: 0x4a3018, emissiveIntensity: 0.45 })
);
phone.position.set(-0.18, 1.5, 0.05);
phone.rotation.z = 0.5;
longGroup.add(phone);
longGroup.position.set(2.4, 0, -3); /* 站前門外 */
longGroup.rotation.y = -Math.PI / 2; /* 看教室方向 */
scene.add(longGroup);

/* 學妹 — capsule, 白色長袖襯衫 + 牛仔短褲 + 長髮 */
function makeJunior(x, z, lead) {
  const g = new THREE.Group();
  const torso = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.14, 0.5, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0xfafafa })
  );
  torso.position.y = 1.02;
  g.add(torso);
  const legs = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.13, 0.45, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0x5a6280 })
  );
  legs.position.y = 0.42;
  g.add(legs);
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.14, 16, 12),
    new THREE.MeshStandardMaterial({ color: 0xf0d4b8 })
  );
  head.position.y = 1.4;
  g.add(head);
  const hair = new THREE.Mesh(
    new THREE.SphereGeometry(0.16, 12, 10, 0, Math.PI * 2, 0, Math.PI / 1.6),
    new THREE.MeshStandardMaterial({ color: 0x1a1308 })
  );
  hair.position.y = 1.42;
  g.add(hair);
  g.position.set(x, 0, z);
  g.userData.isLead = lead;
  return g;
}
/* 學妹(lead) + 4 個同學圍著她走後門出來 */
const juniorLead = makeJunior(3.4, -7.4, true);
const friend1 = makeJunior(3.6, -7.1, false);
const friend2 = makeJunior(3.2, -7.1, false);
const friend3 = makeJunior(3.55, -6.8, false);
const friend4 = makeJunior(3.25, -6.8, false);
scene.add(juniorLead, friend1, friend2, friend3, friend4);

/* 紅線 — 學長手到學妹頭 */
const lineGeo = new THREE.BufferGeometry();
const linePoints = [];
const LINE_SEG = 48;
for (let i = 0; i <= LINE_SEG; i++) {
  const t = i / LINE_SEG;
  linePoints.push(
    2.4 + t * 1.0,  /* x: 學長手 to 學妹頭 */
    1.5 + Math.sin(t * Math.PI) * 0.32, /* y: 微弧 */
    -3 + t * -4.4  /* z: -3 to -7.4 */
  );
}
lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePoints, 3));
const lineMat = new THREE.LineBasicMaterial({ color: 0xd63240, transparent: true, opacity: 0.72 });
const redLine = new THREE.Line(lineGeo, lineMat);
scene.add(redLine);

/* 11:00 暖光 — 陽光從走廊盡頭灑入 */
const sun = new THREE.DirectionalLight(0xffd388, 1.4);
sun.position.set(0, 4, -18);
sun.target.position.set(0, 1, 0);
scene.add(sun, sun.target);
const ambient = new THREE.AmbientLight(0x554233, 0.42);
scene.add(ambient);
const fillAmber = new THREE.PointLight(0xffaa44, 1.8, 12);
fillAmber.position.set(0, 2.2, -5);
scene.add(fillAmber);

/* ─── 6 beats EP3 dialog (toni reader.html EP3 原文) ─── */
const BEATS = [
  {
    speaker: '學長視角',
    text: '那天， 我們約好在利瑪竇大樓見面， 因為我是妳的學長。\n\n妳剛入學， 每天有十個問題要問。 我在 MSN 上幫妳處理、 解惑， 整整快一個月。',
    /* camera target */
    cam: { x: 0,   y: 2.2, z: 6 },   look: { x: 1.0, y: 1.5, z: -4 }
  },
  {
    speaker: '學長視角',
    text: '當我趕到教室前門， 打電話給妳， 電話那頭傳來妳的聲音。',
    cam: { x: 1.4, y: 1.8, z: 0 },   look: { x: 2.4, y: 1.5, z: -3 }
  },
  {
    speaker: '學長',
    text: '「妳在哪裡？」',
    cam: { x: 1.6, y: 1.6, z: -1.5 }, look: { x: 2.4, y: 1.55, z: -3 }
  },
  {
    speaker: '學妹 (電話那頭)',
    text: '「學長， 你走到後門～」',
    cam: { x: 1.8, y: 1.5, z: -4.5 }, look: { x: 3.4, y: 1.35, z: -7.4 }
  },
  {
    speaker: '學長視角',
    text: '妳從座位站起來， 朝我走來， 身邊還有一群人跟著妳一起出來。',
    cam: { x: 1.6, y: 1.8, z: -5 },   look: { x: 3.4, y: 1.4, z: -7.4 }
  },
  {
    speaker: '學長 (心聲)',
    text: '我第一眼就看到妳。\n\n「也太像徐若瑄了吧！」\n\n臉小小的、 手小小的、 身體也小小的。 眼神很清澈。\n\n那種感覺， 不是偶像劇裡的一見鍾情。\n\n而是 ——\n「這一次， 依然再次遇見妳。」',
    cam: { x: 2.0, y: 1.6, z: -5.5 }, look: { x: 3.4, y: 1.35, z: -7.4 }
  }
];

let currentBeat = 0;
const dlgSpeaker = document.getElementById('dlgSpeaker');
const dlgText = document.getElementById('dlgText');
const dlgBeatNum = document.getElementById('dlgBeatNum');
const dlgNext = document.getElementById('dlgNext');
const dialogBox = document.getElementById('dialogBox');

function renderBeat() {
  const b = BEATS[currentBeat];
  dlgSpeaker.textContent = b.speaker;
  dlgText.textContent = b.text;
  dlgBeatNum.textContent = (currentBeat + 1) + ' / ' + BEATS.length;
  dlgNext.textContent = currentBeat < BEATS.length - 1 ? '下一幕 →' : '重看 ↺';
  dlgNext.classList.toggle('replay', currentBeat >= BEATS.length - 1);
}

function nextBeat() {
  currentBeat = (currentBeat + 1) % BEATS.length;
  renderBeat();
}

dlgNext.addEventListener('click', nextBeat);
dialogBox.addEventListener('click', function (e) {
  /* 點 box 任意處 (但不是 button) 也推進 */
  if (e.target === dlgNext) return;
  nextBeat();
});
document.addEventListener('keydown', function (e) {
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
    e.preventDefault();
    nextBeat();
  }
});

renderBeat();

/* 主迴圈 + 紅線飄動 + camera lerp */
let frame = 0;
let camTargetPos = { x: cam.position.x, y: cam.position.y, z: cam.position.z };
let camTargetLook = { x: 0, y: 1.5, z: -3 };

function loop() {
  frame++;
  /* 紅線輕微擺動 */
  const positions = redLine.geometry.attributes.position.array;
  for (let i = 0; i <= LINE_SEG; i++) {
    const t = i / LINE_SEG;
    positions[i * 3 + 1] = (1.5 + t * -0.15) + Math.sin(t * Math.PI + frame * 0.028) * 0.28;
  }
  redLine.geometry.attributes.position.needsUpdate = true;
  redLine.material.opacity = 0.55 + Math.sin(frame * 0.02) * 0.18;

  /* camera lerp toward current beat target */
  const b = BEATS[currentBeat];
  camTargetPos = b.cam;
  camTargetLook = b.look;
  const lerp = 0.04;
  cam.position.x += (camTargetPos.x - cam.position.x) * lerp;
  cam.position.y += (camTargetPos.y - cam.position.y) * lerp;
  cam.position.z += (camTargetPos.z - cam.position.z) * lerp;
  const lookAt = new THREE.Vector3(camTargetLook.x, camTargetLook.y, camTargetLook.z);
  cam.lookAt(lookAt);

  renderer.render(scene, cam);
  requestAnimationFrame(loop);
}
loop();

addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

window.__STORY_3D__ = {
  cam: cam,
  beats: BEATS,
  setBeat: function (n) {
    if (n >= 0 && n < BEATS.length) {
      currentBeat = n;
      renderBeat();
    }
  },
  version: 'r62-r6-1'
};
</script>
</body>
</html>
