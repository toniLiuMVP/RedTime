<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8" />
  <title>WebGPU vendor 載入測試 — F1.2 phase</title>
  <style>
    body { margin: 0; background: #1a1820; color: #f0e8d8; font-family: monospace; }
    #canvas { display: block; margin: 0 auto; }
    #status { position: fixed; top: 10px; left: 10px; padding: 12px 18px;
              background: rgba(0,0,0,0.7); border-radius: 6px; font-size: 13px; }
    #status .ok { color: #6fc97f; } #status .err { color: #ff7a7a; }
    #status .info { color: #9cb8e0; }
  </style>
</head>
<body>
  <div id="status">F1.2 WebGPU vendor 載入測試<br/>初始化中…</div>
  <canvas id="canvas" width="800" height="600"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.webgpu.min.js"
    }
  }
  </script>

  <script type="module">
    const status = document.getElementById("status");
    function log(html, cls = "info") {
      status.innerHTML += `<br/><span class="${cls}">${html}</span>`;
    }

    // 1) WebGPU 支援檢查
    if (!navigator.gpu) {
      log("❌ navigator.gpu 不存在 — 此瀏覽器不支援 WebGPU", "err");
      log("→ 試 Chrome 113+ / Edge 113+ / Safari TP", "info");
      throw new Error("no-webgpu");
    }
    log(`✅ navigator.gpu 存在`, "ok");

    // 2) Three.js r179 WebGPU vendor 載入
    let THREE;
    try {
      THREE = await import("three");
      log(`✅ three.webgpu.min.js 載入(REVISION=${THREE.REVISION})`, "ok");
    } catch (e) {
      log(`❌ vendor 載入失敗:${e.message}`, "err");
      throw e;
    }

    if (!THREE.WebGPURenderer) {
      log(`❌ THREE.WebGPURenderer 不存在 — vendor 不完整`, "err");
      throw new Error("no-WebGPURenderer");
    }
    log(`✅ THREE.WebGPURenderer 在 vendor 內`, "ok");

    // 3) 初始化 WebGPURenderer
    const canvas = document.getElementById("canvas");
    const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
    try {
      await renderer.init();
      log(`✅ renderer.init() 成功`, "ok");
    } catch (e) {
      log(`❌ renderer.init() 失敗:${e.message}`, "err");
      throw e;
    }

    renderer.setSize(canvas.width, canvas.height);
    renderer.setClearColor(0x1a1820, 1);

    // 4) 場景 + cube
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, canvas.width / canvas.height, 0.1, 100);
    camera.position.z = 3;

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1, 1, 1),
      new THREE.MeshBasicMaterial({ color: 0xffd49c })
    );
    scene.add(cube);

    log(`✅ 場景 + cube 建立`, "ok");

    // 5) render loop
    let frameCount = 0;
    function animate() {
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.013;
      renderer.render(scene, camera);
      frameCount++;
      if (frameCount === 60) log(`✅ 連續 60 frames render OK`, "ok");
      requestAnimationFrame(animate);
    }
    animate();
    log(`▶️ render loop 啟動`, "info");
  </script>
</body>
</html>
