<script type="module">
import * as THREE from './assets/lm402/vendor-three.module.js';

/* r62 round-2 #3 ｜ 校園巡禮 v2 — toni 紀律訂正
   - 依故事文本對位 (toni 原文 quote)
   - 樓名只用故事中明確提到的 (利瑪竇 / 中美堂 / 伯達樓 / 校門 / 機車)
   - 明確標示「非真實輔大地圖, 為敘事重排」 */

const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.98;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc4d4e0);
scene.fog = new THREE.FogExp2(0xc4d4e0, 0.012);

const cam = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 600);
cam.position.set(0, 1.7, 70);
cam.rotation.order = 'YXZ';
cam.rotation.y = Math.PI;

/* 地面 + 主步道 */
const groundMat = new THREE.MeshStandardMaterial({ color: 0x4a6850, roughness: 0.95, metalness: 0.02 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(260, 260, 1, 1), groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const pathMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, roughness: 0.78 });
const mainPath = new THREE.Mesh(new THREE.PlaneGeometry(5, 160), pathMat);
mainPath.rotation.x = -Math.PI / 2;
mainPath.position.set(0, 0.01, -10);
scene.add(mainPath);

const crossPath = new THREE.Mesh(new THREE.PlaneGeometry(110, 4), pathMat);
crossPath.rotation.x = -Math.PI / 2;
crossPath.position.set(0, 0.01, -20);
scene.add(crossPath);

const crossPath2 = new THREE.Mesh(new THREE.PlaneGeometry(110, 4), pathMat);
crossPath2.rotation.x = -Math.PI / 2;
crossPath2.position.set(0, 0.01, -50);
scene.add(crossPath2);

const skyMat = new THREE.MeshBasicMaterial({ color: 0xb8c4d4, side: THREE.BackSide, fog: false });
const skyDome = new THREE.Mesh(new THREE.SphereGeometry(300, 24, 12, 0, Math.PI * 2, 0, Math.PI / 2), skyMat);
skyDome.position.y = -50;
scene.add(skyDome);

const sun = new THREE.DirectionalLight(0xfff4d8, 1.0);
sun.position.set(60, 80, 40);
scene.add(sun);
const ambient = new THREE.AmbientLight(0xb0b8c8, 0.55);
scene.add(ambient);
const fillSky = new THREE.HemisphereLight(0xc8d4e0, 0x4a3820, 0.32);
scene.add(fillSky);

/* ─── 故事場景 buildings ─── */
/* 設計理念:
   - 只用故事中明確 quote 過的樓名 (利瑪竇大樓 / 中美堂 / 伯達樓 / 校門)
   - 每個建築點擊後 popup 顯示 toni 原文段落
   - 建築位置為「敘事重排」, 非真實校園地圖 */
const SCENES = [
  {
    name: '中山北路六段 · 校門',
    ep: 'EP 8',
    pos: { x: 0, y: 0, z: 75 },
    size: { w: 14, h: 7, d: 2 },
    color: 0xc8b890,
    type: 'gate',
    quote: '走在校園路上， 學校很小， 樹蔭很多， 終能牽著妳， 從學校後門開始細數過往點滴到校門口。\n\n「學長你看， 校門前的捷運工程蓋完了欸。」',
    source: '學長視角 · EP8',
    href: 'reader.html#ep-8'
  },
  {
    name: '利瑪竇大樓 LM402',
    ep: 'EP 3 · 一眼瞬間',
    pos: { x: 20, y: 0, z: -10 },
    size: { w: 16, h: 14, d: 22 },
    color: 0xd4b888,
    type: 'lm402',
    quote: '那天， 我們約好在利瑪竇大樓見面， 因為我是妳的學長。\n\n當我趕到教室前門， 打電話給妳， 電話那頭傳來妳的聲音。\n\n「妳在哪裡？」\n「學長， 你走到後門～」\n\n妳從座位站起來， 朝我走來， 身邊還有一群人跟著妳一起出來。\n\n我第一眼就看到妳。\n「也太像徐若瑄了吧！」',
    source: '學長視角 · EP3',
    href: 'reader.html#ep-3'
  },
  {
    name: '伯達樓 · 轉角',
    ep: 'EP 13 · 2005-12-22',
    pos: { x: -22, y: 0, z: -25 },
    size: { w: 16, h: 12, d: 16 },
    color: 0xa89878,
    type: 'building',
    quote: '2005 年 12 月 22 日。\n妳打電話給我。\n「我們分手吧！你不要再來找我了！」\n\n傍晚， 我站在伯達樓的轉角， 天色昏暗， 我的眼睛早已泛紅， 遇到同學， 他卻沒有注意到。\n\n我站著， 就站著， 站了好久。',
    source: '學長視角 · EP13',
    href: 'reader.html#ep-13'
  },
  {
    name: '中美堂',
    ep: 'EP 6 · 羽球場 / EP 13 · 聖誕晚會',
    pos: { x: -32, y: 0, z: -55 },
    size: { w: 26, h: 14, d: 22 },
    color: 0xd8c8a0,
    type: 'auditorium',
    quote: 'EP 6 · 學長視角\n吃完早餐後， 在中美堂跟妳打了場羽球。\n「妳真的是練過羽球隊的喔☺️」\n\nEP 13 · 學長視角\n原本計畫在 2005 年的 12 月 24 日， 一起去學校參加中美堂的聖誕晚會， 期待著那場最終沒有發生的「事件」。',
    source: 'EP6 + EP13 對位',
    href: 'reader.html#ep-6'
  },
  {
    name: '學長機車停車處',
    ep: 'EP 12 · 紙條',
    pos: { x: 22, y: 0, z: 24 },
    size: { w: 12, h: 2.4, d: 10 },
    color: 0x6a5a48,
    type: 'parking',
    quote: 'EP 12 · 學妹視角\n還記得 2006 年 1 月的那張紙條嗎？\n\n我寫給你的， 那張紙條， 放在你的 125 機車上。\n「我走了！你要好好照顧自己。」\n\n事實真相是， 每次上學前， 我依然會不知不覺地騎車經過那條「民安西路」， 往後好多年我不敢再經過的「民安西路」。\n\n「我說我走了， 但我從沒離開過。」',
    source: '學妹視角 · EP12',
    href: 'reader.html#ep-12'
  }
];

const sceneMeshes = [];
function makeBuilding(s) {
  const group = new THREE.Group();
  const geo = new THREE.BoxGeometry(s.size.w, s.size.h, s.size.d);
  const mat = new THREE.MeshStandardMaterial({ color: s.color, roughness: 0.72, metalness: 0.05 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(0, s.size.h / 2, 0);
  mesh.userData.scene = s;
  group.add(mesh);

  /* 屋頂 */
  if (s.type !== 'parking') {
    const roof = new THREE.Mesh(
      new THREE.BoxGeometry(s.size.w + 0.4, 0.4, s.size.d + 0.4),
      new THREE.MeshStandardMaterial({ color: 0x3a2820, roughness: 0.6 })
    );
    roof.position.set(0, s.size.h + 0.2, 0);
    group.add(roof);
  }

  /* 窗戶 — 隨機亮 */
  if (s.type === 'lm402' || s.type === 'auditorium' || s.type === 'building') {
    const winCols = Math.max(2, Math.floor(s.size.w / 3));
    const winRows = Math.max(1, Math.floor(s.size.h / 3.6));
    const winMat = new THREE.MeshBasicMaterial({ color: 0xffe0a0, fog: true });
    for (let r = 0; r < winRows; r++) {
      for (let c = 0; c < winCols; c++) {
        if (Math.random() > 0.62) continue;
        const w = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.9), winMat);
        w.position.set(
          -s.size.w / 2 + 1.5 + c * ((s.size.w - 3) / Math.max(1, winCols - 1)),
          1.8 + r * 3.6,
          s.size.d / 2 + 0.01
        );
        group.add(w);
      }
    }
  }

  /* LM402 標牌 — 標示「402」教室 */
  if (s.type === 'lm402') {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 96;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1a18';
    ctx.fillRect(0, 0, 256, 96);
    ctx.fillStyle = '#ffd388';
    ctx.font = 'bold 56px "DM Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('LM402', 128, 48);
    const tex = new THREE.CanvasTexture(c);
    const signMat = new THREE.MeshBasicMaterial({ map: tex });
    const sign = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 1.2), signMat);
    sign.position.set(0, s.size.h - 1.8, s.size.d / 2 + 0.05);
    group.add(sign);
  }

  group.position.set(s.pos.x, 0, s.pos.z);
  scene.add(group);
  sceneMeshes.push(mesh);
}

SCENES.forEach(makeBuilding);

/* 樹木 隨機 80 棵 */
const treeMat = new THREE.MeshStandardMaterial({ color: 0x3a5840, roughness: 0.92 });
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3220, roughness: 0.95 });
for (let i = 0; i < 80; i++) {
  const x = (Math.random() - 0.5) * 200;
  const z = (Math.random() - 0.5) * 200;
  if (Math.abs(x) < 4 && Math.abs(z) < 80) continue;
  if (Math.abs(z + 20) < 3 && Math.abs(x) < 55) continue;
  let collide = false;
  for (const s of SCENES) {
    if (Math.abs(x - s.pos.x) < s.size.w / 2 + 2 && Math.abs(z - s.pos.z) < s.size.d / 2 + 2) {
      collide = true; break;
    }
  }
  if (collide) continue;
  const tree = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 1.8, 6), trunkMat);
  trunk.position.y = 0.9;
  tree.add(trunk);
  const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.2 + Math.random() * 0.4, 8, 6), treeMat);
  leaves.position.y = 2.4 + Math.random() * 0.4;
  tree.add(leaves);
  tree.position.set(x, 0, z);
  scene.add(tree);
}

/* 控制 */
const introOverlay = document.getElementById('introOverlay');
const keys = { w: false, a: false, s: false, d: false, shift: false };
let yaw = Math.PI;
let pitch = 0;
const mouseSens = 0.0024;

introOverlay.addEventListener('click', () => {
  canvas.requestPointerLock();
});
canvas.addEventListener('click', () => {
  if (document.pointerLockElement !== canvas) canvas.requestPointerLock();
  else tryInteract();
});
document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === canvas) {
    introOverlay.classList.add('hide');
  } else {
    /* 不要 unmount intro overlay after first lock — only show on first */
  }
});
document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas) {
    yaw -= e.movementX * mouseSens;
    pitch -= e.movementY * mouseSens;
    pitch = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, pitch));
  }
});
document.addEventListener('keydown', e => {
  switch (e.code) {
    case 'KeyW': keys.w = true; break;
    case 'KeyA': keys.a = true; break;
    case 'KeyS': keys.s = true; break;
    case 'KeyD': keys.d = true; break;
    case 'ShiftLeft': case 'ShiftRight': keys.shift = true; break;
    case 'KeyE': tryInteract(); break;
  }
});
document.addEventListener('keyup', e => {
  switch (e.code) {
    case 'KeyW': keys.w = false; break;
    case 'KeyA': keys.a = false; break;
    case 'KeyS': keys.s = false; break;
    case 'KeyD': keys.d = false; break;
    case 'ShiftLeft': case 'ShiftRight': keys.shift = false; break;
  }
});

/* 互動 raycast */
const raycaster = new THREE.Raycaster();
raycaster.far = 22;
const focusPrompt = document.getElementById('focusPrompt');
let focusedScene = null;
function updateFocus() {
  raycaster.setFromCamera({ x: 0, y: 0 }, cam);
  const hits = raycaster.intersectObjects(sceneMeshes, false);
  if (hits.length > 0) {
    focusedScene = hits[0].object.userData.scene;
    focusPrompt.classList.add('show');
  } else {
    focusedScene = null;
    focusPrompt.classList.remove('show');
  }
}
function tryInteract() {
  if (!focusedScene) return;
  showScenePopup(focusedScene);
}

/* popup */
const scenePopup = document.getElementById('scenePopup');
const spEp = document.getElementById('spEp');
const spName = document.getElementById('spName');
const spQuote = document.getElementById('spQuote');
const spSource = document.getElementById('spSource');
const spReadBtn = document.getElementById('spReadBtn');
const spClose = document.getElementById('spClose');
function showScenePopup(s) {
  spEp.textContent = s.ep;
  spName.textContent = s.name;
  spQuote.textContent = s.quote;
  spSource.textContent = '原文出處 · ' + s.source;
  spReadBtn.href = s.href || 'reader.html';
  scenePopup.classList.add('show');
  if (document.exitPointerLock) document.exitPointerLock();
}
spClose.addEventListener('click', () => {
  scenePopup.classList.remove('show');
  canvas.requestPointerLock();
});

const compass = document.getElementById('compass');
function updateCompass() {
  const deg = ((yaw * 180 / Math.PI) % 360 + 540) % 360 - 180;
  let dir = 'N';
  const a = Math.abs(deg);
  if (a < 22.5) dir = 'N';
  else if (a < 67.5) dir = deg < 0 ? 'NW' : 'NE';
  else if (a < 112.5) dir = deg < 0 ? 'W' : 'E';
  else if (a < 157.5) dir = deg < 0 ? 'SW' : 'SE';
  else dir = 'S';
  compass.textContent = dir + ' ' + Math.round(((deg + 360) % 360)) + '°';
}

let last = performance.now();
function loop() {
  const now = performance.now();
  const dt = Math.min(0.06, (now - last) / 1000);
  last = now;

  const forwardX = -Math.sin(yaw);
  const forwardZ = -Math.cos(yaw);
  const rightX = Math.cos(yaw);
  const rightZ = -Math.sin(yaw);
  let dx = 0, dz = 0;
  if (keys.w) { dx += forwardX; dz += forwardZ; }
  if (keys.s) { dx -= forwardX; dz -= forwardZ; }
  if (keys.a) { dx -= rightX;   dz -= rightZ; }
  if (keys.d) { dx += rightX;   dz += rightZ; }
  const mag = Math.hypot(dx, dz);
  if (mag > 0) { dx /= mag; dz /= mag; }
  const speed = keys.shift ? 11 : 4.8;

  const nx = cam.position.x + dx * speed * dt;
  const nz = cam.position.z + dz * speed * dt;
  let blocked = false;
  for (const s of SCENES) {
    if (Math.abs(nx - s.pos.x) < s.size.w / 2 + 0.6 &&
        Math.abs(nz - s.pos.z) < s.size.d / 2 + 0.6) {
      blocked = true; break;
    }
  }
  if (!blocked) {
    cam.position.x = nx;
    cam.position.z = nz;
  }
  cam.position.x = Math.max(-120, Math.min(120, cam.position.x));
  cam.position.z = Math.max(-120, Math.min(120, cam.position.z));
  cam.position.y = 1.7;

  cam.rotation.y = yaw;
  cam.rotation.x = pitch;

  updateFocus();
  updateCompass();
  renderer.render(scene, cam);
  requestAnimationFrame(loop);
}
loop();

addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

window.__SCENE_TOUR__ = {
  cam: cam,
  scenes: SCENES,
  teleportTo: function (name) {
    const s = SCENES.find(x => x.name === name);
    if (!s) return false;
    cam.position.set(s.pos.x + s.size.w / 2 + 4, 1.7, s.pos.z + s.size.d / 2 + 4);
    yaw = Math.atan2(s.pos.x - cam.position.x, s.pos.z - cam.position.z) + Math.PI;
    return true;
  },
  version: 'r62-r2-1'
};
</script>
</body>
