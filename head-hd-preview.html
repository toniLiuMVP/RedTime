<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" />
<title>學妹連續雕刻頭 · 預覽（平行世界A）</title>
<style>
  html, body { margin: 0; height: 100%; background: #0a0a0f; overflow: hidden; font-family: -apple-system, "Noto Sans TC", sans-serif; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #panel {
    position: fixed; left: 14px; top: 14px; z-index: 10; color: #e8dccb;
    background: rgba(12, 12, 20, 0.72); border: 1px solid rgba(232, 154, 120, 0.3);
    border-radius: 10px; padding: 12px 14px; max-width: 290px; backdrop-filter: blur(6px);
    font-size: 13px; line-height: 1.7;
  }
  #panel h1 { font-size: 14px; margin: 0 0 6px; color: #f0c4a8; font-weight: 600; letter-spacing: .04em; }
  #panel .row { margin: 6px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  #panel button {
    background: rgba(232, 154, 120, 0.14); color: #f0d8c4; border: 1px solid rgba(232, 154, 120, 0.4);
    border-radius: 6px; padding: 4px 9px; font-size: 12px; cursor: pointer;
  }
  #panel button:hover { background: rgba(232, 154, 120, 0.28); }
  #panel .hint { opacity: .62; font-size: 11px; margin-top: 8px; }
  #panel code { color: #ffd0a8; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>學妹 · 連續雕刻頭預覽</h1>
  <div>平行世界A 學妹 3D 建模實驗。拖曳旋轉、滾輪縮放。</div>
  <div class="row">
    <button data-mode="continuous">連續雕刻</button>
    <button data-mode="primitive">primitive 拼裝</button>
    <button data-mode="hybrid">hybrid 混合</button>
  </div>
  <div class="row">
    <button data-act="rotate">自轉 開／關</button>
    <button data-act="face">正面特寫</button>
  </div>
  <div class="row">
    <span style="opacity:.7">細分：</span>
    <button data-detail="5">5</button>
    <button data-detail="7">7</button>
    <button data-detail="9">9</button>
    <button data-detail="11">11</button>
  </div>
  <div class="row">
    <span style="opacity:.7">位移強度：</span>
    <button data-strength="0.5">0.5</button>
    <button data-strength="1">1.0</button>
    <button data-strength="1.5">1.5</button>
  </div>
  <div class="hint">
    console 微雕：<br />
    <code>__PREVIEW__.tune('noseTip', 0.02)</code><br />
    特徵：eyeSocketL/R · noseBridge · noseTip · cheekL/R · upperLip · lowerLip · chin · jawL/R · templeL/R · glabella · philtrum
  </div>
</div>

<script type="module">
import * as THREE from "./assets/lm402-parallel/vendor-three.module.js";
import { buildContinuousHead, setFeatureAmp, setSculptStrength } from "./assets/lm402-parallel/junior-head-hd.js";
import { buildReferenceJuniorHeroHead } from "./assets/lm402-parallel/renderer.js";

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.background = new THREE.Color("#0a0a0f");

const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.01, 100);
const HEAD_Y = -0.045;   // 臉中心(眉~+0.02 到下巴~-0.11 的中點)→ 相機框完整的臉
camera.position.set(0.02, HEAD_Y + 0.02, 0.52);
camera.lookAt(0, HEAD_Y, 0);

// ── 一眼瞬間暖光（11:00 那道斜射光）+ 冷補 + 邊緣光 ──
const key = new THREE.SpotLight("#ffd2a0", 6, 0, Math.PI / 4.5, 0.55, 1.2);
key.position.set(0.45, 0.5, 0.55);
key.target.position.set(0, HEAD_Y, 0);
scene.add(key, key.target);
const fill = new THREE.DirectionalLight("#9fb8e0", 0.5);
fill.position.set(-0.6, 0.1, 0.3);
scene.add(fill);
const rim = new THREE.DirectionalLight("#ffe0c0", 0.9);
rim.position.set(-0.3, 0.4, -0.6);
scene.add(rim);
scene.add(new THREE.AmbientLight("#5a6078", 0.55));

// ── 連續雕刻頭 ──
let head = null, detail = 7, strength = 1.0, rotate = false, mode = "hybrid";   // 預設 hybrid（最佳）正面靜止，按「自轉」才轉
function disposeHead(h) {
  if (!h) return;
  scene.remove(h);
  if (h.traverse) h.traverse((o) => { if (o.geometry) o.geometry.dispose(); if (o.material?.dispose) o.material.dispose(); });
}
const JR_SKIN = "#fce4d4", JR_HAIR = "#7a5842", JR_IRIS = "#7a5a42";   // 學妹 Co 參數
// beautify 參數（__PREVIEW__.setBeauty(k,v) 即時調 + 截圖迭代到最美）
const BEAUTY = {
  eyeScaleX: 0.74, eyeScaleY: 0.56, eyeScaleZ: 0.74, eyeDepth: -0.008, eyeY: -0.004,   // 眼:自然杏眼(再收小一點,對齊 2005 定稿的溫柔自然眼)
  hideLipLine: true, lipScaleX: 0.55, lipScaleY: 0.5, lipScaleZ: 0.8, lipY: 0.012,   // 唇(已改自建小嘴,此組保留相容)
  browScale: 1.0, browY: 0,                          // 眉
  faceSquashY: 0.9,                                  // 臉 Y 壓縮(整組一起 → 維持對齊 → 更圓更可愛,降低長臉感)
};
function buildPrimitive() {
  const p = buildReferenceJuniorHeroHead({ skinColor: JR_SKIN, hairColor: JR_HAIR, irisColor: JR_IRIS });
  p.root.position.set(0, 0, 0); p.root.scale.set(1, 1, 1); p.root.visible = true;   // 對齊連續頭座標系
  return p;
}
// 乾淨小嘴(取代 primitive 嘴部零件):上下唇扁橢球 + 細唇縫,pink lip 材質
function buildCleanMouth() {
  const g = new THREE.Group();
  const lip = new THREE.MeshPhysicalMaterial({ color: "#d98a8a", roughness: 0.42, metalness: 0, clearcoat: 0.5, clearcoatRoughness: 0.28, sheen: 0.4, sheenColor: new THREE.Color("#ffb4a4") });
  const lower = new THREE.Mesh(new THREE.SphereGeometry(0.0115, 20, 16), lip);
  lower.scale.set(1.0, 0.42, 0.5); lower.position.set(0, -0.075, 0.094);
  const upper = new THREE.Mesh(new THREE.SphereGeometry(0.0105, 20, 16), lip);
  upper.scale.set(1.0, 0.3, 0.46); upper.position.set(0, -0.0685, 0.0935);
  const seam = new THREE.Mesh(new THREE.CapsuleGeometry(0.0007, 0.015, 3, 6),
    new THREE.MeshBasicMaterial({ color: "#8a4a48", transparent: true, opacity: 0.55 }));
  seam.rotation.z = Math.PI / 2; seam.position.set(0, -0.0715, 0.098); seam.renderOrder = 18;
  g.add(lower, upper, seam);
  return g;
}
// 頭髮(對齊 2005 定稿:深棕 · 俐落後梳平滑頂 · 中分薄側掃瀏海 · 後腦馬尾 · 細側髮絲)
function buildFringe() {
  const g = new THREE.Group();
  const hairMat = new THREE.MeshPhysicalMaterial({ color: "#3a2718", roughness: 0.4, metalness: 0.08, clearcoat: 0.45, clearcoatRoughness: 0.32, sheen: 0.55, sheenColor: new THREE.Color("#7a5232") });
  // 頭頂平滑髮量(v10 乾淨位置,不蓋臉)
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.11, 36, 28), hairMat);
  cap.scale.set(1.14, 1.08, 1.1); cap.position.set(0, 0.016, -0.07);
  g.add(cap);
  // 平滑瀏海(兩片扁殼中分覆額,不用 cone → 無放射尖刺)
  for (const side of [-1, 1]) {
    const bang = new THREE.Mesh(new THREE.SphereGeometry(0.078, 30, 20), hairMat);
    bang.scale.set(1.0, 0.5, 0.32);                       // 更薄(對齊定稿薄瀏海)
    bang.position.set(side * 0.02, 0.066, 0.05);          // 上移 → 露更多高額頭
    bang.rotation.z = side * -0.08;                       // 微中分
    bang.rotation.x = 0.16;                               // 微前傾覆額
    g.add(bang);
  }
  // 後腦馬尾(小、收在後上方,前視只露頂部一點,不下垂過頭)
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.06, 20, 16), hairMat);
  tail.scale.set(0.9, 1.7, 0.9); tail.position.set(0, -0.015, -0.11);
  g.add(tail);
  // 細側髮絲框臉(薄、貼臉垂到下顎)
  for (const side of [-1, 1]) {
    const s = new THREE.Mesh(new THREE.ConeGeometry(0.014, 0.16, 6), hairMat);
    s.scale.set(0.5, 1, 0.28); s.position.set(side * 0.08, 0.006, 0.035);
    s.rotation.x = Math.PI; s.rotation.z = side * 0.05;
    g.add(s);
  }
  return g;
}
// hybrid(c):連續平滑基底 + primitive 五官(隱藏膚色不透明基底 blob,連續頭取代)
function buildHybrid() {
  const group = new THREE.Group();
  group.add(buildContinuousHead({ detail, skinColor: "#f2d3ba" }));   // 暖膚(對齊定稿暖膚色,非偏白)
  const p = buildPrimitive();
  const skin = new THREE.Color(JR_SKIN), hair = new THREE.Color(JR_HAIR);
  p.root.traverse((o) => {
    if (o.isMesh && o.material && o.material.color) {
      const c = o.material.color;
      const ds = Math.abs(c.r - skin.r) + Math.abs(c.g - skin.g) + Math.abs(c.b - skin.b);
      const dh = Math.abs(c.r - hair.r) + Math.abs(c.g - hair.g) + Math.abs(c.b - hair.b);
      if (o.material.transparent !== true && ds < 0.15) o.visible = false;   // 膚色不透明基底 blob → 連續頭取代
      if (dh < 0.22) o.visible = false;                                       // primitive 舊髮(含雜亂髮絲)→ 換乾淨自建髮
    }
  });
  // beautify pass(refs 命名五官微調 — 截圖迭代到最美)
  const rf = p.refs, B = BEAUTY;
  [rf.heroEyeWhiteL, rf.heroEyeWhiteR].forEach((m) => {
    if (m && m.parent) { m.parent.scale.set(B.eyeScaleX, B.eyeScaleY, B.eyeScaleZ); m.parent.position.z += B.eyeDepth; m.parent.position.y += B.eyeY; }
  });
  [rf.heroBrowL, rf.heroBrowR].forEach((m) => { if (m) { m.scale.multiplyScalar(B.browScale); m.position.y += B.browY; } });
  // 嘴:隱藏 primitive 嘴部區(唇/人中/唇峰 = y<-0.062 直屬 mesh)→ 換乾淨小嘴
  p.root.children.forEach((c) => { if (c.isMesh && c.position.y < -0.062) c.visible = false; });
  group.add(p.root);
  group.add(buildCleanMouth());
  group.add(buildFringe());        // 瀏海框臉
  group.scale.y = B.faceSquashY;   // 整組 Y 壓縮 → 更圓臉(五官隨之等比,對齊不破)
  return group;
}
function rebuild() {
  disposeHead(head);
  if (mode === "primitive") head = buildPrimitive().root;
  else if (mode === "hybrid") head = buildHybrid();
  else head = buildContinuousHead({ detail });   // 連續雕刻(模組當前 _features / _strength + detail)
  scene.add(head);
}
rebuild();

// ── 簡易拖曳旋轉 + 滾輪縮放（不依賴 OrbitControls）──
let dragging = false, px = 0, py = 0, yaw = 0, pitch = 0, dist = 0.52;
canvas.addEventListener("pointerdown", (e) => { dragging = true; px = e.clientX; py = e.clientY; rotate = false; });
addEventListener("pointerup", () => (dragging = false));
addEventListener("pointermove", (e) => {
  if (!dragging) return;
  yaw += (e.clientX - px) * 0.01; pitch += (e.clientY - py) * 0.01;
  pitch = Math.max(-1.2, Math.min(1.2, pitch)); px = e.clientX; py = e.clientY;
});
canvas.addEventListener("wheel", (e) => { e.preventDefault(); dist = Math.max(0.2, Math.min(1.4, dist + e.deltaY * 0.0006)); }, { passive: false });

addEventListener("resize", () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
});

function tick() {
  requestAnimationFrame(tick);
  if (rotate) yaw += 0.004;
  const cy = Math.cos(yaw), sy = Math.sin(yaw), cp = Math.cos(pitch);
  camera.position.set(sy * cp * dist, HEAD_Y + Math.sin(pitch) * dist + 0.02, cy * cp * dist);
  camera.lookAt(0, HEAD_Y, 0);
  renderer.render(scene, camera);
}
tick();

// ── 控制按鈕 ──
document.getElementById("panel").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  if (b.dataset.mode) { mode = b.dataset.mode; rebuild(); }
  else if (b.dataset.act === "rotate") rotate = !rotate;
  else if (b.dataset.act === "face") { yaw = 0; pitch = 0; dist = 0.42; rotate = false; }
  else if (b.dataset.detail) { detail = +b.dataset.detail; rebuild(); applyStrength(); }
  else if (b.dataset.strength) { strength = +b.dataset.strength; applyStrength(); }
});
function applyStrength() { setSculptStrength(strength); rebuild(); }

// ── console 微雕 API（預覽專用，直接作用在此頁的 head）──
window.__PREVIEW__ = {
  get head() { return head; },
  setDetail(d) { detail = d; rebuild(); },
  setStrength(s) { strength = s; setSculptStrength(s); rebuild(); },
  tune(k, amp) { if (!setFeatureAmp(k, amp)) console.warn("[head-hd-preview] 無此特徵：", k); rebuild(); },
  setBeauty(k, v) { if (k in BEAUTY) { BEAUTY[k] = v; rebuild(); } else console.warn("[head-hd-preview] 無此 beauty key：", k); },
  get beauty() { return BEAUTY; },
  rotate(on) { rotate = on !== false; },
};
console.info("[head-hd-preview] ready — 拖曳旋轉 / 滾輪縮放 / __PREVIEW__.tune(k,amp) 微雕");
</script>
</body>
</html>
