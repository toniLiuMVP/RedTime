<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#3a6ea0;font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif}
canvas{display:block;width:100%;height:100%}

/* ── 全畫面覆蓋層 ── */
#overlay{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── 標題畫面 ── */
#title-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#1a2a3a 0%,#0a1520 50%,#1a2a3a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.2s}

.title-year{font-size:clamp(14px,2vw,20px);color:#b8956a;letter-spacing:0.5em;margin-bottom:12px;opacity:0;animation:fadeUp 1.5s 0.5s forwards}
.title-main{font-size:clamp(28px,5vw,56px);color:#e8d5b8;font-weight:700;letter-spacing:0.15em;opacity:0;animation:fadeUp 1.5s 1s forwards}
.title-sub{font-size:clamp(14px,2.5vw,22px);color:#8a7560;margin-top:16px;opacity:0;animation:fadeUp 1.5s 1.5s forwards}
.title-start{font-size:clamp(12px,1.8vw,16px);color:#b8956a;margin-top:48px;opacity:0;animation:fadeUp 1.5s 2.2s forwards,pulse 2s 3s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── 遊戲 HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 20px;display:none;pointer-events:none}
#timer-bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:8px}
#timer-fill{width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12,#2ecc71);border-radius:3px;transition:width 0.1s}
#hud-info{display:flex;justify-content:space-between;align-items:center;color:#2c3e50;font-size:clamp(12px,1.6vw,16px);text-shadow:0 1px 3px rgba(255,255,255,0.5)}
#timer-text{color:#c0392b;font-weight:700;font-size:clamp(16px,2.5vw,24px)}
#distance-text{color:#5a4a3a}
#level-text{color:#1a6a3a;font-weight:700;font-size:clamp(14px,2vw,20px);text-shadow:0 0 8px rgba(26,106,58,0.3)}

/* ── 關卡過渡（韓劇導演級美術升級）── */
#level-transition{position:fixed;inset:0;z-index:85;display:none;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:clamp(36px,6vh,68px) clamp(32px,5vw,72px);background:radial-gradient(ellipse at center,rgba(26,18,10,0.9) 0%,rgba(8,5,3,0.96) 55%,rgba(0,0,0,0.98) 100%);transition:opacity 0.6s ease-out}
#level-transition.show{display:flex}
#level-transition::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.035) 1px,transparent 1px);background-size:3px 3px;mix-blend-mode:overlay;pointer-events:none}
#level-transition::after{content:"";position:absolute;inset:clamp(22px,4vh,48px) clamp(26px,4vw,60px);border:1px solid rgba(232,201,136,0.1);pointer-events:none}

#level-transition .lt-frame::before,#level-transition .lt-frame::after,#level-transition .lt-frame2::before,#level-transition .lt-frame2::after{content:"";position:absolute;width:clamp(28px,4vw,52px);height:clamp(28px,4vw,52px);border:1.5px solid #d9b36a;box-shadow:0 0 14px rgba(217,179,106,0.18);opacity:0;animation:fadeUp 0.9s 0.2s forwards}
#level-transition .lt-frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
#level-transition .lt-frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
#level-transition .lt-frame2::before{top:-1px;right:-1px;border-left:none;border-bottom:none}
#level-transition .lt-frame2::after{bottom:-1px;left:-1px;border-right:none;border-top:none}
#level-transition .lt-eyebrow{position:relative;z-index:3;color:#8a7560;font-size:clamp(10px,1.4vw,13px);letter-spacing:0.7em;text-indent:0.7em;font-weight:400;text-transform:uppercase;margin-bottom:clamp(16px,2.2vh,26px);opacity:0;animation:fadeUp 0.9s 0.45s forwards;font-family:"Cormorant Garamond",Georgia,serif}
#level-transition .lt-eyebrow::before{content:"STAGE CLEARED"}
.level-clear-text{position:relative;z-index:3;font-family:"Cormorant Garamond","Noto Serif TC","Noto Serif CJK TC",Georgia,serif;font-size:clamp(36px,6.2vw,64px);font-weight:300;letter-spacing:0.16em;text-indent:0.16em;line-height:1.15;background:linear-gradient(180deg,#f6e4b5 0%,#d9b36a 50%,#b97d3a 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(0 0 20px rgba(217,179,106,0.32));opacity:0;transform:translateY(24px) scale(0.95);animation:ltTitle 1.2s 0.75s cubic-bezier(0.2,0.7,0.2,1) forwards}
#level-transition .lt-divider{position:relative;z-index:3;width:0;height:1px;margin:clamp(20px,2.6vh,32px) 0;background:linear-gradient(90deg,transparent,rgba(217,179,106,0.55),transparent);animation:ltDraw 0.9s 1.5s cubic-bezier(0.4,0,0.2,1) forwards}
#level-transition .lt-divider::before{content:"";position:absolute;left:50%;top:50%;width:6px;height:6px;background:#d9b36a;transform:translate(-50%,-50%) rotate(45deg);box-shadow:0 0 10px rgba(217,179,106,0.6);opacity:0;animation:fadeUp 0.5s 2.1s forwards}
.level-next-text{position:relative;z-index:3;color:#8a7560;font-size:clamp(11px,1.6vw,15px);margin-top:0;font-weight:400;letter-spacing:0.32em;text-indent:0.32em;text-transform:uppercase;font-family:"Cormorant Garamond",Georgia,serif;opacity:0;animation:fadeUp 1s 2s forwards}
@keyframes ltTitle{from{opacity:0;transform:translateY(24px) scale(0.95);filter:drop-shadow(0 0 42px rgba(217,179,106,0.55)) blur(5px)}to{opacity:1;transform:translateY(0) scale(1);filter:drop-shadow(0 0 20px rgba(217,179,106,0.32)) blur(0)}}
@keyframes ltDraw{to{width:clamp(240px,40vw,420px)}}

/* ── 隱藏結局 ── */
#hidden-ending{position:fixed;inset:0;z-index:88;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
#hidden-ending.show{display:flex}
#hidden-ending-text{color:#ffd700;font-size:clamp(20px,4vw,36px);font-weight:700;opacity:0;transition:opacity 2s;text-align:center;line-height:1.8;letter-spacing:0.1em}
#hidden-ending-text.show{opacity:1}

/* ── 大絕招計數 ── */
#ultimate-count{position:fixed;bottom:286px;right:30px;z-index:41;display:none;color:#ffd700;font-size:12px;font-weight:700;text-align:center;text-shadow:0 0 6px rgba(255,215,0,0.5);pointer-events:none}
#sprint-bar-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:none;width:clamp(120px,30vw,200px)}
#sprint-bar{width:100%;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;overflow:hidden}
#sprint-fill{width:100%;height:100%;background:linear-gradient(90deg,#3498db,#1abc9c);border-radius:2px;transition:width 0.15s}
#sprint-label{text-align:center;color:#1a3d5c;font-size:12px;font-weight:600;margin-top:4px;text-shadow:0 1px 3px rgba(255,255,255,0.6),0 0 6px rgba(255,255,255,0.3)}

/* ── 敘事文字 ── */
#narrative{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:30;text-align:center;pointer-events:none;width:clamp(280px,80vw,600px)}
#narrative p{color:#2c3e50;font-size:clamp(14px,2.2vw,20px);line-height:1.8;opacity:0;transition:opacity 0.8s;text-shadow:0 1px 8px rgba(255,255,255,0.7),0 0px 3px rgba(255,255,255,0.5)}
#narrative p.show{opacity:1}

/* ── 結果畫面（韓劇導演級美術升級）── */
#result-screen{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;align-items:center;justify-content:center;padding:clamp(40px,6vh,72px) clamp(32px,5vw,72px);overflow:hidden;background:radial-gradient(ellipse at center,rgba(26,18,10,0.9) 0%,rgba(8,5,3,0.96) 55%,rgba(0,0,0,0.98) 100%)}
#result-screen.show{display:flex}
#result-screen::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.035) 1px,transparent 1px);background-size:3px 3px;mix-blend-mode:overlay;pointer-events:none}
#result-screen::after{content:"";position:absolute;inset:clamp(22px,4vh,48px) clamp(26px,4vw,60px);border:1px solid rgba(232,201,136,0.1);pointer-events:none}
#result-screen .rs-frame,#result-screen .rs-frame2{position:absolute;inset:clamp(22px,4vh,48px) clamp(26px,4vw,60px);pointer-events:none}
#result-screen .rs-frame::before,#result-screen .rs-frame::after,#result-screen .rs-frame2::before,#result-screen .rs-frame2::after{content:"";position:absolute;width:clamp(28px,4vw,52px);height:clamp(28px,4vw,52px);border:1.5px solid #d9b36a;box-shadow:0 0 14px rgba(217,179,106,0.18);opacity:0;animation:fadeUp 0.9s 0.3s forwards}
#result-screen .rs-frame::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
#result-screen .rs-frame::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
#result-screen .rs-frame2::before{top:-1px;right:-1px;border-left:none;border-bottom:none}
#result-screen .rs-frame2::after{bottom:-1px;left:-1px;border-right:none;border-top:none}
.result-text{position:relative;z-index:3;font-family:"Cormorant Garamond","Noto Serif TC","Noto Serif CJK TC",Georgia,serif;font-size:clamp(28px,4.8vw,52px);font-weight:300;letter-spacing:0.18em;text-indent:0.18em;line-height:1.15;text-align:center;background:linear-gradient(180deg,#f6e4b5 0%,#d9b36a 50%,#b97d3a 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;filter:drop-shadow(0 0 22px rgba(217,179,106,0.32));opacity:0;animation:fadeUp 1.2s 0.5s cubic-bezier(0.2,0.7,0.2,1) forwards}
.result-text::after{content:"";display:block;width:clamp(200px,32vw,360px);height:1px;margin:clamp(18px,2.4vh,30px) auto clamp(6px,1vh,12px);background:linear-gradient(90deg,transparent,rgba(217,179,106,0.6),transparent)}
.result-sub{position:relative;z-index:3;color:#c8b89a;font-size:clamp(14px,2.1vw,19px);margin-top:clamp(14px,2vh,22px);line-height:2.1;font-weight:300;letter-spacing:0.12em;text-align:center;max-width:560px;opacity:0;animation:fadeUp 1s 1.2s forwards;text-shadow:0 1px 8px rgba(0,0,0,0.7)}
.result-sub > div:empty::before{content:"\00a0"}
.result-retry{position:relative;z-index:3;color:#e8c988;font-size:clamp(13px,1.7vw,16px);letter-spacing:0.32em;text-indent:0.32em;padding:12px 32px;margin-top:clamp(28px,4vh,46px);border:1px solid rgba(217,179,106,0.45);background:rgba(217,179,106,0.05);border-radius:2px;cursor:pointer;pointer-events:auto;text-transform:uppercase;font-family:"Cormorant Garamond",Georgia,serif;opacity:0;animation:fadeUp 1s 2s forwards;transition:color 0.35s ease,background 0.35s ease,border-color 0.35s ease,box-shadow 0.35s ease,letter-spacing 0.35s ease}
.result-retry:hover{color:#f6e4b5;background:rgba(217,179,106,0.16);border-color:#d9b36a;box-shadow:0 0 24px rgba(217,179,106,0.28);letter-spacing:0.36em}

/* ── 排行榜 ── */
#leaderboard-btn{position:relative;z-index:3;color:#b8956a;font-size:clamp(12px,1.6vw,15px);letter-spacing:0.28em;text-indent:0.28em;margin-top:18px;padding:9px 24px;border:1px solid rgba(184,149,106,0.28);background:transparent;border-radius:2px;cursor:pointer;pointer-events:auto;opacity:0;animation:fadeUp 1s 2.5s forwards;font-family:"Cormorant Garamond",Georgia,serif;text-transform:uppercase;transition:color 0.35s ease,background 0.35s ease,border-color 0.35s ease,box-shadow 0.35s ease}
#leaderboard-btn:hover{color:#e8c988;border-color:rgba(217,179,106,0.55);background:rgba(217,179,106,0.08);box-shadow:0 0 18px rgba(217,179,106,0.18)}
#leaderboard-panel{position:fixed;inset:0;z-index:95;background:rgba(10,10,10,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#leaderboard-panel.show{display:flex}
.lb-title{color:#e8d5b8;font-size:clamp(18px,3vw,28px);font-weight:700;margin-bottom:16px}
.lb-table{width:clamp(280px,70vw,420px);border-collapse:collapse}
.lb-table th,.lb-table td{padding:6px 10px;text-align:center;font-size:clamp(11px,1.4vw,14px)}
.lb-table th{color:#b8956a;border-bottom:1px solid rgba(184,149,106,0.3)}
.lb-table td{color:#c8c0b0}
.lb-table tr.highlight td{color:#ffd700;font-weight:700}
.lb-close{color:#b8956a;font-size:clamp(12px,1.6vw,15px);margin-top:24px;cursor:pointer;pointer-events:auto}
.lb-close:hover{color:#e8d5b8}
/* ── 結果畫面連結 ── */
.result-links{position:relative;z-index:3;margin-top:clamp(22px,3vh,34px);display:flex;gap:clamp(22px,3.2vw,42px);opacity:0;animation:fadeUp 1s 3s forwards}
.result-link{position:relative;color:#7a6247;font-size:clamp(11px,1.4vw,14px);letter-spacing:0.18em;text-decoration:none;pointer-events:auto;padding-bottom:4px;transition:color 0.35s ease;font-family:"Cormorant Garamond",Georgia,serif}
.result-link::after{content:"";position:absolute;left:0;bottom:0;width:0;height:1px;background:#d9b36a;transition:width 0.4s ease}
.result-link:hover{color:#e8c988}
.result-link:hover::after{width:100%}
/* ── 名字輸入（勝利後）── */
#name-input-wrap{position:relative;z-index:3;margin-top:clamp(22px,3vh,32px);opacity:0;text-align:center;display:none}
#name-input-wrap.show{display:block;animation:fadeUp 1s 0.3s forwards}
#name-input{background:rgba(217,179,106,0.06);border:1px solid rgba(217,179,106,0.35);border-radius:2px;color:#e8c988;font-size:15px;padding:10px 16px;width:180px;text-align:center;font-family:monospace;letter-spacing:3px;outline:none;transition:border-color 0.35s ease,background 0.35s ease,box-shadow 0.35s ease}
#name-input:focus{border-color:#d9b36a;background:rgba(217,179,106,0.1);box-shadow:0 0 16px rgba(217,179,106,0.22)}
#name-input::placeholder{color:rgba(184,149,106,0.38);letter-spacing:2px}
#save-score-btn{background:rgba(217,179,106,0.08);border:1px solid rgba(217,179,106,0.45);border-radius:2px;color:#d9b36a;font-size:13px;padding:10px 22px;margin-left:10px;cursor:pointer;font-family:"Cormorant Garamond",Georgia,serif;letter-spacing:0.22em;text-indent:0.22em;text-transform:uppercase;transition:background 0.35s ease,color 0.35s ease,border-color 0.35s ease,box-shadow 0.35s ease}
#save-score-btn:hover{background:rgba(217,179,106,0.2);color:#f6e4b5;border-color:#d9b36a;box-shadow:0 0 16px rgba(217,179,106,0.28)}

/* ── 電影黑邊 ── */
.letterbox-top,.letterbox-bot{position:fixed;left:0;right:0;height:0;background:#0a0a0a;z-index:5;transition:height 0.8s}
.letterbox-top{top:0}
.letterbox-bot{bottom:0}
.letterbox-on .letterbox-top,.letterbox-on .letterbox-bot{height:clamp(30px,6vh,60px)}

/* ── 紅暈（時間不足警告）── */
#vignette{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;transition:opacity 0.3s;background:radial-gradient(ellipse at center,transparent 50%,rgba(180,40,40,0.4) 100%)}

/* ── 手機觸控搖桿 ── */
#touch-controls{position:fixed;bottom:30px;left:20px;z-index:40;display:none}
#joystick-area{width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,0.08);border:2px solid rgba(0,0,0,0.15);position:relative}
#joystick-knob{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.18);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:none}
#sprint-btn{position:fixed;bottom:60px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(243,156,18,0.3);border:2px solid rgba(243,156,18,0.6);color:#fff;font-size:14px;font-weight:700;line-height:64px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-shadow:0 1px 4px rgba(0,0,0,0.5),0 0 8px rgba(243,156,18,0.6)}

/* ── 跳躍按鈕（手機）── */
#jump-btn{position:fixed;bottom:140px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(46,204,113,0.3);border:2px solid rgba(46,204,113,0.6);color:#fff;font-size:14px;font-weight:700;line-height:64px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-shadow:0 1px 4px rgba(0,0,0,0.5),0 0 8px rgba(46,204,113,0.6)}

/* ── 必殺技按鈕 ── */
#ultimate-btn{position:fixed;bottom:220px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(255,215,0,0.25);border:2px solid rgba(255,215,0,0.65);color:#fff;font-size:12px;font-weight:700;line-height:1.2;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;padding-top:18px;text-shadow:0 1px 4px rgba(0,0,0,0.5),0 0 8px rgba(255,215,0,0.6)}

/* ── 道具拾取通知 ── */

#pickup-notify.show{opacity:1}

/* ── 金色閃光（必殺技）── */
#gold-flash{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,215,0,0.5) 0%,transparent 70%);opacity:0;transition:opacity 0.3s}

/* ── 靜音按鈕 ── */
#mute-btn{position:fixed;top:12px;right:16px;z-index:50;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.12);border:1px solid rgba(0,0,0,0.2);color:#2c3e50;font-size:18px;line-height:36px;text-align:center;cursor:pointer;display:block;-webkit-tap-highlight-color:transparent;pointer-events:auto}

/* ── 呼吸提示 ── */

<!-- Audio auto-stop hook：頁面隱藏 / 關閉時自動停所有音樂（對所有玩家生效） -->
<script>
(function () {
  const _OriginalAudio = window.Audio;
  const _trackedAudios = new Set();
  window.Audio = function (...args) {
    const a = new _OriginalAudio(...args);
    _trackedAudios.add(a);
    return a;
  };
  window.Audio.prototype = _OriginalAudio.prototype;
  function stopAllAudio() {
    _trackedAudios.forEach((a) => { try { a.pause(); } catch (e) {} });
    document.querySelectorAll("audio, video").forEach((el) => { try { el.pause(); } catch (e) {} });
    if (window.__AUDIO_CONTEXT__ && typeof window.__AUDIO_CONTEXT__.suspend === "function") {
      try { window.__AUDIO_CONTEXT__.suspend(); } catch (e) {}
    }
  }
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) stopAllAudio();
  });
  window.addEventListener("pagehide", stopAllAudio);
  window.addEventListener("beforeunload", stopAllAudio);
})();
</script>

function createCamoTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#556b2f";
  ctx.fillRect(0, 0, 128, 128);
  const colors = ["#3b5323", "#2e4a1e", "#6b4f2a", "#4a5d23", "#3d3d1e", "#5c4a1f"];
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.beginPath();
    const cx = Math.random() * 128;
    const cy = Math.random() * 128;
    const rx = 5 + Math.random() * 18;
    const ry = 3 + Math.random() * 10;
    const rot = Math.random() * Math.PI;
    ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

   台中火車站背景 — 偶像劇等級天空 + 真實百貨大樓群

function buildBackground() {

  /* ═══ 一、偶像劇天空 ═══ */
  /* 天空漸層球（溫暖午後色調） */
  const skyGeo = new THREE.SphereGeometry(280, 48, 24);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor:    { value: new THREE.Color(0x3a7ec8) },  /* 頂部深藍 */
      midColor:    { value: new THREE.Color(0x6aadee) },  /* 中段天藍 */
      bottomColor: { value: new THREE.Color(0xf0e0c8) },  /* 地平線暖金 */
      sunDir:      { value: new THREE.Vector3(0.5, 0.4, 0.3).normalize() },
      sunColor:    { value: new THREE.Color(0xfff5e0) },
      offset:      { value: 12 },
      exponent:    { value: 0.35 }
    },
    vertexShader: [
      "varying vec3 vWorldPos;",
      "void main() {",
      "  vec4 wp = modelMatrix * vec4(position, 1.0);",
      "  vWorldPos = wp.xyz;",
      "  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);",
      "}"
    ].join("\n"),
    fragmentShader: [
      "uniform vec3 topColor;",
      "uniform vec3 midColor;",
      "uniform vec3 bottomColor;",
      "uniform vec3 sunDir;",
      "uniform vec3 sunColor;",
      "uniform float offset;",
      "uniform float exponent;",
      "varying vec3 vWorldPos;",
      "void main() {",
      "  vec3 dir = normalize(vWorldPos + offset);",
      "  float h = max(dir.y, 0.0);",
      "  /* 三段式天空漸層 */",
      "  vec3 skyCol = mix(bottomColor, midColor, smoothstep(0.0, 0.25, h));",
      "  skyCol = mix(skyCol, topColor, smoothstep(0.25, 0.7, h));",
      "  /* 太陽光暈 */",
      "  float sunDot = max(dot(dir, sunDir), 0.0);",
      "  skyCol += sunColor * pow(sunDot, 32.0) * 0.6;",
      "  skyCol += sunColor * pow(sunDot, 8.0) * 0.15;",
      "  gl_FragColor = vec4(skyCol, 1.0);",
      "}"
    ].join("\n")
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);

  /* 太陽光盤（可見的太陽） */
  var sunGlowMat = new THREE.MeshBasicMaterial({ color: 0xfffce8, transparent: true, opacity: 0.7 });
  var sunOuter = new THREE.Mesh(new THREE.CircleGeometry(8, 32), new THREE.MeshBasicMaterial({ color: 0xfff8e0, transparent: true, opacity: 0.3 }));
  sunOuter.position.set(80, 65, 50);
  sunOuter.lookAt(0, 0, 0);
  scene.add(sunOuter);
  var sunCore = new THREE.Mesh(new THREE.CircleGeometry(3.5, 32), sunGlowMat);
  sunCore.position.set(80, 65, 50);
  sunCore.lookAt(0, 0, 0);
  scene.add(sunCore);

  /* ═══ 積雲（Cumulus）叢集 ═══ */
  /* 每朵雲 = 5~8 個球體堆疊出蓬鬆形狀 */
  var cloudCoreMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
  var cloudEdgeMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
  var cloudSunMat  = new THREE.MeshBasicMaterial({ color: 0xfff8e8, transparent: true, opacity: 0.5 });

  var cloudDefs = [
    { x: -80, y: 50, z: -60,  scale: 1.2 },
    { x: -30, y: 55, z: -110, scale: 0.9 },
    { x:  50, y: 48, z: -80,  scale: 1.0 },
    { x:  90, y: 58, z: -30,  scale: 1.4 },
    { x: -60, y: 52, z:  40,  scale: 0.8 },
    { x:  30, y: 56, z:  70,  scale: 1.1 },
    { x: -100, y: 45, z: 80,  scale: 1.3 },
    { x:  70, y: 60, z: 120,  scale: 0.7 },
    { x: -20, y: 62, z: 140,  scale: 0.6 },
    { x: 110, y: 50, z:  20,  scale: 1.0 },
    { x: -110, y: 55, z: -30, scale: 0.85 },
    { x:  0,  y: 65, z: -140, scale: 0.5 },
  ];

  for (var ci = 0; ci < cloudDefs.length; ci++) {
    var cd = cloudDefs[ci];
    var cloudGroup = new THREE.Group();
    var numPuffs = 5 + Math.floor(Math.random() * 4);
    for (var pi = 0; pi < numPuffs; pi++) {
      var puffR = (3 + Math.random() * 5) * cd.scale;
      var mat = pi < 2 ? cloudCoreMat : (pi < 4 ? cloudSunMat : cloudEdgeMat);
      var puff = new THREE.Mesh(new THREE.SphereGeometry(puffR, 8, 6), mat);
      puff.position.set(
        (Math.random() - 0.5) * 10 * cd.scale,
        (Math.random() - 0.3) * 3 * cd.scale,
        (Math.random() - 0.5) * 6 * cd.scale
      );
      puff.scale.y = 0.4 + Math.random() * 0.25;
      cloudGroup.add(puff);
    }
    cloudGroup.position.set(cd.x, cd.y, cd.z);
    scene.add(cloudGroup);
  }

  /* ═══ 二、真實建築群 ═══ */
  /* 共用材質 */
  var winGlassMat = new THREE.MeshStandardMaterial({ color: 0x6699cc, roughness: 0.05, metalness: 0.7, emissive: 0x1a2a3a, emissiveIntensity: 0.12 });
  var winFrameMat = new THREE.MeshStandardMaterial({ color: 0x556677, roughness: 0.4 });
  var acMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6 });
  var roofEdgeMat = new THREE.MeshStandardMaterial({ color: 0x556666, roughness: 0.5 });

  /* 每棟建築的定義（含建築型態） */
  var bldgDefs = [
    /* ── 左側建築群 ── */
    { x:-35,  z:-80,  type:"podium_tower", podW:22, podH:8, podD:24, podColor:0xd4c4a8,

    { x:-38,  z:-25,  type:"glass_curtain", w:16, h:48, d:16, baseColor:0x5a7a9a,
      glassColor:0x4488bb, roofType:"helipad" },
    { x:-32,  z:35,   type:"stepped", levels:[{w:22,h:12,d:24,c:0xccbbaa},{w:16,h:10,d:18,c:0xbbaa99},{w:10,h:8,d:12,c:0xaa9988}],
      roofType:"garden" },
    { x:-40,  z:95,   type:"glass_curtain", w:14, h:55, d:14, baseColor:0x7788aa,
      glassColor:0x3a7aaa, roofType:"spire" },
    { x:-35,  z:155,  type:"podium_tower", podW:20, podH:10, podD:22, podColor:0xc8b898,
      towerW:12, towerH:25, towerD:14, towerColor:0x99aabb, roofType:"flat" },
    /* ── 右側建築群 ── */
    { x:35,   z:-100, type:"podium_tower", podW:18, podH:9, podD:20, podColor:0xbba888,
      towerW:12, towerH:35, towerD:14, towerColor:0x889988, roofType:"antenna" },
    { x:38,   z:-35,  type:"stepped", levels:[{w:22,h:10,d:22,c:0xddc8b0},{w:18,h:12,d:16,c:0xccbb9a},{w:12,h:10,d:12,c:0xbbaa88}],
      roofType:"flat" },
    { x:32,   z:25,   type:"glass_curtain", w:14, h:50, d:14, baseColor:0x6a8aaa,
      glassColor:0x4488aa, roofType:"helipad" },
    { x:36,   z:85,   type:"podium_tower", podW:20, podH:8, podD:18, podColor:0xc0b090,
      towerW:14, towerH:30, towerD:12, towerColor:0x8899aa, roofType:"antenna" },
    { x:40,   z:145,  type:"stepped", levels:[{w:24,h:8,d:22,c:0xd0c0a8},{w:18,h:10,d:16,c:0xc0b098},{w:14,h:8,d:14,c:0xb0a088}],
      roofType:"garden" },
    /* ── 後方遠景（簡化但有造型） ── */
    { x:-58, z:-60,  type:"glass_curtain", w:12, h:62, d:12, baseColor:0x667788, glassColor:0x3a6a8a, roofType:"spire" },
    { x:-58, z:65,   type:"podium_tower", podW:14, podH:6, podD:14, podColor:0x998877, towerW:9, towerH:38, towerD:9, towerColor:0x778899, roofType:"flat" },
    { x:58,  z:-50,  type:"glass_curtain", w:12, h:58, d:12, baseColor:0x778899, glassColor:0x4488aa, roofType:"antenna" },
    { x:58,  z:75,   type:"podium_tower", podW:14, podH:6, podD:14, podColor:0xaa9977, towerW:9, towerH:34, towerD:9, towerColor:0x667788, roofType:"flat" },
  ];

  /* 窗戶生成器 — 在 bGroup 上繪製窗戶格線 */
  function addWindowGrid(bGroup, bw, bh, bd, floorH, startY) {
    var wW = 1.2, wH = 1.6, wGap = 2.2;
    var floors = Math.floor(bh / floorH);
    var winsPerRow = Math.max(1, Math.floor((bw - 1.5) / wGap));
    for (var face = 0; face < 4; face++) {
      for (var fi = 0; fi < floors; fi++) {
        var count = (face < 2) ? winsPerRow : Math.max(1, Math.floor((bd - 1.5) / wGap));
        var faceW = (face < 2) ? bw : bd;
        for (var wi = 0; wi < count; wi++) {
          var wx2 = -((count - 1) * wGap) / 2 + wi * wGap;
          var wy2 = startY + fi * floorH + floorH * 0.5;
          var wm = new THREE.Mesh(new THREE.PlaneGeometry(wW, wH), winGlassMat);
          if (face === 0) { wm.position.set(wx2, wy2, -(bd / 2 + 0.02)); }
          else if (face === 1) { wm.position.set(wx2, wy2, bd / 2 + 0.02); wm.rotation.y = Math.PI; }
          else if (face === 2) { wm.position.set(-(faceW === bd ? bw : bw) / 2 - 0.02, wy2, wx2); wm.rotation.y = Math.PI / 2; }
          else { wm.position.set((face === 3 ? bw : bw) / 2 + 0.02, wy2, wx2); wm.rotation.y = -Math.PI / 2; }
          if (face >= 2) {
            /* 側面窗位置用 bd 計算 */
            var sCount = Math.max(1, Math.floor((bd - 1.5) / wGap));
            var swx = -((sCount - 1) * wGap) / 2 + wi * wGap;
            if (wi >= sCount) continue;
            wm.position.z = swx;
            wm.position.x = (face === 2 ? -1 : 1) * (bw / 2 + 0.02);
          }
          bGroup.add(wm);
        }
      }
    }
  }

  /* 屋頂生成器 */
  function addRoof(bGroup, bw, bd, topY, type) {
    /* 屋頂邊框 */
    var edgeH = 1.0;
    var edge = new THREE.Mesh(new THREE.BoxGeometry(bw + 0.6, edgeH, bd + 0.6), roofEdgeMat);
    edge.position.y = topY + edgeH / 2;
    bGroup.add(edge);
    /* 空調機組 */
    var acCount = 2 + Math.floor(Math.random() * 3);
    for (var ai = 0; ai < acCount; ai++) {
      var acBox = new THREE.Mesh(new THREE.BoxGeometry(1.2 + Math.random(), 0.8, 0.8 + Math.random()), acMat);
      acBox.position.set((Math.random() - 0.5) * (bw - 2.5), topY + edgeH + 0.4, (Math.random() - 0.5) * (bd - 2.5));
      bGroup.add(acBox);
    }
    if (type === "antenna") {
      /* 通訊天線塔 */
      var pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 10, 6), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7 }));
      pole.position.set(0, topY + edgeH + 5, 0);
      bGroup.add(pole);
      var dish = new THREE.Mesh(new THREE.SphereGeometry(1.0, 8, 6, 0, Math.PI), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5 }));
      dish.rotation.x = Math.PI / 4;
      dish.position.set(0, topY + edgeH + 7, -0.5);
      bGroup.add(dish);
      /* 紅色警示燈 */
      var warn = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.6 }));
      warn.position.set(0, topY + edgeH + 10.2, 0);
      bGroup.add(warn);
    } else if (type === "helipad") {
      /* 直升機停機坪 */
      var pad = new THREE.Mesh(new THREE.CylinderGeometry(bw * 0.3, bw * 0.3, 0.2, 16), new THREE.MeshStandardMaterial({ color: 0x556655 }));
      pad.position.y = topY + edgeH + 0.1;
      bGroup.add(pad);
      var hMark = new THREE.Mesh(new THREE.RingGeometry(bw * 0.15, bw * 0.2, 16), new THREE.MeshStandardMaterial({ color: 0xffffcc }));
      hMark.rotation.x = -Math.PI / 2;
      hMark.position.y = topY + edgeH + 0.22;
      bGroup.add(hMark);
    } else if (type === "spire") {
      /* 尖塔造型 */
      var spire = new THREE.Mesh(new THREE.ConeGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({ color: 0x8899aa, metalness: 0.5 }));
      spire.position.y = topY + edgeH + 4;
      bGroup.add(spire);
    } else if (type === "garden") {
      /* 屋頂花園（綠色） */
      var garden = new THREE.Mesh(new THREE.BoxGeometry(bw - 2, 0.5, bd - 2), new THREE.MeshStandardMaterial({ color: 0x4a7a3a, roughness: 0.9 }));
      garden.position.y = topY + edgeH + 0.25;
      bGroup.add(garden);
      /* 小灌木 */
      for (var si = 0; si < 4; si++) {
        var shrub = new THREE.Mesh(new THREE.SphereGeometry(0.8, 6, 6), new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.9 }));
        shrub.position.set((Math.random() - 0.5) * (bw - 4), topY + edgeH + 1.0, (Math.random() - 0.5) * (bd - 4));
        shrub.scale.y = 0.7;
        bGroup.add(shrub);
      }
    }
  }

  /* 裙樓商店（底部） */
  function addShopFront(bGroup, bw, bd) {
    var shopColors = [0xcc3333, 0x3366cc, 0xcc9933, 0x339933, 0xcc3399, 0x6633cc];
    /* 遮陽棚 */
    var awningColor = shopColors[Math.floor(Math.random() * shopColors.length)];
    var awning = new THREE.Mesh(
      new THREE.BoxGeometry(bw * 0.9, 0.12, 1.5),
      new THREE.MeshStandardMaterial({ color: awningColor, roughness: 0.6 })
    );
    awning.position.set(0, 4.0, -(bd / 2 + 0.8));
    bGroup.add(awning);
    /* 店面玻璃（大面積） */
    var shopGlass = new THREE.Mesh(
      new THREE.PlaneGeometry(bw * 0.8, 3.2),
      new THREE.MeshStandardMaterial({ color: 0x88bbdd, roughness: 0.05, metalness: 0.6, transparent: true, opacity: 0.5 })
    );
    shopGlass.position.set(0, 2.2, -(bd / 2 + 0.03));
    bGroup.add(shopGlass);
    /* 店面招牌燈箱 */
    var signColor = shopColors[Math.floor(Math.random() * shopColors.length)];
    var shopSign = new THREE.Mesh(
      new THREE.BoxGeometry(bw * 0.5, 1.2, 0.3),
      new THREE.MeshStandardMaterial({ color: signColor, emissive: signColor, emissiveIntensity: 0.2, roughness: 0.3 })
    );
    shopSign.position.set(0, 5.5, -(bd / 2 + 0.2));
    bGroup.add(shopSign);
  }

  /* 生成所有建築 */
  for (var bi = 0; bi < bldgDefs.length; bi++) {
    var bd2 = bldgDefs[bi];
    var bGroup = new THREE.Group();

    if (bd2.type === "podium_tower") {
      /* === 裙樓 + 塔樓型 === */
      var podMat = new THREE.MeshStandardMaterial({ color: bd2.podColor, roughness: 0.65 });
      var podium = new THREE.Mesh(new THREE.BoxGeometry(bd2.podW, bd2.podH, bd2.podD), podMat);
      podium.position.y = bd2.podH / 2;
      podium.castShadow = true; podium.receiveShadow = true;
      bGroup.add(podium);
      /* 裙樓橫帶裝飾 */
      var podBand = new THREE.Mesh(new THREE.BoxGeometry(bd2.podW + 0.3, 0.3, bd2.podD + 0.3),
        new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.3 }));
      podBand.position.y = bd2.podH;
      bGroup.add(podBand);
      addWindowGrid(bGroup, bd2.podW, bd2.podH, bd2.podD, 4.0, 0);
      addShopFront(bGroup, bd2.podW, bd2.podD);

      /* 塔樓 */
      var towerMat = new THREE.MeshStandardMaterial({ color: bd2.towerColor, roughness: 0.5 });
      var tower = new THREE.Mesh(new THREE.BoxGeometry(bd2.towerW, bd2.towerH, bd2.towerD), towerMat);
      tower.position.y = bd2.podH + bd2.towerH / 2;
      tower.castShadow = true; tower.receiveShadow = true;
      bGroup.add(tower);
      addWindowGrid(bGroup, bd2.towerW, bd2.towerH, bd2.towerD, 3.5, bd2.podH);
      /* 塔樓底部裝飾帶 */
      var tBand = new THREE.Mesh(new THREE.BoxGeometry(bd2.towerW + 0.4, 0.4, bd2.towerD + 0.4),
        new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.4 }));
      tBand.position.y = bd2.podH + 0.2;
      bGroup.add(tBand);
      addRoof(bGroup, bd2.towerW, bd2.towerD, bd2.podH + bd2.towerH, bd2.roofType);

    } else if (bd2.type === "glass_curtain") {
      /* === 玻璃帷幕大樓 === */
      /* 結構核心 */
      var coreMat = new THREE.MeshStandardMaterial({ color: bd2.baseColor, roughness: 0.4, metalness: 0.3 });
      var core = new THREE.Mesh(new THREE.BoxGeometry(bd2.w - 1, bd2.h, bd2.d - 1), coreMat);
      core.position.y = bd2.h / 2;
      core.castShadow = true;
      bGroup.add(core);
      /* 玻璃帷幕外層 */
      var curtainMat = new THREE.MeshStandardMaterial({
        color: bd2.glassColor, roughness: 0.02, metalness: 0.85,
        transparent: true, opacity: 0.65, envMapIntensity: 1.5
      });
      for (var gf = 0; gf < 4; gf++) {
        var gw = (gf < 2) ? bd2.w : bd2.d;
        var gd2 = (gf < 2) ? bd2.d : bd2.w;
        var glassPanel = new THREE.Mesh(new THREE.PlaneGeometry(gw, bd2.h), curtainMat);
        glassPanel.position.y = bd2.h / 2;
        if (gf === 0) { glassPanel.position.z = -(bd2.d / 2 + 0.01); }
        else if (gf === 1) { glassPanel.position.z = bd2.d / 2 + 0.01; glassPanel.rotation.y = Math.PI; }
        else if (gf === 2) { glassPanel.position.x = -(bd2.w / 2 + 0.01); glassPanel.rotation.y = Math.PI / 2; }
        else { glassPanel.position.x = bd2.w / 2 + 0.01; glassPanel.rotation.y = -Math.PI / 2; }
        bGroup.add(glassPanel);
      }
      /* 橫向樓層分隔線（金屬條） */
      var divMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 });
      for (var di = 0; di < Math.floor(bd2.h / 3.5); di++) {
        var divY = di * 3.5 + 1.75;
        for (var ds = 0; ds < 2; ds++) {
          var divLine = new THREE.Mesh(new THREE.BoxGeometry(bd2.w + 0.1, 0.08, 0.08), divMat);
          divLine.position.set(0, divY, ds === 0 ? -(bd2.d / 2 + 0.02) : (bd2.d / 2 + 0.02));
          bGroup.add(divLine);
        }
      }
      /* 底部入口 */
      addShopFront(bGroup, bd2.w, bd2.d);
      addRoof(bGroup, bd2.w, bd2.d, bd2.h, bd2.roofType);

    } else if (bd2.type === "stepped") {
      /* === 退縮階梯型 === */
      var baseY = 0;
      for (var li = 0; li < bd2.levels.length; li++) {
        var lv = bd2.levels[li];
        var lvMat = new THREE.MeshStandardMaterial({ color: lv.c, roughness: 0.6 });
        var lvMesh = new THREE.Mesh(new THREE.BoxGeometry(lv.w, lv.h, lv.d), lvMat);
        lvMesh.position.y = baseY + lv.h / 2;
        lvMesh.castShadow = true; lvMesh.receiveShadow = true;
        bGroup.add(lvMesh);
        /* 每層之間的裝飾帶 */
        if (li > 0) {
          var stepBand = new THREE.Mesh(new THREE.BoxGeometry(lv.w + 0.5, 0.3, lv.d + 0.5),
            new THREE.MeshStandardMaterial({ color: 0x888877, metalness: 0.3 }));
          stepBand.position.y = baseY + 0.15;
          bGroup.add(stepBand);
        }
        /* 退縮平台上的欄杆 */
        if (li > 0) {
          var prevLv = bd2.levels[li - 1];
          var railMat2 = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.4 });
          for (var rsi = 0; rsi < 2; rsi++) {
            var railZ = rsi === 0 ? -(lv.d / 2 - 0.2) : (lv.d / 2 - 0.2);
            var railWidth = (prevLv.w - lv.w) / 2;
            if (railWidth > 1) {
              var terRail = new THREE.Mesh(new THREE.BoxGeometry(railWidth, 0.8, 0.05), railMat2);
              terRail.position.set((lv.w / 2 + railWidth / 2), baseY + 0.4, railZ);
              bGroup.add(terRail);
              var terRail2 = terRail.clone();
              terRail2.position.x = -(lv.w / 2 + railWidth / 2);
              bGroup.add(terRail2);
            }
          }
        }
        addWindowGrid(bGroup, lv.w, lv.h, lv.d, 3.5, baseY);
        baseY += lv.h;
      }
      var topLv = bd2.levels[bd2.levels.length - 1];
      addShopFront(bGroup, bd2.levels[0].w, bd2.levels[0].d);
      addRoof(bGroup, topLv.w, topLv.d, baseY, bd2.roofType);
    }

    bGroup.position.set(bd2.x, -0.9, bd2.z);
    scene.add(bGroup);
  }

  /* ═══ 三、月台設施 ═══ */
  /* 車站站名標誌 */
  var signMat = new THREE.MeshStandardMaterial({ color: 0x1a4a7a, roughness: 0.3 });
  var signBack = new THREE.Mesh(new THREE.BoxGeometry(6, 1.5, 0.2), signMat);
  signBack.position.set(0, 7.5, -PLATFORM_LEN / 2 + 5);
  scene.add(signBack);

  /* 月台遮雨棚裝飾燈（精緻燈具：燈罩 + 燈泡） */
  var lampShadeMat = new THREE.MeshStandardMaterial({ color: 0xddddcc, roughness: 0.5 });
  var lampBulbMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffeeaa, emissiveIntensity: 0.4, roughness: 0.2 });
  for (var lz = -PLATFORM_LEN / 2 + 10; lz <= PLATFORM_LEN / 2 - 10; lz += 20) {
    var lampG = new THREE.Group();
    /* 燈罩 */
    var shade = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.3, 0.2, 8), lampShadeMat);
    shade.position.y = 5.8;
    lampG.add(shade);
    /* 燈泡 */
    var bulb = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), lampBulbMat);
    bulb.position.y = 5.68;
    lampG.add(bulb);
    /* 燈桿 */
    var stem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 4), lampShadeMat);
    stem.position.y = 5.95;
    lampG.add(stem);
    lampG.position.set(0, 0, lz);
    scene.add(lampG);
  }

  /* 路樹（月台外側） */
  var treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1a, roughness: 0.9 });
  var treeFoliageMat = new THREE.MeshStandardMaterial({ color: 0x3a7a2a, roughness: 0.85 });
  var treeFoliageB = new THREE.MeshStandardMaterial({ color: 0x2a6a1a, roughness: 0.85 });
  for (var ti = -PLATFORM_LEN / 2 + 15; ti <= PLATFORM_LEN / 2 - 15; ti += 35) {
    for (var tside = -1; tside <= 1; tside += 2) {
      var treeG = new THREE.Group();
      var trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3.5, 6), treeTrunkMat);
      trunk.position.y = 1.5;
      trunk.castShadow = true;
      treeG.add(trunk);
      /* 樹冠（多球疊加） */
      for (var fi2 = 0; fi2 < 4; fi2++) {
        var foliR = 1.5 + Math.random() * 0.8;
        var foliMat = Math.random() > 0.5 ? treeFoliageMat : treeFoliageB;
        var foli = new THREE.Mesh(new THREE.SphereGeometry(foliR, 8, 6), foliMat);
        foli.position.set((Math.random() - 0.5) * 1.2, 3.5 + Math.random() * 1.5, (Math.random() - 0.5) * 1.2);
        foli.scale.y = 0.7 + Math.random() * 0.3;
        foli.castShadow = true;
        treeG.add(foli);
      }
      treeG.position.set(tside * (PLATFORM_W / 2 + 8), -0.9, ti);
      scene.add(treeG);
    }
  }
}

/* ════════════════════════════════════════════════
   建立火車
   ════════════════════════════════════════════════ */
const trainSouth = new THREE.Group();
const trainNorth = new THREE.Group();
const northDoors = [];

function buildTrain(group, color, stripe, hasDoors) {
  var bodyMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.25, metalness: 0.35 });
  var stripeMat = new THREE.MeshStandardMaterial({ color: stripe, roughness: 0.3, metalness: 0.2 });
  var bottomMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.3 });
  var wheelMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.3 });
  var ventMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.6, metalness: 0.4 });
  var headlightMat = new THREE.MeshStandardMaterial({ color: 0xffffee, emissive: 0xffffcc, emissiveIntensity: 0.6, roughness: 0.1 });

  for (var i = 0; i < CAR_COUNT; i++) {
    var cz = -i * CAR_LEN;

    /* 車體主結構（圓頂造型） */
    var body = new THREE.Mesh(new THREE.BoxGeometry(3.2, 2.4, CAR_LEN - 1), bodyMat);
    body.position.set(0, 1.2, cz);
    body.castShadow = true;
    group.add(body);

    /* 圓頂 */
    var roofGeo = new THREE.CylinderGeometry(1.6, 1.6, CAR_LEN - 1.2, 12, 1, false, 0, Math.PI);
    var roofMat2 = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.3 });
    var roofMesh = new THREE.Mesh(roofGeo, roofMat2);
    roofMesh.rotation.z = Math.PI / 2;
    roofMesh.rotation.y = Math.PI / 2;
    roofMesh.position.set(0, 2.4, cz);
    group.add(roofMesh);

    /* 色帶（車身中段） */
    var stripeGeo = new THREE.BoxGeometry(3.22, 0.3, CAR_LEN - 1.2);
    var sm = new THREE.Mesh(stripeGeo, stripeMat);
    sm.position.set(0, 1.6, cz);
    group.add(sm);

    /* 下方色帶 */
    var stripe2 = new THREE.Mesh(new THREE.BoxGeometry(3.22, 0.1, CAR_LEN - 1.2), stripeMat);
    stripe2.position.set(0, 0.3, cz);
    group.add(stripe2);

    /* 窗戶（更精緻） */
    for (var wz = -CAR_LEN / 2 + 3; wz < CAR_LEN / 2 - 3; wz += 2.5) {
      for (var wside = 0; wside < 2; wside++) {
        var wx = wside === 0 ? -1.61 : 1.61;
        /* 窗框 */
        var wFrame = new THREE.Mesh(new THREE.BoxGeometry(0.04, 1.1, 1.6), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4 }));
        wFrame.position.set(wx, 1.9, cz + wz);
        group.add(wFrame);
        /* 玻璃 */
        var wGlass = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.9, 1.3), new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.05, metalness: 0.7, transparent: true, opacity: 0.7 }));
        wGlass.position.set(wx * 0.99, 1.9, cz + wz);
        group.add(wGlass);
      }
    }

    /* 車門（更精緻） */
    if (hasDoors) {
      for (var dIdx = 0; dIdx < 2; dIdx++) {
        var dz = dIdx === 0 ? -CAR_LEN / 4 : CAR_LEN / 4;
        var doorMatL = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.2, metalness: 0.5 });
        var doorL = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.2, 0.7), doorMatL);
        var doorR = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.2, 0.7), doorMatL.clone());
        doorL.position.set(1.61, 1.1, cz + dz - 0.35);
        doorR.position.set(1.61, 1.1, cz + dz + 0.35);
        /* 門上小窗 */
        var doorWinMat = new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.05, metalness: 0.6, transparent: true, opacity: 0.6 });
        var doorWinL = new THREE.Mesh(new THREE.PlaneGeometry(0.45, 0.5), doorWinMat);
        doorWinL.position.set(0.035, 0.5, 0);
        doorL.add(doorWinL);
        var doorWinR = new THREE.Mesh(new THREE.PlaneGeometry(0.45, 0.5), doorWinMat);
        doorWinR.position.set(0.035, 0.5, 0);
        doorR.add(doorWinR);
        group.add(doorL);
        group.add(doorR);
        northDoors.push({ left: doorL, right: doorR, z: cz + dz });
      }
    }

    /* 轉向架 + 輪組 */
    for (var bIdx = 0; bIdx < 2; bIdx++) {
      var bz = bIdx === 0 ? -CAR_LEN / 3 : CAR_LEN / 3;
      var bogie = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.4, 2.2), bottomMat);
      bogie.position.set(0, -0.1, cz + bz);
      group.add(bogie);
      /* 輪子（更精緻） */
      for (var wxi = 0; wxi < 2; wxi++) {
        for (var wzi = 0; wzi < 2; wzi++) {
          var wheelX = wxi === 0 ? -1.2 : 1.2;
          var wheelZ = wzi === 0 ? -0.5 : 0.5;
          var wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16), wheelMat);
          wheel.rotation.x = Math.PI / 2;
          wheel.position.set(wheelX, -0.4, cz + bz + wheelZ);
          group.add(wheel);
          /* 輪緣 */
          var flange = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.04, 16), wheelMat);
          flange.rotation.x = Math.PI / 2;
          flange.position.set(wheelX, -0.4, cz + bz + wheelZ + (wxi === 0 ? -0.08 : 0.08));
          group.add(flange);
        }
      }
    }

    /* 車頂通風口 */
    if (i % 2 === 0) {
      var vent = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.3, 0.6), ventMat);
      vent.position.set(0, 3.1, cz);
      group.add(vent);
    }

    /* 車廂連接器 */
    if (i > 0) {
      var conn = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.4), bottomMat);
      conn.position.set(0, 0.6, cz + CAR_LEN / 2 - 0.2);
      group.add(conn);
      /* 連接器彈簧 */
      var spring = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.3, 8), ventMat);
      spring.rotation.z = Math.PI / 2;
      spring.position.set(0, 0.3, cz + CAR_LEN / 2 - 0.2);
      group.add(spring);
    }
  }

  /* 車頭大燈 */
  var headL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.08, 12), headlightMat);
  headL.rotation.x = Math.PI / 2;
  headL.position.set(-0.8, 1.2, CAR_LEN / 2 - 0.5);
  group.add(headL);
  var headR = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.08, 12), headlightMat);
  headR.rotation.x = Math.PI / 2;
  headR.position.set(0.8, 1.2, CAR_LEN / 2 - 0.5);
  group.add(headR);

  /* 車頭擋風玻璃 */
  var frontGlass = new THREE.Mesh(
    new THREE.PlaneGeometry(2.2, 1.2),
    new THREE.MeshStandardMaterial({ color: 0x2a5a7a, roughness: 0.05, metalness: 0.5, transparent: true, opacity: 0.6 })
  );
  frontGlass.position.set(0, 2.0, CAR_LEN / 2 - 0.51);
  group.add(frontGlass);
}

function setupTrains() {
  buildTrain(trainSouth, 0x2c5f8a, 0x1a3a6a, false);
  trainSouth.position.set(-(PLATFORM_W / 2 + 3), -0.45, PLATFORM_LEN);
  scene.add(trainSouth);

  buildTrain(trainNorth, 0xcc6622, 0xe88833, true);
  trainNorth.position.set(PLATFORM_W / 2 + 3, -0.45, -PLATFORM_LEN);
  scene.add(trainNorth);
}

/* ════════════════════════════════════════════════
   黃線安全警衛（精緻 3D 模型）
   ════════════════════════════════════════════════ */
const guards = [];
const MAT_guardVest = new THREE.MeshStandardMaterial({ color: 0xccff00, roughness: 0.4, emissive: 0x445500, emissiveIntensity: 0.25 });
const MAT_guardSkin = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.75 });
const MAT_guardPants = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.65 });
const MAT_guardHat = new THREE.MeshStandardMaterial({ color: 0x1a1a6a, roughness: 0.5 });
const MAT_guardShirt = new THREE.MeshStandardMaterial({ color: 0x2a3a5a, roughness: 0.6 });
const MAT_guardBelt = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
const MAT_guardShoe = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 });

function playGuardWhistle() {
  if (!audioCtx) return;
  var now = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(2000, now);
  osc.frequency.linearRampToValueAtTime(2200, now + 0.15);
  osc.frequency.linearRampToValueAtTime(2000, now + 0.3);
  gain.gain.setValueAtTime(0.25, now);
  gain.gain.linearRampToValueAtTime(0.2, now + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.5);
}

function updateGuards(dt) {
  for (var gi = 0; gi < guards.length; gi++) {
    var g = guards[gi];
    var d = g.userData;

    /* Z patrol along the line (unlimited range on line) */
    g.position.z += d.patrolDir * d.patrolSpeed * dt;
    if (g.position.z > d.patrolMax) d.patrolDir = -1;
    if (g.position.z < d.patrolMin) d.patrolDir = 1;

    /* X wander: leave line up to maxWander toward center, stay on line freely */
    var mw = d.maxWander || 0.5;
    d.wanderTimer -= dt;
    if (d.wanderTimer <= 0) {
      d.wanderTarget = Math.random() * mw;
      d.wanderTarget *= -d.side;
      d.wanderTimer = 1.5 + Math.random() * 3;
    }
    d.wanderX += (d.wanderTarget - d.wanderX) * dt * 2;
    g.position.x = d.lineX + d.wanderX;

    /* 警衛也必須留在月台上 */
    var guardHalfW = PLATFORM_W / 2 - 0.3;
    var guardHalfZ = PLATFORM_LEN / 2 - 2;
    g.position.x = Math.max(-guardHalfW, Math.min(guardHalfW, g.position.x));
    g.position.z = Math.max(-guardHalfZ, Math.min(guardHalfZ, g.position.z));

    /* 警衛巡邏走路動畫 */
    if (!d.walkPhase) d.walkPhase = Math.random() * Math.PI * 2;
    d.walkPhase += d.patrolSpeed * dt * 5;
    var gSwing = Math.sin(d.walkPhase) * 0.3;
    if (d.leftLeg) d.leftLeg.rotation.x = gSwing;
    if (d.rightLeg) d.rightLeg.rotation.x = -gSwing;
    if (d.leftArm) d.leftArm.rotation.x = -gSwing * 0.5;
    if (d.rightArm) d.rightArm.rotation.x = gSwing * 0.5;

    /* Collision check with father */
    var dx = father.position.x - g.position.x;
    var dz = father.position.z - g.position.z;
    var dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 1.0 && state.guardSlowTimer <= 0) {
      state.guardSlowTimer = 5;
      showNarrative("\u300C\u8ACB\u52FF\u8DE8\u8D8A\u9EC3\u7DDA\u3002\u300D", 2);
      playGuardWhistle();
    }
  }
}

/* ════════════════════════════════════════════════
