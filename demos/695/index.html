<script type="module">
import * as THREE from 'three';

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const OV = $('overlay');
const HUD = $('hud');
const FIRE = $('fire-btn');
const TAP = $('tap-btn');
const FB = $('fb');
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}
function clear(n) { while (n && n.firstChild) n.removeChild(n.firstChild); }

function showFB(text, type) {
  FB.textContent = text;
  FB.className = 'show ' + type;
  setTimeout(() => { FB.className = ''; }, 1200);
}

function showHud(l1, l2, r1) {
  $('hud-l1').textContent = l1 || '';
  $('hud-l2').textContent = l2 || '';
  $('hud-r1').textContent = r1 || '';
  HUD.classList.add('show');
}
function hideHud() { HUD.classList.remove('show'); }

/* fade transition */
const FADE = $('fade');
function fadeOut(cb) {
  FADE.classList.add('in');
  setTimeout(() => { cb(); setTimeout(() => FADE.classList.remove('in'), 80); }, 650);
}

/* ══════════════════════════════════════════
   THREE.js SETUP
   ══════════════════════════════════════════ */
const clock = new THREE.Clock();
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = !isMobile;
if (!isMobile) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const darkScene = new THREE.Scene();
darkScene.background = new THREE.Color(0x0b0d08);
let activeScene = darkScene;

/* ══════════════════════════════════════════
   WEB AUDIO SFX
   ══════════════════════════════════════════ */
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

/* BGM */
const bgm = document.createElement('audio');
bgm.src = '%E7%9B%B8%E4%BF%A1%E3%80%8C%E7%9B%B8%E4%BF%A1%E7%9A%84%E5%8A%9B%E9%87%8F%E3%80%8D.mp3';
bgm.loop = true;
bgm.volume = 0.35;
let bgmPlaying = false;
const musicBtn = $('music-toggle');
musicBtn.textContent = '\u266B';

function startBGM() {
  bgm.play().then(() => {
    bgmPlaying = true;
    musicBtn.classList.add('show');
    musicBtn.classList.remove('off');
  }).catch(() => {});
}

function toggleBGM() {
  if (bgmPlaying) {
    bgm.pause();
    bgmPlaying = false;
    musicBtn.classList.add('off');
  } else {
    bgm.play().then(() => {
      bgmPlaying = true;
      musicBtn.classList.remove('off');
    }).catch(() => {});
  }
}
musicBtn.addEventListener('click', toggleBGM);

function sfxRadarTick() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 1200;
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.06);
}

function sfxCannon() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.06));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.35);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 300;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
  const o = audioCtx.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(15, t + 0.35);
  const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.4, t); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
  o.connect(g2); g2.connect(audioCtx.destination); o.start(t); o.stop(t + 0.45);
}

function sfxExplosion() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.6), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.1));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 500;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxHit() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(880, t); o.frequency.setValueAtTime(1320, t + 0.08);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.25);
}

function sfxMiss() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(100, t + 0.15);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.25);
}

function sfxFootstep() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.04), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.01));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.1;
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxHeartbeat() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(55, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.15);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.3);
}

function sfxEngine() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 65;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.04, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.15);
}

function sfxSlam() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.08), audioCtx.sampleRate);
  const d = buf.getChannelData(0);

  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.2;
  src.connect(g); g.connect(audioCtx.destination); src.start(t);
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.1);
  const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.25, t); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  o.connect(g2); g2.connect(audioCtx.destination); o.start(t); o.stop(t + 0.2);
}

function sfxWind() {
  if (!audioCtx) return;

  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.5), audioCtx.sampleRate);

  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 400; f.Q.value = 0.5;
  const g = audioCtx.createGain(); g.gain.value = 0.15;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxCricket() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 4200 + Math.random() * 400;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.03, t + i * 0.07); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.04);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.05);

}

function sfxOnionPop() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(1200, t + 0.04);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.12);
}

function sfxDiaryPage() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.08), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.025)) * 0.5;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
  const g = audioCtx.createGain(); g.gain.value = 0.06;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxMoo() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sawtooth';
  o.frequency.setValueAtTime(120, t);
  o.frequency.linearRampToValueAtTime(95, t + 0.4);
  o.frequency.linearRampToValueAtTime(110, t + 0.8);
  o.frequency.linearRampToValueAtTime(80, t + 1.2);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.06, t + 0.1);
  g.gain.setValueAtTime(0.06, t + 0.8);
  g.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 350;
  o.connect(f); f.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 1.5);
}

/* ══════════════════════════════════════════
   FLOW — diary → brief → level → result/scene → diary
   ══════════════════════════════════════════ */
const FLOW = [
  {t:'diary',i:0},
  {t:'diary',i:1},
  {t:'level',n:'artillery'},
  {t:'scene',n:'cow'},{t:'diary',i:2},
  {t:'diary',i:3},
  {t:'level',n:'run'},
  {t:'diary',i:4},
  {t:'diary',i:5},
  {t:'level',n:'train'},
  {t:'diary',i:6},
  {t:'level',n:'arm'},
  {t:'diary',i:7},
  {t:'level',n:'guard'},
  {t:'diary',i:8},
  {t:'level',n:'onion'},
  {t:'diary',i:9},
  {t:'end'}
];
let flowIdx = -1;
let currentLevel = null;
let levelInputs = [];

function advance() {
  stopLevel();
  flowIdx++;
  if (flowIdx >= FLOW.length) { fadeOut(() => showEnd()); return; }
  const step = FLOW[flowIdx];
  fadeOut(() => {
    if (step.t === 'diary') showDiary(step.i);
    else if (step.t === 'level') showLevel(step.n);
    else if (step.t === 'scene') showCinematic(step.n);
    else showEnd();
  });
}

function stopLevel() {
  hideHud();
  FIRE.classList.remove('show');
  TAP.classList.remove('show');
  FIRE.style.left = '50%';
  TAP.style.left = '50%';
  TAP.style.transform = 'translateX(-50%)';
  FIRE.textContent = 'F I R E';
  TAP.textContent = '踏 · 踏 · 踏';
  levelInputs.forEach(fn => fn());
  levelInputs = [];
  if (currentLevel && currentLevel.stop) currentLevel.stop();
  currentLevel = null;
  document.onkeydown = null;
  document.onkeyup = null;
}

/* ══════════════════════════════════════════
   LEVEL / CINEMATIC DISPATCH
   ══════════════════════════════════════════ */
function showLevel(name) {
  clear(OV); OV.classList.remove('active');
  const builders = { artillery: buildArtillery, run: buildRun, train: buildTrain, arm: buildArm, guard: buildGuard, onion: buildOnion };
  const builder = builders[name];
  if (!builder) { advance(); return; }
  const level = builder();
  activeScene = level.scene;
  currentLevel = level; // update() runs during brief so 3D animates

  const brief = BRIEFS[name];
  if (brief) {
    // Cinematic camera angle
    camera.position.set(...brief.camStart);
    camera.lookAt(...brief.camLook);
    showBriefOverlay(brief, () => {
      // Smooth camera dolly to gameplay position
      if (level.cameraSetup) {
        const targetPos = camera.position.clone();
        level.cameraSetup(camera);
        const gamePos = camera.position.clone();
        // Start from cinematic angle, lerp to game angle
        camera.position.copy(targetPos);
        const startT = Date.now();
        const dur = 1200;
        const dolly = setInterval(() => {
          const t = Math.min(1, (Date.now() - startT) / dur);
          const ease = t * t * (3 - 2 * t);
          camera.position.lerpVectors(targetPos, gamePos, ease);
          if (t >= 1) clearInterval(dolly);
        }, 16);
        levelInputs.push(() => clearInterval(dolly));
      }
      if (level.start) level.start();
    });
  } else {
    if (level.cameraSetup) level.cameraSetup(camera);
    if (level.start) level.start();
  }
}

/* ══════════════════════════════════════════
   BRIEF OVERLAY — cinematic text over 3D scene
   ══════════════════════════════════════════ */
function showBriefOverlay(brief, onDone) {
  clear(OV);
  const wrap = el('div', 'brief-wrap');

  // vignette
  const vig = el('div', 'brief-vignette');
  document.body.appendChild(vig);

  // story text lines
  const textBlock = el('div', 'brief-text');
  brief.lines.forEach((line, i) => {
    const row = el('div', 'brief-line', line || '\u00a0');
    row.style.animationDelay = (0.8 + i * 0.7) + 's';
    textBlock.appendChild(row);
  });
  wrap.appendChild(textBlock);

  // mission title card
  const titleCard = el('div', 'brief-title-card');
  titleCard.appendChild(el('div', 'brief-mission', brief.mission));
  titleCard.appendChild(el('div', 'brief-mission-name', brief.name));
  const titleDelay = 0.8 + brief.lines.length * 0.7 + 0.8;
  titleCard.style.animationDelay = titleDelay + 's';
  wrap.appendChild(titleCard);

  OV.appendChild(wrap);
  OV.classList.add('active');

  // skip button
  const skipBtn = el('div', 'brief-skip', '跳過 ›');
  document.body.appendChild(skipBtn);

  let done = false;
  function finish() {
    if (done) return;
    done = true;
    clearTimeout(autoTimer);
    if (vig.parentNode) vig.remove();
    if (skipBtn.parentNode) skipBtn.remove();
    clear(OV); OV.classList.remove('active');
    onDone();
  }

  // auto-advance after text + title + 2.5s
  const totalDelay = (titleDelay + 2.5) * 1000;
  const autoTimer = setTimeout(finish, totalDelay);

  // skip interactions
  skipBtn.addEventListener('click', finish);
  document.onkeydown = e => {
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); finish(); }
  };

  levelInputs.push(() => {
    clearTimeout(autoTimer);
    if (vig.parentNode) vig.remove();
    if (skipBtn.parentNode) skipBtn.remove();
  });
}

function showCinematic(name) {
  clear(OV); OV.classList.remove('active');
  const cinematics = { cow: buildCowScene };
  const builder = cinematics[name];
  if (!builder) { advance(); return; }
  currentLevel = builder();
  activeScene = currentLevel.scene;
  if (currentLevel.cameraSetup) currentLevel.cameraSetup(camera);
  if (currentLevel.start) currentLevel.start();
}

function makeCannon() {
  const g = new THREE.Group();
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x4a5a3a, metalness: 0.4, roughness: 0.6 });
  // barrel
  const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 2.5, 12), metalMat);
  barrel.rotation.z = Math.PI / 2;
  barrel.rotation.y = 0.1;
  barrel.position.set(0, 0.9, -0.6);
  barrel.castShadow = true;
  g.add(barrel);
  g.userData.barrel = barrel;
  // muzzle
  const muzzle = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.12, 0.15, 12), metalMat);
  muzzle.rotation.z = Math.PI / 2;
  muzzle.position.set(-1.3, 0.92, -0.6);
  g.add(muzzle);
  g.userData.muzzlePos = new THREE.Vector3(-1.5, 1.0, -0.6);
  // breech
  const breech = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.5), metalMat);
  breech.position.set(0.8, 0.9, -0.6);
  g.add(breech);
  // shield
  const shield = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.0, 1.4), metalMat);
  shield.position.set(0.1, 1.0, -0.6);
  g.add(shield);
  // wheels
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x2a2a1a, roughness: 0.9 });
  for (const s of [-1, 1]) {
    const wheel = new THREE.Mesh(new THREE.TorusGeometry(0.35, 0.06, 8, 16), wheelMat);
    wheel.position.set(0.3, 0.4, -0.6 + s * 0.8);
    wheel.rotation.y = Math.PI / 2;
    g.add(wheel);
    // spokes
    for (let i = 0; i < 6; i++) {
      const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.65, 4), wheelMat);
      spoke.rotation.x = (i / 6) * Math.PI;
      spoke.position.copy(wheel.position);
      g.add(spoke);
    }
  }
  // trail (legs behind)
  for (const s of [-1, 1]) {
    const trail = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.0, 6), metalMat);
    trail.rotation.x = -0.3;
    trail.position.set(1.6, 0.3, -0.6 + s * 0.35);
    g.add(trail);
  }
  return g;
}

function makeGrass(scene, count, area, color) {
  const mat = new THREE.MeshStandardMaterial({ color: color || 0x4a8a2a, roughness: 1 });
  for (let i = 0; i < count; i++) {
    const blade = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.3 + Math.random() * 0.2, 3), mat);
    blade.position.set((Math.random() - 0.5) * area, 0.1, (Math.random() - 0.5) * area);
    blade.rotation.x = (Math.random() - 0.5) * 0.3;
    scene.add(blade);
  }
}

function addFog(scene, color, density) {
  scene.fog = new THREE.FogExp2(color, density || 0.02);
}

/* ══════════════════════════════════════════
   L1 — ARTILLERY (full 3D with shell arc)
   ══════════════════════════════════════════ */
function buildArtillery() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x5a6a48);
  addFog(scene, 0x5a6a48, 0.008);

  // lighting
  scene.add(new THREE.HemisphereLight(0x8899aa, 0x443322, 0.4));
  const sun = new THREE.DirectionalLight(0xffe8c0, 2.0);
  sun.position.set(-15, 25, 10);
  sun.castShadow = !isMobile;
  if (!isMobile) { sun.shadow.mapSize.set(1024, 1024); sun.shadow.camera.far = 80; }
  scene.add(sun);

  // terrain — rolling hills
  const terrainGeo = new THREE.PlaneGeometry(120, 120, 48, 48);
  const posArr = terrainGeo.attributes.position.array;
  for (let i = 0; i < posArr.length; i += 3) {
    const x = posArr[i], y = posArr[i + 1];
    posArr[i + 2] = Math.sin(x * 0.08) * 1.2 + Math.cos(y * 0.06) * 0.8 + Math.random() * 0.2;
  }
  terrainGeo.computeVertexNormals();
  const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshStandardMaterial({ color: 0x5a7a3a, roughness: 1 }));
  terrain.rotation.x = -Math.PI / 2;
  terrain.receiveShadow = true;
  scene.add(terrain);

  // cannon
  const cannon = makeCannon();
  cannon.position.set(3, 0.3, 4);
  cannon.rotation.y = Math.PI;
  scene.add(cannon);

  // soldier (you) standing beside cannon
  const soldier = makeSoldier();
  soldier.position.set(5, 0.3, 4.5);
  soldier.rotation.y = -0.3;
  scene.add(soldier);

  // another soldier (loader)
  const loader = makeSoldier();
  loader.position.set(4.5, 0.3, 3);
  loader.rotation.y = -0.5;
  scene.add(loader);

  // ammo crates
  const crateMat = new THREE.MeshStandardMaterial({ color: 0x4a3a1a, roughness: 0.9 });
  for (let i = 0; i < 3; i++) {
    const crate = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, 0.35), crateMat);
    crate.position.set(6 + i * 0.6, 0.48, 3.8);
    crate.castShadow = true;
    scene.add(crate);
  }

  // target flag (far field)
  const targetGroup = new THREE.Group();
  const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 2.5, 4), new THREE.MeshBasicMaterial({ color: 0x888888 }));
  flagPole.position.y = 1.25;
  targetGroup.add(flagPole);
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.4), new THREE.MeshBasicMaterial({ color: 0xff2200, side: THREE.DoubleSide }));
  flag.position.set(0.3, 2.3, 0);
  targetGroup.add(flag);
  targetGroup.position.set(0, 0, -25);
  scene.add(targetGroup);

  // target ring on ground
  const targetRing = new THREE.Mesh(
    new THREE.RingGeometry(1.5, 2.0, 24),
    new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  targetRing.rotation.x = -Math.PI / 2;
  targetRing.position.set(0, 0.15, -25);
  scene.add(targetRing);

  // trees in background
  for (let i = 0; i < 25; i++) {
    const t = makeTree(2 + Math.random() * 2, 0x2a5a18);
    t.position.set(-30 + Math.random() * 60, 0, -40 - Math.random() * 15);
    scene.add(t);
  }

  // HUD radar (mini on screen via 3D plane at corner) — keep simple overlay approach
  // We use a small radar plane in screen space via CSS overlay. The 3D scene IS the battlefield.

  // shell projectile
  const shellMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0x1a1a0a })
  );
  shellMesh.visible = false;
  scene.add(shellMesh);

  // shell trail
  const trailPts = [];
  for (let i = 0; i < 40; i++) trailPts.push(new THREE.Vector3());
  const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPts);
  const trail = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: 0x888866, transparent: true, opacity: 0.5 }));
  trail.visible = false;
  scene.add(trail);

  // explosion particles
  const particles = [];
  const particleMat = new THREE.MeshBasicMaterial({ color: 0xff6600 });
  const debrisMat = new THREE.MeshBasicMaterial({ color: 0x5a4a2a });
  for (let i = 0; i < 30; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 4, 4),
      i < 15 ? particleMat.clone() : debrisMat.clone()
    );
    p.visible = false;
    scene.add(p);
    particles.push({ mesh: p, vel: new THREE.Vector3(), life: 0 });
  }

  // smoke puff
  const smokeMat = new THREE.MeshBasicMaterial({ color: 0xccccaa, transparent: true, opacity: 0.4 });
  const smokes = [];
  for (let i = 0; i < 8; i++) {
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 6), smokeMat.clone());
    s.visible = false;
    scene.add(s);
    smokes.push(s);
  }

  // state
  const st = {
    score: 0, life: 3, alive: true, locked: false,
    shell: null, // { start, end, progress, hit }
    targetPos: new THREE.Vector3(0, 0, -25),
    explosionTime: 0
  };

  function newTarget() {
    const x = (Math.random() - 0.5) * 30;
    const z = -20 - Math.random() * 20;
    st.targetPos.set(x, 0, z);
    targetGroup.position.set(x, 0, z);
    targetRing.position.set(x, 0.15, z);
    st.locked = false;
    flag.material.color.setHex(0xff2200);
  }

  function fireShell() {
    if (!st.alive || st.locked || st.shell) return;
    st.locked = true;
    sfxCannon();

    // muzzle flash
    smokes.forEach((s, i) => {
      s.visible = true;
      s.position.set(3 - 1.5 + (Math.random() - 0.5) * 0.5, 1.0 + Math.random() * 0.3, 4 - 0.6 + (Math.random() - 0.5) * 0.3);
      s.scale.setScalar(0.5 + Math.random() * 0.5);
      s.material.opacity = 0.5;
      setTimeout(() => { s.visible = false; }, 400 + i * 50);
    });

    // calculate hit/miss based on timing (random aim quality)
    const aimError = Math.random() * 8 - 4; // -4 to 4
    const hitX = st.targetPos.x + aimError;
    const hitZ = st.targetPos.z + (Math.random() - 0.5) * 4;
    const dist = Math.sqrt(aimError * aimError);
    const hit = dist < 2.5;

    const start = new THREE.Vector3(3 - 1.5, 1.0, 4 - 0.6);
    const end = new THREE.Vector3(hitX, 0, hitZ);

    st.shell = { start, end, progress: 0, hit, trailIdx: 0 };
    shellMesh.visible = true;
    trail.visible = true;
    // reset trail
    const tp = trail.geometry.attributes.position.array;
    for (let i = 0; i < tp.length; i++) tp[i] = 0;
  }

  function explode(pos, hit) {
    sfxExplosion();
    st.explosionTime = Date.now();
    // scatter particles
    particles.forEach(p => {
      p.mesh.visible = true;
      p.mesh.position.copy(pos);
      p.vel.set((Math.random() - 0.5) * 8, 3 + Math.random() * 5, (Math.random() - 0.5) * 8);
      p.life = 0.8 + Math.random() * 0.5;
      p.mesh.scale.setScalar(1);
    });

    if (hit) {
      sfxHit();
      showFB('命中！', 'ok');
      st.score++;
      flag.material.color.setHex(0x44ff44);
      showHud(st.score + ' / 5', 'MISSION 01', '●'.repeat(st.life));
      if (st.score >= 5) {
        st.alive = false;
        // build cow meadow scene for result bg
        const meadow = buildMeadowBg();
        setTimeout(() => finishLevel({
          code: 'MISSION 01 · 達成', title: '全連第一名',
          sub: [['','滿分通過砲兵射擊。'],['em','結果任務 —— 顧一頭牛。'],['','你對著牛，數她的睫毛。']],
          stats: [['命中','5 / 5'],['剩餘','●'.repeat(st.life)],['任務','牛 × 1']]
        }, meadow), 1500);
        return;
      }
      setTimeout(() => { newTarget(); }, 1500);
    } else {
      sfxMiss();
      showFB('偏離目標。', 'ng');
      st.life--;
      showHud(st.score + ' / 5', 'MISSION 01', '●'.repeat(Math.max(0, st.life)));
      if (st.life <= 0) {
        st.life = 3; st.score = 0;
        showHud('0 / 5', '', '● ● ●');
      }
      setTimeout(() => { newTarget(); }, 1500);
    }
  }

  return {
    scene,
    cameraSetup(cam) {
      cam.position.set(8, 5, 10);
      cam.lookAt(0, 0, -10);
    },
    start() {
      showHud('0 / 5', 'MISSION 01', '● ● ●');
      FIRE.classList.add('show');
      FIRE.onclick = fireShell;
      document.onkeydown = e => { if (e.code === 'Space') { e.preventDefault(); fireShell(); } };
      newTarget();
      levelInputs.push(() => { FIRE.onclick = null; });
    },
    update(dt) {
      if (!st.alive && !st.shell) return;

      // animate shell
      if (st.shell) {
        st.shell.progress += dt * 0.7; // ~1.4s flight time
        const t = Math.min(1, st.shell.progress);
        const s = st.shell.start, e = st.shell.end;
        const x = s.x + (e.x - s.x) * t;
        const z = s.z + (e.z - s.z) * t;
        const y = s.y + (e.y - s.y) * t + 12 * Math.sin(Math.PI * t); // parabolic arc peaking at 12m
        shellMesh.position.set(x, y, z);

        // update trail
        const tp = trail.geometry.attributes.position.array;
        const idx = Math.min(39, Math.floor(t * 39));
        for (let i = idx; i >= 0; i--) {
          const tt = i / 39;
          const tx = s.x + (e.x - s.x) * tt;
          const tz = s.z + (e.z - s.z) * tt;
          const ty = s.y + (e.y - s.y) * tt + 12 * Math.sin(Math.PI * tt);
          tp[i * 3] = tx; tp[i * 3 + 1] = ty; tp[i * 3 + 2] = tz;
        }
        trail.geometry.attributes.position.needsUpdate = true;

        if (t >= 1) {
          shellMesh.visible = false;
          trail.visible = false;
          explode(st.shell.end, st.shell.hit);
          st.shell = null;
        }
      }

      // animate particles
      particles.forEach(p => {
        if (!p.mesh.visible) return;
        p.life -= dt;
        if (p.life <= 0) { p.mesh.visible = false; return; }
        p.vel.y -= 12 * dt; // gravity
        p.mesh.position.addScaledVector(p.vel, dt);
        p.mesh.scale.setScalar(Math.max(0.1, p.life));
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.material.transparent = true;
      });

      // muzzle smoke fade
      smokes.forEach(s => {
        if (!s.visible) return;
        s.material.opacity -= dt * 1.5;
        s.position.y += dt * 0.5;
        s.scale.multiplyScalar(1 + dt * 2);
        if (s.material.opacity <= 0) s.visible = false;
      });

      // flag flutter
      flag.rotation.y = Math.sin(Date.now() * 0.003) * 0.2;

      // camera slight sway
      camera.position.x = 8 + Math.sin(Date.now() * 0.0004) * 0.3;
    },
    stop() { st.alive = false; }
  };
}

  }

  // clouds (flat planes)
  const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
  for (let i = 0; i < 5; i++) {
    const cloud = new THREE.Mesh(new THREE.PlaneGeometry(4 + Math.random() * 6, 1.5 + Math.random()), cloudMat);
    cloud.position.set(-15 + i * 8, 18 + Math.random() * 5, -20 - Math.random() * 10);
    cloud.lookAt(camera.position);
    scene.add(cloud);
  }

  let elapsed = 0;
  let autoTimer;
  let mooPlayed = false;

  return {
    scene,
    cameraSetup(cam) {
      cam.position.set(5, 2.5, 6);
      cam.lookAt(0, 0.8, -1);
    },
    start() {
      // cinematic text overlay
      const text = el('div', 'cine-text');
      text.appendChild(document.createTextNode('牛的眼睛，比我想的還像妳。'));
      text.appendChild(el('br'));
      text.appendChild(document.createTextNode('溫的，黑的。'));
      text.appendChild(el('br'));
      text.appendChild(document.createTextNode('看過我一眼，就低頭吃草。'));
      document.body.appendChild(text);

      const skip = el('div', 'cine-skip', '繼續 ›');
      skip.addEventListener('click', goNext);
      document.body.appendChild(skip);

      autoTimer = setTimeout(goNext, 8000);
      document.onkeydown = e => { if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); goNext(); } };

      function goNext() {
        clearTimeout(autoTimer);
        if (text.parentNode) text.remove();
        if (skip.parentNode) skip.remove();
        document.onkeydown = null;
        advance();
      }
      levelInputs.push(() => {
        clearTimeout(autoTimer);
        if (text.parentNode) text.remove();
        if (skip.parentNode) skip.remove();
      });
    },
    update(dt) {
      elapsed += dt;
      // cow head bob (eating grass)
      if (cow.userData.head) {
        cow.userData.head.rotation.x = Math.sin(elapsed * 0.8) * 0.15 - 0.2;
      }
      // tail swish
      if (cow.userData.tail) {
        cow.userData.tail.rotation.z = Math.sin(elapsed * 2) * 0.3;
      }
      // camera slow orbit
      const angle = elapsed * 0.05;
      camera.position.x = 5 * Math.cos(angle);
      camera.position.z = 6 * Math.sin(angle) + 2;
      camera.position.y = 2.5 + Math.sin(elapsed * 0.3) * 0.2;
      camera.lookAt(0, 0.8, -1);
      // moo
      if (!mooPlayed && elapsed > 2) {
        mooPlayed = true;
        sfxMoo();
      }
    },
    stop() {}
  };
}

/* ══════════════════════════════════════════
   L2 — 3000m RUN
   ══════════════════════════════════════════ */
function buildRun() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a3040);
  addFog(scene, 0x2a3040, 0.006);
  scene.add(new THREE.HemisphereLight(0x445566, 0x332211, 0.5));
  const sun = new THREE.DirectionalLight(0xffe0b0, 1.5);
  sun.position.set(20, 30, 10);
  sun.castShadow = !isMobile;
  scene.add(sun);

  // track surface (red clay)
  const track = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 400),
    new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.95 })
  );
  track.rotation.x = -Math.PI / 2;
  track.position.z = -150;
  scene.add(track);

  // lane lines
  for (let lane = -4; lane <= 4; lane++) {
    const line = new THREE.Mesh(
      new THREE.PlaneGeometry(0.04, 400),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    line.rotation.x = -Math.PI / 2;
    line.position.set(lane * 1.2, 0.01, -150);
    scene.add(line);
  }

  // distance markers every 500m
  for (let d = 500; d <= 3000; d += 500) {
    const marker = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.1), new THREE.MeshStandardMaterial({ color: 0xcccccc }));
    marker.position.set(5.5, 0.6, -(d / 3000) * 350);
    scene.add(marker);
  }

  // runner (you)
  const runner = makeSoldier();
  scene.add(runner);

  // other runners
  const others = [];
  for (let i = 0; i < 5; i++) {
    const o = makeSoldier();
    o.position.set(-2.4 + i * 1.2 + (i >= 3 ? 1.2 : 0), 0, -3 - i * 4);
    scene.add(o);
    others.push({ mesh: o, speed: 0.6 + Math.random() * 0.4, dist: 0 });
  }

  // barracks in background
  const barrackMat = new THREE.MeshStandardMaterial({ color: 0x888877, roughness: 0.9 });
  for (let i = 0; i < 3; i++) {
    const b = new THREE.Mesh(new THREE.BoxGeometry(8, 3, 4), barrackMat);
    b.position.set(-14, 1.5, -20 - i * 25);
    b.castShadow = true;
    scene.add(b);
    const roof = new THREE.Mesh(new THREE.BoxGeometry(9, 0.3, 5), new THREE.MeshStandardMaterial({ color: 0x665544 }));
    roof.position.set(-14, 3.15, -20 - i * 25);
    scene.add(roof);
  }

  // trees along track
  for (let i = 0; i < 30; i++) {
    const t = makeTree(2 + Math.random() * 2);
    t.position.set(8 + Math.random() * 4, 0, -i * 12);
    scene.add(t);
  }

  const st = { dist: 0, time: 720, taps: 0, hr: 72, alive: true, lastTap: 0, elapsed: 0, nextHb: 0, runPhase: 0 };
  let timer;

  function tap() {
    if (!st.alive) return;
    const now = performance.now();
    if (now - st.lastTap < 80) return;
    st.lastTap = now;
    st.dist += 4.5 + Math.random() * 1.5;
    st.taps++;
    st.hr = Math.min(180, 72 + Math.floor(st.taps / 3));
    sfxFootstep();
    st.runPhase += 0.5;
  }

  function tick() {
    if (!st.alive) return;
    st.time--;
    st.elapsed = 720 - st.time;
    const mm = Math.floor(st.time / 60);
    const ss = st.time % 60;
    showHud(Math.floor(st.dist) + 'm', 'MISSION 02', mm + ':' + (ss < 10 ? '0' : '') + ss);
    if (st.dist >= 3000) {
      st.alive = false; clearInterval(timer);
      const em = Math.floor(st.elapsed / 60), es = st.elapsed % 60;
      finishLevel({
        code: 'MISSION 02 · 達成', title: '3000m · ' + em + '分' + (es < 10 ? '0' : '') + es + '秒',
        sub: [['','12 分鐘內完成。'],['em','榮譽假提早到今晚 21:00。'],['','你賺了 11 個小時。']],
        stats: [['距離','3000m'],['時間',em+':'+(es<10?'0':'')+es],['心跳',st.hr+'']]
      });
    } else if (st.time <= 0) {
      st.alive = false; clearInterval(timer);
      finishLevel({
        code: 'MISSION 02 · 未達成', title: '時間到',
        sub: [['','距離不足。'],['em','但班長沒有處罰你。'],['','他只說：「明天再跑一次。」']],
        stats: [['距離',Math.floor(st.dist)+'m'],['時間','12:00'],['心跳',st.hr+'']]
      });
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(2, 3, 8); cam.lookAt(0, 1, -5); },
    start() {
      showHud('0m', 'MISSION 02', '12:00');
      TAP.classList.add('show');
      TAP.onclick = tap;
      document.onkeydown = e => { if (e.code === 'Space') { e.preventDefault(); tap(); } };
      timer = setInterval(tick, 1000);
      levelInputs.push(() => { clearInterval(timer); TAP.onclick = null; });
    },
    update(dt) {
      if (!st.alive) return;
      const pct = st.dist / 3000;
      // runner position
      runner.position.z = -pct * 350;
      runner.position.y = 0;
      // leg animation
      if (runner.userData.leftLeg && runner.userData.rightLeg) {
        runner.userData.leftLeg.rotation.x = Math.sin(st.runPhase) * 0.5;
        runner.userData.rightLeg.rotation.x = -Math.sin(st.runPhase) * 0.5;
      }
      // runner bob
      runner.position.y = Math.abs(Math.sin(st.runPhase * 2)) * 0.08;
      // camera follow
      camera.position.set(2, 3, runner.position.z + 8);
      camera.lookAt(0, 1, runner.position.z - 5);
      // other runners
      others.forEach(o => {
        o.dist += o.speed * dt * 4;
        o.mesh.position.z = -3 - (o.dist / 3000) * 350 + o.mesh.position.z * 0;
        o.mesh.position.z = -(o.dist / 3000) * 350;
      });
      // heartbeat
      if (st.hr > 120 && Date.now() > st.nextHb) {
        sfxHeartbeat();
        st.nextHb = Date.now() + (60000 / st.hr);
      }
    },
    stop() { st.alive = false; clearInterval(timer); }
  };
}

/* ══════════════════════════════════════════
   L3 — TRAIN CHASE
   ══════════════════════════════════════════ */
function buildTrain() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x4a2818);
  addFog(scene, 0x4a2818, 0.008);
  scene.add(new THREE.HemisphereLight(0xffa060, 0x331808, 0.6));
  const sun = new THREE.DirectionalLight(0xffaa44, 1.8);
  sun.position.set(-20, 20, 10); scene.add(sun);

  // road
  const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 400), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.95 }));
  road.rotation.x = -Math.PI / 2; road.position.set(-4, 0, -150); scene.add(road);
  // road dashes
  for (let z = 0; z < 400; z += 6) {
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 3), new THREE.MeshBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.5 }));
    dash.rotation.x = -Math.PI / 2; dash.position.set(-4, 0.01, -z); scene.add(dash);
  }

  // rail tracks
  for (const xOff of [-0.3, 0.3]) {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 400), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 }));
    rail.position.set(4 + xOff, 0.04, -150); scene.add(rail);
  }
  // sleepers
  for (let z = 0; z < 400; z += 2) {
    const sleeper = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.2), new THREE.MeshStandardMaterial({ color: 0x5a3e18, roughness: 0.9 }));
    sleeper.position.set(4, 0.02, -z); scene.add(sleeper);
  }

  // car (detailed)
  const car = new THREE.Group();
  const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 3.5), new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3, metalness: 0.4 }));
  carBody.position.y = 0.65; car.add(carBody);
  // car roof
  const carRoof = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.15, 3.2), new THREE.MeshStandardMaterial({ color: 0xaaaaaa }));
  carRoof.position.y = 1.1; car.add(carRoof);
  // windshield
  const windshield = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.5), new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5, metalness: 0.8 }));
  windshield.position.set(0, 0.9, -1.76); car.add(windshield);
  // headlights
  for (const s of [-0.6, 0.6]) {
    const hl = new THREE.PointLight(0xffffcc, 2, 20);
    hl.position.set(s, 0.5, -1.8); car.add(hl);
    const hlMesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffaa }));
    hlMesh.position.copy(hl.position); car.add(hlMesh);
  }
  // wheels
  const wheelGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.08, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  for (const z of [-1.2, 1.2]) {
    for (const x of [-0.9, 0.9]) {
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.rotation.x = Math.PI / 2; w.position.set(x, 0.22, z); car.add(w);
    }
  }
  // driver and you inside
  const driver = makeSoldier();
  driver.scale.setScalar(0.35);
  driver.position.set(-0.3, 0.6, -0.5);
  car.add(driver);
  const passenger = makeSoldier();
  passenger.scale.setScalar(0.35);
  passenger.position.set(0.3, 0.6, 0);
  car.add(passenger);
  car.position.set(-4, 0, 0);
  scene.add(car);

  // train (detailed with windows)
  const train = new THREE.Group();
  const trainMat = new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.5, roughness: 0.4 });
  const windowMat = new THREE.MeshBasicMaterial({ color: 0xffeeaa });
  for (let i = 0; i < 5; i++) {
    const wagon = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 6), trainMat);
    wagon.position.set(0, 1.3, -i * 6.5);
    wagon.castShadow = true;
    train.add(wagon);
    // windows (lit)
    for (let w = -2; w <= 2; w++) {
      for (const s of [-1, 1]) {
        const win = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 0.5), windowMat);
        win.position.set(s * 1.11, 1.6, -i * 6.5 + w * 1.1);
        win.rotation.y = s * Math.PI / 2;
        train.add(win);
      }
    }
    // roof
    const wRoof = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.15, 6.2), new THREE.MeshStandardMaterial({ color: 0x556677 }));
    wRoof.position.set(0, 2.45, -i * 6.5);
    train.add(wRoof);
  }
  // locomotive at front
  const loco = new THREE.Mesh(new THREE.BoxGeometry(2.4, 2.8, 4), new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.6 }));
  loco.position.set(0, 1.5, 4);
  train.add(loco);
  const locoLight = new THREE.PointLight(0xffff88, 2, 25);
  locoLight.position.set(0, 2, 6.5);
  train.add(locoLight);

  train.position.set(4, 0, -10);
  scene.add(train);

  // trees
  const treeMat2 = new THREE.MeshStandardMaterial({ color: 0x2a4a18 });
  for (let z = 0; z < 300; z += 6) {
    for (const x of [-12, 12]) {
      const t = makeTree(2 + Math.random() * 2);
      t.position.set(x + Math.random() * 3, 0, -z);
      scene.add(t);
    }
  }

  const st = { speed: 60, time: 30, alive: true, hold: false, carZ: 0, trainZ: -10 };
  let timer;
  function press() { st.hold = true; }
  function release() { st.hold = false; }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(-2, 3, 14); cam.lookAt(-2, 1, -10); },
    start() {
      showHud('30', 'MISSION 03', '60 km/h');
      TAP.textContent = '按住加速';
      TAP.classList.add('show');
      TAP.onmousedown = press; TAP.onmouseup = release; TAP.onmouseleave = release;
      TAP.ontouchstart = e => { e.preventDefault(); press(); };
      TAP.ontouchend = e => { e.preventDefault(); release(); };
      document.onkeydown = e => { if (e.code === 'Space') { e.preventDefault(); press(); } };
      document.onkeyup = e => { if (e.code === 'Space') { e.preventDefault(); release(); } };
      timer = setInterval(() => {
        if (!st.alive) return;
        st.time--;
        showHud(st.time + '', 'MISSION 03', Math.floor(st.speed) + ' km/h');
        if (st.time <= 0) {
          st.alive = false; clearInterval(timer);
          finishLevel({
            code: 'MISSION 03 · 達成', title: '新竹月台 · 準時抵達',
            sub: [['','哥哥把油門踩到底。'],['em','火車剛進月台。'],['','他揮了揮手，沒下車，直接走。']],
            stats: [['最高時速',Math.floor(st.speed)+''],['撐過','30s'],['攔截','成功']]
          });
        }
      }, 1000);
      levelInputs.push(() => {
        clearInterval(timer);
        TAP.onmousedown = null; TAP.onmouseup = null; TAP.onmouseleave = null;
        TAP.ontouchstart = null; TAP.ontouchend = null;
      });
    },
    update(dt) {
      if (!st.alive) return;
      if (st.hold) { st.speed = Math.min(180, st.speed + 80 * dt); sfxEngine(); }
      else st.speed = Math.max(50, st.speed - 30 * dt);
      const carMove = st.speed * dt * 0.5;
      const trainMove = 100 * dt * 0.5;
      st.carZ -= carMove;
      st.trainZ -= trainMove;
      car.position.z = st.carZ;
      train.position.z = st.trainZ;
      // car wheel spin
      car.children.forEach(c => {
        if (c.geometry && c.geometry.type === 'CylinderGeometry' && c.position.y < 0.3) {
          c.rotation.z += st.speed * dt * 0.1;
        }
      });
      camera.position.z = st.carZ + 14;
      camera.position.x = -2 + Math.sin(Date.now() * 0.001) * 0.3;
      camera.lookAt(-2, 1, st.carZ - 10);
      if (st.trainZ < st.carZ - 8) {
        st.alive = false; clearInterval(timer);
        finishLevel({
          code: 'MISSION 03 · 未達成', title: '火車追過去了',
          sub: [['','車速掉下來。'],['em','但哥哥沒說什麼。'],['','他只說：「下次，早點出門。」']],
          stats: [['最高時速',Math.floor(st.speed)+''],['撐過',(30-st.time)+'s'],['距離差','—']]
        });
      }
    },
    stop() { st.alive = false; clearInterval(timer); }
  };
}

/* ══════════════════════════════════════════
   L4 — ARM WRESTLING
   ══════════════════════════════════════════ */
function buildArm() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1008);
  scene.add(new THREE.AmbientLight(0x332211, 0.2));
  const lamp = new THREE.PointLight(0xffcc88, 2, 20);
  lamp.position.set(0, 4, 0);
  lamp.castShadow = !isMobile;
  scene.add(lamp);
  // lamp mesh (hanging bulb)
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffdd88 }));
  bulb.position.set(0, 3.8, 0);
  scene.add(bulb);
  const wire = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 1.5, 4), new THREE.MeshBasicMaterial({ color: 0x444444 }));
  wire.position.set(0, 4.5, 0);
  scene.add(wire);

  // floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x2a2218, roughness: 1 }));
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

  // table
  const tableMat = new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.7 });
  const tableTop = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.12, 1.5), tableMat);
  tableTop.position.y = 1.0; tableTop.receiveShadow = true; tableTop.castShadow = true;
  scene.add(tableTop);
  for (const pos of [[-1, 0, -0.5], [1, 0, -0.5], [-1, 0, 0.5], [1, 0, 0.5]]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 1, 6), tableMat);
    leg.position.set(pos[0], 0.5, pos[2]); scene.add(leg);
  }

  // beer bottles on table
  const bottleMat = new THREE.MeshStandardMaterial({ color: 0x2a5a1a, transparent: true, opacity: 0.7 });
  for (let i = 0; i < 4; i++) {
    const bottle = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.25, 8), bottleMat);
    bottle.position.set(-0.8 + i * 0.3, 1.19, -0.5);
    scene.add(bottle);
  }

  // two arms on table (detailed forearms + fists)
  const armMat1 = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.7 });
  const armMat2 = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.7 });
  const pivot = new THREE.Group();
  pivot.position.set(0, 1.35, 0);
  // your arm (left side)
  const arm1 = new THREE.Group();
  const forearm1 = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.7, 8), armMat1);
  forearm1.position.y = 0.35;
  arm1.add(forearm1);
  const fist1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), armMat1);
  fist1.position.y = 0.72;
  arm1.add(fist1);
  arm1.position.set(-0.15, 0, 0);
  pivot.add(arm1);
  // opponent arm
  const arm2 = new THREE.Group();
  const forearm2 = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.11, 0.7, 8), armMat2);
  forearm2.position.y = 0.35;
  arm2.add(forearm2);
  const fist2 = new THREE.Mesh(new THREE.SphereGeometry(0.11, 8, 8), armMat2);
  fist2.position.y = 0.72;
  arm2.add(fist2);
  arm2.position.set(0.15, 0, 0);
  pivot.add(arm2);
  scene.add(pivot);

  // crowd silhouettes (soldiers around table)
  for (let i = 0; i < 8; i++) {
    const sil = makeSoldier();
    const angle = (i / 8) * Math.PI * 2;
    const r = 2.5 + Math.random() * 0.5;
    sil.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
    sil.lookAt(0, 1, 0);
    // darken them
    sil.traverse(c => { if (c.material) { c.material = c.material.clone(); c.material.color.multiplyScalar(0.2); } });
    scene.add(sil);
  }

  const OPPS = [
    { name:'阿忠 · 一兵', power: 0.8 },
    { name:'大胖 · 下士', power: 1.0 },
    { name:'阿榮 · 上兵', power: 1.3 },
    { name:'瘦皮 · 班長', power: 1.6 },
    { name:'老虎 · 副排', power: 1.9 }
  ];
  const st = { round: 0, value: 0, last: '', alive: true };
  let drain;

  function push(side) {
    if (!st.alive || st.last === side) return;
    st.last = side;
    st.value += 4;
    sfxSlam();
  }

  function nextRound() {
    const opp = OPPS[st.round];
    showHud('Round ' + (st.round + 1) + ' / 5', 'MISSION 04', opp.name);
    st.value = 0;
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 2.8, 2.8); cam.lookAt(0, 1.2, 0); },
    start() {
      nextRound();
      FIRE.textContent = '← A';
      FIRE.classList.add('show');
      FIRE.style.left = '25%';
      TAP.textContent = 'D →';
      TAP.classList.add('show');
      TAP.style.left = '75%';
      TAP.style.transform = 'translateX(-50%)';
      FIRE.onclick = () => push('L');
      TAP.onclick = () => push('R');
      document.onkeydown = e => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') { e.preventDefault(); push('L'); }
        if (e.code === 'KeyD' || e.code === 'ArrowRight') { e.preventDefault(); push('R'); }
      };
      drain = setInterval(() => {
        if (!st.alive) return;
        const opp = OPPS[st.round];
        st.value -= opp.power * 0.9;
        if (st.value <= -50) {
          st.alive = false; clearInterval(drain);
          finishLevel({
            code: 'MISSION 04 · 未達成', title: '被壓了下去',
            sub: [['','右手還在發燙。'],['em','但你沒有鬆開。'],['','班長說：「明晚再來。」']],
            stats: [['過關','Round ' + st.round + ' / 5'],['對手',OPPS[st.round].name],['右手','還在']]
          });
        } else if (st.value >= 50) {
          sfxSlam();
          st.value = 0; st.last = ''; st.round++;
          if (st.round >= 5) {
            st.alive = false; clearInterval(drain);
            finishLevel({
              code: 'MISSION 04 · 達成', title: '全連皆輸',
              sub: [['','五輪。'],['em','全連都笑不出來了。'],['','班長拍拍你的肩，沒問。']],
              stats: [['連勝','5 / 5'],['剩餘力氣','█ █ █'],['右手','還在']]
            });
          } else nextRound();
        }
      }, 50);
      levelInputs.push(() => { clearInterval(drain); FIRE.onclick = null; TAP.onclick = null; });
    },
    update(dt) {
      if (!st.alive) return;
      const pct = Math.max(-100, Math.min(100, st.value));
      pivot.rotation.z = pct * 0.008;
      lamp.intensity = 2 + Math.sin(Date.now() * 0.01) * 0.15;
      bulb.material.color.setHSL(0.12, 0.8, 0.7 + Math.sin(Date.now() * 0.008) * 0.05);
      // camera shake on push
      camera.position.x = Math.sin(Date.now() * 0.02) * Math.abs(pct) * 0.001;
    },
    stop() { st.alive = false; clearInterval(drain); }
  };
}

/* ══════════════════════════════════════════
   L5 — MIDNIGHT GUARD
   ══════════════════════════════════════════ */
function buildGuard() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020408);
  addFog(scene, 0x020408, 0.03);
  scene.add(new THREE.AmbientLight(0x111118, 0.08));

  // moon
  const moon = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshBasicMaterial({ color: 0xeeeedd }));
  moon.position.set(20, 30, -25);
  scene.add(moon);
  const moonLight = new THREE.DirectionalLight(0x334455, 0.12);
  moonLight.position.copy(moon.position);
  scene.add(moonLight);

  // stars
  const starGeo = new THREE.BufferGeometry();
  const starPos = [];
  for (let i = 0; i < 200; i++) {
    starPos.push((Math.random() - 0.5) * 100, 20 + Math.random() * 30, -30 - Math.random() * 50);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 }));
  scene.add(stars);

  // flashlight
  const flashlight = new THREE.SpotLight(0xffffcc, 4, 35, Math.PI * 0.12, 0.5, 1.5);
  flashlight.position.set(0, 2, 0);
  flashlight.target.position.set(0, 0, -10);
  scene.add(flashlight);
  scene.add(flashlight.target);

  // ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(80, 80),
    new THREE.MeshStandardMaterial({ color: 0x0a0c06, roughness: 1 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // guard post (detailed)
  const post = new THREE.Group();
  // walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a3a2a, roughness: 0.9 });
  const wallBack = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 0.15), wallMat);
  wallBack.position.set(0, 1.25, 0.9); post.add(wallBack);
  for (const s of [-1, 1]) {
    const sideWall = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.5, 2), wallMat);
    sideWall.position.set(s * 1.2, 1.25, 0); post.add(sideWall);
  }
  const roof = new THREE.Mesh(new THREE.BoxGeometry(3, 0.12, 2.8), new THREE.MeshStandardMaterial({ color: 0x555544 }));
  roof.position.y = 2.6; post.add(roof);
  // sandbags
  const sandbagMat = new THREE.MeshStandardMaterial({ color: 0x5a5a3a, roughness: 1 });
  for (let row = 0; row < 2; row++) {
    for (let i = -2; i <= 2; i++) {
      const bag = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.2, 0.3), sandbagMat);
      bag.position.set(i * 0.5, row * 0.22 + 0.1, -0.9);
      post.add(bag);
    }
  }
  post.position.set(-4, 0, 3);
  scene.add(post);

  // soldier (you) at post
  const guard = makeSoldier();
  guard.position.set(-3, 0, 2);
  guard.rotation.y = 0.3;
  scene.add(guard);

  // perimeter fence
  const fenceMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
  for (let z = -25; z <= 5; z += 3) {
    const fencePost = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2, 4), fenceMat);
    fencePost.position.set(8, 1, z); scene.add(fencePost);
    // wire
    for (let h = 0.5; h <= 1.8; h += 0.4) {
      const wire = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.01, 3), fenceMat);
      wire.position.set(8, h, z + 1.5); scene.add(wire);
    }
  }

  // distant trees
  const treeSil = new THREE.MeshBasicMaterial({ color: 0x030504 });
  for (let i = 0; i < 30; i++) {
    const t = new THREE.Mesh(new THREE.ConeGeometry(0.8 + Math.random(), 3 + Math.random() * 3, 5), treeSil);
    t.position.set(-20 + i * 1.8 + Math.random(), 1.5, -18 - Math.random() * 8);
    scene.add(t);
  }

  const EVENTS = [
    { txt:'風從林子裡吹過。', real: false },
    { txt:'遠處狗叫了兩聲。', real: false },
    { txt:'腳步聲 —— 從圍牆外。', real: true },
    { txt:'蟲鳴停了一拍。', real: false },
    { txt:'有人翻過鐵絲網的聲音。', real: true },
    { txt:'樹葉落在哨所屋頂。', real: false },
    { txt:'雨，開始下了。', real: false },
    { txt:'金屬輕響 —— 鐵門方向。', real: true },
    { txt:'貓從彈藥庫旁跑過。', real: false },
    { txt:'兩百公尺外，有一道手電筒光。', real: true }
  ];

  // threat silhouette
  const threat = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1.2, 4, 8), new THREE.MeshBasicMaterial({ color: 0x0a0a0a }));
  threat.visible = false; threat.position.y = 0.9;
  scene.add(threat);

  const st = { i: 0, score: 0, mistakes: 0, alive: true, waiting: false, clock: 150 };

  function nextEvent() {
    if (st.i >= 10) { endGuard(); return; }
    st.waiting = true;
    st.clock += 15;
    const mm = Math.floor(st.clock / 60), ss = st.clock % 60;
    showHud((mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss, 'MISSION 05', st.i + ' / 10');
    const ev = EVENTS[st.i];
    showFB(ev.txt, '');
    if (ev.real) {
      const a = Math.random() * Math.PI - Math.PI / 2;
      threat.position.set(Math.sin(a) * 15, 0.9, -10 + Math.cos(a) * 5);
      threat.visible = true;
    } else { threat.visible = false; }
    sfxWind();
    if (Math.random() > 0.5) sfxCricket();
  }

  function guardAns(aimed) {
    if (!st.waiting) return;
    st.waiting = false;
    const ev = EVENTS[st.i];
    threat.visible = false;
    if (ev.real === aimed) {
      st.score++;
      showFB(ev.real ? '—— 確認狀況，上報。' : '—— 靜。', 'ok');
      sfxHit();
    } else {
      st.mistakes++;
      showFB(ev.real ? '—— 你遲了半秒。' : '—— 空槍口。', 'ng');
      sfxMiss();
    }
    st.i++;
    setTimeout(nextEvent, 1200);
  }

  function endGuard() {
    st.alive = false;
    if (st.mistakes <= 2) {
      finishLevel({
        code: 'MISSION 05 · 達成', title: '05:00 天亮了',
        sub: [['','你還活著。'],['em','心跳也還活著。'],['','那個名字，也還活著。']],
        stats: [['正確',st.score+' / 10'],['失誤',st.mistakes+''],['撐過','2.5h']]
      });
    } else {
      finishLevel({
        code: 'MISSION 05 · 勉強過關', title: '天亮以前',
        sub: [['','失誤太多，下一班要補一次。'],['em','班長沒罵你。'],['','他說：「想太多，就這樣。」']],
        stats: [['正確',st.score+' / 10'],['失誤',st.mistakes+''],['補哨','1']]
      });
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(-1, 3, 6); cam.lookAt(0, 0.5, -8); },
    start() {
      showHud('02:30', 'MISSION 05', '0 / 10');
      FIRE.textContent = '舉槍';
      FIRE.classList.add('show');
      FIRE.style.left = '65%';
      TAP.textContent = '不動';
      TAP.classList.add('show');
      TAP.style.left = '35%';
      TAP.style.transform = 'translateX(-50%)';
      FIRE.onclick = () => guardAns(true);
      TAP.onclick = () => guardAns(false);
      document.onkeydown = e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); guardAns(true); }
        if (e.code === 'KeyX' || e.code === 'ArrowDown') { e.preventDefault(); guardAns(false); }
      };
      setTimeout(nextEvent, 1000);
      levelInputs.push(() => { FIRE.onclick = null; TAP.onclick = null; });
    },
    update(dt) {
      if (!st.alive) return;
      const t = Date.now() * 0.001;
      flashlight.target.position.x = Math.sin(t * 0.5) * 4;
      flashlight.target.position.z = -10 + Math.cos(t * 0.3) * 3;
      moon.material.color.setHSL(0.15, 0.05, 0.85 + Math.sin(t) * 0.05);
      // slight camera sway (breathing)
      camera.position.y = 3 + Math.sin(t * 0.8) * 0.05;
    },
    stop() { st.alive = false; }
  };
}

/* ══════════════════════════════════════════
   L6 — ONION PICKING
   ══════════════════════════════════════════ */
function buildOnion() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87c0e8);
  addFog(scene, 0xc8a050, 0.006);
  scene.add(new THREE.HemisphereLight(0xffffdd, 0x886622, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 2.0);
  sun.position.set(10, 30, 5);
  sun.castShadow = !isMobile;
  scene.add(sun);

  // dirt field
  const dirt = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshStandardMaterial({ color: 0x7a5a2e, roughness: 1 })
  );
  dirt.rotation.x = -Math.PI / 2; dirt.receiveShadow = true; scene.add(dirt);

  // furrow rows
  for (let z = -25; z <= 25; z += 1.5) {
    const row = new THREE.Mesh(new THREE.BoxGeometry(60, 0.15, 0.3), new THREE.MeshStandardMaterial({ color: 0x5a3e18, roughness: 1 }));
    row.position.set(0, 0.08, z);
    scene.add(row);
  }

  // distant mountains
  const mtMat = new THREE.MeshStandardMaterial({ color: 0x5a7a4a, roughness: 1 });
  for (let i = 0; i < 5; i++) {
    const mt = new THREE.Mesh(new THREE.ConeGeometry(8 + Math.random() * 6, 10 + Math.random() * 8, 6), mtMat);
    mt.position.set(-20 + i * 12, 0, -35);
    scene.add(mt);
  }

  // workers (other soldiers)
  for (let i = 0; i < 4; i++) {
    const worker = makeSoldier();
    worker.position.set(-8 + i * 5 + Math.random() * 2, 0, -5 + Math.random() * 10);
    worker.rotation.y = Math.random() * Math.PI;
    // crouch
    worker.scale.y = 0.85;
    scene.add(worker);
  }

  // onion meshes
  const onionMat = new THREE.MeshStandardMaterial({ color: 0xf0e6d2, roughness: 0.6 });
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x558833, roughness: 0.8 });
  const onions = [];
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();

  function spawnOnion() {
    const g = new THREE.Group();
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.25, 10, 8), onionMat.clone());
    bulb.position.y = 0.08;
    bulb.castShadow = true;
    g.add(bulb);
    // leaves (3 blades)
    for (let l = 0; l < 3; l++) {
      const leaf = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.04, 0.5, 4), leafMat);
      leaf.position.set((l - 1) * 0.04, 0.45, 0);
      leaf.rotation.z = (l - 1) * 0.15;
      g.add(leaf);
    }
    // roots
    for (let r = 0; r < 4; r++) {
      const root = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.005, 0.15, 3), new THREE.MeshBasicMaterial({ color: 0x8a7a5a }));
      root.position.set((Math.random() - 0.5) * 0.12, -0.08, (Math.random() - 0.5) * 0.12);
      root.rotation.x = Math.random() * 0.5;
      g.add(root);
    }
    g.position.set((Math.random() - 0.5) * 35, 0, (Math.random() - 0.5) * 25);
    g.userData.picked = false;
    g.userData.age = 0;
    scene.add(g);
    onions.push(g);
    return g;
  }

  const st = { picked: 0, time: 60, alive: true };
  let timer, spawnTimer;

  function pickOnion(g) {
    if (g.userData.picked || !st.alive) return;
    g.userData.picked = true;
    st.picked++;
    sfxOnionPop();
    showHud(st.picked + ' / 30', 'MISSION 06', st.time + 's');
    // pop-out animation
    const startY = g.position.y;
    const popStart = Date.now();
    const popAnim = setInterval(() => {
      const t = (Date.now() - popStart) / 500;
      if (t >= 1) { clearInterval(popAnim); scene.remove(g); return; }
      g.position.y = startY + 4 * Math.sin(Math.PI * t);
      g.rotation.z = t * 3;
      g.scale.setScalar(1 + t * 0.3);
      g.children[0].material.opacity = 1 - t;
      g.children[0].material.transparent = true;
    }, 16);
    if (st.picked >= 30) {
      st.alive = false; clearInterval(timer); clearInterval(spawnTimer);
      setTimeout(() => finishLevel({
        code: 'MISSION 06 · 達成', title: '30 顆洋蔥 · 30 個日子',
        sub: [['','弟兄們邊拔邊唱歌。'],['em','你跟著笑。'],['','原來平凡，也是一種原諒。']],
        stats: [['拔起','30'],['剩時',st.time+'s'],['心情','光']]
      }), 500);
    }
  }

  function onClick(e) {
    if (!st.alive) return;
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    for (const o of onions) {
      if (o.userData.picked) continue;
      const hits = raycaster.intersectObjects(o.children, true);
      if (hits.length > 0) { pickOnion(o); return; }
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 10, 12); cam.lookAt(0, 0, -2); },
    start() {
      showHud('0 / 30', 'MISSION 06', '60s');
      for (let i = 0; i < 10; i++) spawnOnion();
      spawnTimer = setInterval(() => {
        if (!st.alive) return;
        if (onions.filter(o => !o.userData.picked).length < 15) spawnOnion();
      }, 400);
      renderer.domElement.addEventListener('pointerdown', onClick);
      timer = setInterval(() => {
        if (!st.alive) return;
        st.time--;
        showHud(st.picked + ' / 30', 'MISSION 06', st.time + 's');
        if (st.time <= 0) {
          st.alive = false; clearInterval(timer); clearInterval(spawnTimer);
          finishLevel({
            code: 'MISSION 06 · 未達成', title: '收工',
            sub: [['','日頭下山了。'],['em','你手上還抓著半顆洋蔥。'],['','班長說：「明天再拔。」']],
            stats: [['拔起',st.picked+''],['剩時','0'],['心情','—']]
          });
        }
      }, 1000);
      levelInputs.push(() => {
        clearInterval(timer); clearInterval(spawnTimer);
        renderer.domElement.removeEventListener('pointerdown', onClick);
      });
    },
    update(dt) {
      for (const o of onions) {
        if (o.userData.picked) continue;
        o.userData.age += dt;
        // gentle sway
        o.rotation.z = Math.sin(Date.now() * 0.002 + o.position.x) * 0.05;
        if (o.userData.age > 5) {
          o.userData.picked = true;
          scene.remove(o);
        }
      }
    },
    stop() { st.alive = false; clearInterval(timer); clearInterval(spawnTimer); }
  };
}

/* ══════════════════════════════════════════
   GAME LOOP
   ══════════════════════════════════════════ */
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (currentLevel && currentLevel.update) currentLevel.update(dt);
  renderer.render(activeScene, camera);
}

animate();
showIntro();
</script>
