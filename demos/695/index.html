<script type="module">
import * as THREE from 'three';

/* ══════════════════════════════════════════

const $ = id => document.getElementById(id);
const OV = $('overlay');
const HUD = $('hud');
const FIRE = $('fire-btn');
const TAP = $('tap-btn');
const FB = $('fb');
const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt != null) e.textContent = txt;
  return e;
}
function clear(n) { while (n && n.firstChild) n.removeChild(n.firstChild); }

function showFB(text, type) {
  FB.textContent = text;
  FB.className = 'show ' + type;
  setTimeout(() => { FB.className = ''; }, 1200);
}

function showHud(l1, l2, r1) {
  $('hud-l1').textContent = l1 || '';
  $('hud-l2').textContent = l2 || '';
  $('hud-r1').textContent = r1 || '';
  HUD.classList.add('show');
}
function hideHud() { HUD.classList.remove('show'); }

/* ══════════════════════════════════════════
   THREE.js SETUP
   ══════════════════════════════════════════ */
const clock = new THREE.Clock();
const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = !isMobile;
if (!isMobile) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// default dark scene
const darkScene = new THREE.Scene();
darkScene.background = new THREE.Color(0x0b0d08);
let activeScene = darkScene;

/* ══════════════════════════════════════════
   WEB AUDIO SFX
   ══════════════════════════════════════════ */
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function sfxRadarTick() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 1200;
  g.gain.setValueAtTime(0.06, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.06);
}

function sfxCannon() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // boom
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.04));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 400;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t);
  // thud
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(20, t + 0.2);
  const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.3, t); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
  o.connect(g2); g2.connect(audioCtx.destination); o.start(t); o.stop(t + 0.3);
}

function sfxHit() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(880, t); o.frequency.setValueAtTime(1320, t + 0.08);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.25);
}

function sfxMiss() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(100, t + 0.15);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.25);
}

function sfxFootstep() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.04), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.01));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.1;
  const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxHeartbeat() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(55, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.15);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.3);
}

function sfxEngine() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 65;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.04, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.15);
}

function sfxSlam() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.08), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.02));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.2;
  src.connect(g); g.connect(audioCtx.destination); src.start(t);
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.1);
  const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.25, t); g2.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
  o.connect(g2); g2.connect(audioCtx.destination); o.start(t); o.stop(t + 0.2);
}

function sfxWind() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.5), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.03 * (1 + Math.sin(i / 800));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 400; f.Q.value = 0.5;
  const g = audioCtx.createGain(); g.gain.value = 0.15;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

function sfxCricket() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 4200 + Math.random() * 400;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.03, t + i * 0.07); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.04);
    o.connect(g); g.connect(audioCtx.destination); o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.05);
  }
}

function sfxOnionPop() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(1200, t + 0.04);
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.12);
}

function sfxDiaryPage() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.08), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.025)) * 0.5;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
  const g = audioCtx.createGain(); g.gain.value = 0.06;
  src.connect(f); f.connect(g); g.connect(audioCtx.destination); src.start(t);
}

/* ══════════════════════════════════════════
   FLOW
   ══════════════════════════════════════════ */
const FLOW = [
  {t:'diary',i:0},{t:'diary',i:1},{t:'level',n:'artillery'},{t:'diary',i:2},
  {t:'diary',i:3},{t:'level',n:'run'},{t:'diary',i:4},
  {t:'diary',i:5},{t:'level',n:'train'},{t:'diary',i:6},
  {t:'level',n:'arm'},{t:'diary',i:7},
  {t:'level',n:'guard'},{t:'diary',i:8},
  {t:'level',n:'onion'},{t:'diary',i:9},{t:'end'}
];
let flowIdx = -1;
let currentLevel = null;
let levelInputs = []; // cleanup handlers

function advance() {
  stopLevel();
  flowIdx++;
  if (flowIdx >= FLOW.length) { showEnd(); return; }
  const step = FLOW[flowIdx];
  if (step.t === 'diary') showDiary(step.i);
  else if (step.t === 'level') showLevel(step.n);
  else showEnd();
}

function stopLevel() {
  hideHud();
  FIRE.classList.remove('show');
  TAP.classList.remove('show');
  levelInputs.forEach(fn => fn());
  levelInputs = [];
  if (currentLevel && currentLevel.stop) currentLevel.stop();
  currentLevel = null;
  document.onkeydown = null;
  document.onkeyup = null;
}

/* ══════════════════════════════════════════
   LEVEL DISPATCH
   ══════════════════════════════════════════ */
function showLevel(name) {
  clear(OV);
  OV.classList.remove('active');
  const builders = {
    artillery: buildArtillery,
    run: buildRun,
    train: buildTrain,
    arm: buildArm,
    guard: buildGuard,
    onion: buildOnion
  };
  const builder = builders[name];
  if (!builder) { advance(); return; }
  currentLevel = builder();
  activeScene = currentLevel.scene;
  if (currentLevel.cameraSetup) currentLevel.cameraSetup(camera);
  if (currentLevel.start) currentLevel.start();
}

function finishLevel(obj) {
  stopLevel();
  activeScene = darkScene;
  clear(OV);
  const box = el('div', 'r-box');
  box.appendChild(el('div', 'r-code', obj.code));
  box.appendChild(el('div', 'r-title', obj.title));

    else sub.appendChild(document.createTextNode(pair[1]));
  });
  box.appendChild(sub);
  const stats = el('div', 'r-stats');
  (obj.stats || []).forEach(s => {
    const w = el('div', 'r-stat');
    w.appendChild(el('div', 'r-stat-lbl', s[0]));
    w.appendChild(el('div', 'r-stat-val', s[1]));
    stats.appendChild(w);

  box.appendChild(stats);
  const act = el('div', 'r-action');
  const btn = el('button', 'btn primary', '下一頁日記 ›');
  btn.addEventListener('click', advance);
  act.appendChild(btn);
  box.appendChild(act);
  OV.appendChild(box);
  OV.classList.add('active');
}

/* ══════════════════════════════════════════
   SHARED 3D HELPERS
   ══════════════════════════════════════════ */
function makeGround(scene, color, y) {
  const g = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color, roughness: 1 })
  );
  g.rotation.x = -Math.PI / 2;
  g.position.y = y || 0;
  g.receiveShadow = true;
  scene.add(g);
  return g;
}

function addFog(scene, color, density) {
  scene.fog = new THREE.FogExp2(color, density || 0.02);
}

/* ══════════════════════════════════════════
   L1 — ARTILLERY (3D radar sweep)
   ══════════════════════════════════════════ */
function buildArtillery() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1208);
  addFog(scene, 0x0a1208, 0.03);

  // ambient + point light
  scene.add(new THREE.AmbientLight(0x223322, 0.4));
  const glow = new THREE.PointLight(0x44ff44, 0.6, 30);
  glow.position.set(0, 6, 0);
  scene.add(glow);

  // ground
  makeGround(scene, 0x1a2010, -0.1);

  // radar base
  const base = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0x2a3a1a, metalness: 0.5, roughness: 0.6 }));
  base.position.y = 0.15;
  scene.add(base);

  // grid lines on base
  const gridMat = new THREE.MeshBasicMaterial({ color: 0x336633, transparent: true, opacity: 0.3 });
  for (let r = 1; r <= 3; r++) {
    const ring = new THREE.Mesh(new THREE.RingGeometry(r - 0.02, r + 0.02, 64), gridMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.32;
    scene.add(ring);
  }

  // sweep beam (a thin wedge)
  const sweepGeo = new THREE.ConeGeometry(3, 0.05, 3, 1, false, 0, Math.PI * 0.15);
  const sweepMat = new THREE.MeshBasicMaterial({ color: 0x44ff44, transparent: true, opacity: 0.5 });
  const sweep = new THREE.Mesh(sweepGeo, sweepMat);
  sweep.rotation.x = -Math.PI / 2;
  sweep.position.y = 0.35;
  scene.add(sweep);

  // target sphere
  const targetMat = new THREE.MeshBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.8 });
  const target = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), targetMat);
  target.position.y = 0.5;
  target.visible = false;
  scene.add(target);

  // shell arc (shown on hit)
  const arcPts = [];
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    arcPts.push(new THREE.Vector3(0, 4 * Math.sin(Math.PI * t), -6 * t));
  }
  const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPts);
  const arc = new THREE.Line(arcGeo, new THREE.LineBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.6 }));
  arc.visible = false;
  scene.add(arc);

  // state
  const st = { angle: 0, speed: 2.5, targetAngle: 0, score: 0, life: 3, alive: true, locked: false };

  function newTarget() {
    let a; do { a = Math.random() * 360; } while (Math.abs(((a - st.angle + 540) % 360) - 180) < 50);
    st.targetAngle = a;
    st.locked = false;
    const rad = (a - 90) * Math.PI / 180;
    target.position.x = Math.cos(rad) * 2.4;
    target.position.z = Math.sin(rad) * 2.4;
    target.visible = true;
    arc.visible = false;
  }

  function fire() {
    if (!st.alive || st.locked) return;
    st.locked = true;
    sfxCannon();
    const diff = ((st.angle - st.targetAngle) + 720) % 360;
    const hit = diff <= 20 || diff >= 340;
    if (hit) {
      sfxHit();
      showFB('命中。', 'ok');
      st.score++;
      target.visible = false;
      // show arc towards target
      const rad = (st.targetAngle - 90) * Math.PI / 180;
      arc.position.set(0, 0.3, 0);
      arc.rotation.y = -rad - Math.PI / 2;
      arc.visible = true;
      showHud(st.score + ' / 5', '', '●'.repeat(st.life));
      if (st.score >= 5) {
        st.alive = false;
        setTimeout(() => finishLevel({
          code: 'MISSION 01 · 達成', title: '全連第一名',
          sub: [['','滿分通過砲兵射擊。'],['em','結果任務 —— 顧一頭牛。'],['','你對著牛，數她的睫毛。']],
          stats: [['命中','5 / 5'],['剩餘','●'.repeat(st.life)],['任務','牛 × 1']]
        }), 800);
        return;
      }
      st.speed = Math.min(4.5, st.speed + 0.3);
      setTimeout(() => { if (st.alive) newTarget(); }, 700);
    } else {
      sfxMiss();
      showFB('偏離目標。', 'ng');
      st.life--;
      showHud(st.score + ' / 5', '', '●'.repeat(Math.max(0, st.life)));
      target.visible = false;
      if (st.life <= 0) {
        st.life = 3; st.score = 0; st.speed = 2.5;
        showHud('0 / 5', '', '● ● ●');
      }
      setTimeout(() => { if (st.alive) newTarget(); }, 700);
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 8, 6); cam.lookAt(0, 0, 0); },
    start() {
      showHud('0 / 5', 'MISSION 01', '● ● ●');
      FIRE.classList.add('show');
      FIRE.onclick = fire;
      newTarget();
      const kd = e => { if (e.code === 'Space') { e.preventDefault(); fire(); } };
      document.onkeydown = kd;
      levelInputs.push(() => { FIRE.onclick = null; });
    },
    update(dt) {
      if (!st.alive) return;
      st.angle = (st.angle + st.speed) % 360;
      sweep.rotation.z = -st.angle * Math.PI / 180;
      // pulse target
      if (target.visible) {
        target.scale.setScalar(1 + Math.sin(Date.now() * 0.006) * 0.3);
      }
      // radar tick sound every 90 degrees
      if (Math.floor(st.angle / 90) !== Math.floor((st.angle - st.speed) / 90)) sfxRadarTick();
    },
    stop() { st.alive = false; }
  };
}

/* ══════════════════════════════════════════
   L2 — 3000m RUN
   ══════════════════════════════════════════ */
function buildRun() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a3040);
  addFog(scene, 0x2a3040, 0.008);
  scene.add(new THREE.HemisphereLight(0x445566, 0x332211, 0.5));
  const sun = new THREE.DirectionalLight(0xffe0b0, 1.5);
  sun.position.set(20, 30, 10);
  scene.add(sun);

  // track surface
  const track = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 300),
    new THREE.MeshStandardMaterial({ color: 0x884422, roughness: 0.95 })
  );
  track.rotation.x = -Math.PI / 2;
  scene.add(track);

  // lane lines
  for (let lane = -3; lane <= 3; lane++) {
    const line = new THREE.Mesh(
      new THREE.PlaneGeometry(0.05, 300),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    line.rotation.x = -Math.PI / 2;
    line.position.set(lane * 1.2, 0.01, 0);
    scene.add(line);
  }

  // runner (capsule shape)
  const runnerGroup = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.8, 4, 8), new THREE.MeshStandardMaterial({ color: 0x3d4e2c, roughness: 0.8 }));
  body.position.y = 1.0;
  runnerGroup.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.8 }));
  head.position.y = 1.8;
  runnerGroup.add(head);
  runnerGroup.position.set(0, 0, 0);
  scene.add(runnerGroup);

  // other runners (silhouettes)
  for (let i = 0; i < 4; i++) {
    const other = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.7, 4, 8), new THREE.MeshStandardMaterial({ color: 0x556644 }));
    other.position.set(-2.4 + i * 1.2 + (i >= 2 ? 1.2 : 0), 1, -2 - i * 3);
    scene.add(other);
  }

  const st = { dist: 0, time: 720, taps: 0, hr: 72, alive: true, lastTap: 0, elapsed: 0, nextHb: 0 };
  let timer;

  function tap() {
    if (!st.alive) return;
    const now = performance.now();
    if (now - st.lastTap < 80) return;
    st.lastTap = now;
    st.dist += 4.5 + Math.random() * 1.5;
    st.taps++;
    st.hr = Math.min(180, 72 + Math.floor(st.taps / 3));
    sfxFootstep();
    runnerGroup.position.y = 0.1; // bob
    setTimeout(() => { runnerGroup.position.y = 0; }, 80);
  }

  function tick() {
    if (!st.alive) return;
    st.time--;
    st.elapsed = 720 - st.time;
    const mm = Math.floor(st.time / 60);
    const ss = st.time % 60;
    showHud(Math.floor(st.dist) + 'm', 'MISSION 02', mm + ':' + (ss < 10 ? '0' : '') + ss);
    if (st.dist >= 3000) {
      st.alive = false; clearInterval(timer);
      const em = Math.floor(st.elapsed / 60), es = st.elapsed % 60;
      finishLevel({
        code: 'MISSION 02 · 達成', title: '3000m · ' + em + '分' + (es < 10 ? '0' : '') + es + '秒',
        sub: [['','12 分鐘內完成。'],['em','榮譽假提早到今晚 21:00。'],['','你賺了 11 個小時。']],
        stats: [['距離','3000m'],['時間',em+':'+(es<10?'0':'')+es],['心跳',st.hr+'']]
      });
    } else if (st.time <= 0) {
      st.alive = false; clearInterval(timer);
      finishLevel({
        code: 'MISSION 02 · 未達成', title: '時間到',
        sub: [['','距離不足。'],['em','但班長沒有處罰你。'],['','他只說：「明天再跑一次。」']],
        stats: [['距離',Math.floor(st.dist)+'m'],['時間','12:00'],['心跳',st.hr+'']]
      });
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 4, 8); cam.lookAt(0, 1, -5); },
    start() {
      showHud('0m', 'MISSION 02', '12:00');
      TAP.classList.add('show');
      TAP.onclick = tap;
      document.onkeydown = e => { if (e.code === 'Space') { e.preventDefault(); tap(); } };
      timer = setInterval(tick, 1000);
      levelInputs.push(() => { clearInterval(timer); TAP.onclick = null; });
    },
    update(dt) {
      if (!st.alive) return;
      // camera follow
      camera.position.z = 8 - (st.dist / 3000) * 6;
      runnerGroup.position.z = -(st.dist / 3000) * 290;
      camera.lookAt(runnerGroup.position.x, 1, runnerGroup.position.z - 5);
      // heartbeat
      if (st.hr > 120 && Date.now() > st.nextHb) {
        sfxHeartbeat();
        st.nextHb = Date.now() + (60000 / st.hr);
      }
    },
    stop() { st.alive = false; clearInterval(timer); }
  };
}

/* ══════════════════════════════════════════
   L3 — TRAIN CHASE
   ══════════════════════════════════════════ */
function buildTrain() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x4a2818);
  addFog(scene, 0x4a2818, 0.01);
  scene.add(new THREE.HemisphereLight(0xffa060, 0x331808, 0.6));
  const sun = new THREE.DirectionalLight(0xffaa44, 1.8);
  sun.position.set(-20, 20, 10);
  scene.add(sun);

  // road
  const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 300), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.95 }));
  road.rotation.x = -Math.PI / 2;
  road.position.set(-4, 0, -100);
  scene.add(road);
  // road center line
  const center = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 300), new THREE.MeshBasicMaterial({ color: 0xffff66, transparent: true, opacity: 0.5 }));
  center.rotation.x = -Math.PI / 2;
  center.position.set(-4, 0.01, -100);
  scene.add(center);

  // rail tracks
  for (const xOff of [-0.3, 0.3]) {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 300), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 }));
    rail.position.set(4 + xOff, 0.04, -100);
    scene.add(rail);
  }
  // sleepers
  for (let z = 0; z < 300; z += 2) {
    const sleeper = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.2), new THREE.MeshStandardMaterial({ color: 0x5a3e18, roughness: 0.9 }));
    sleeper.position.set(4, 0.02, -z);
    scene.add(sleeper);
  }

  // car
  const car = new THREE.Group();
  const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 3.5), new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4, metalness: 0.3 }));
  carBody.position.y = 0.6;
  car.add(carBody);
  const carRoof = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2.8), new THREE.MeshStandardMaterial({ color: 0xbbbbbb }));
  carRoof.position.y = 1.2;
  car.add(carRoof);
  // headlights
  const hl = new THREE.PointLight(0xffffcc, 1, 15);
  hl.position.set(0, 0.6, -2);
  car.add(hl);
  car.position.set(-4, 0, 0);
  scene.add(car);

  // train
  const train = new THREE.Group();
  for (let i = 0; i < 4; i++) {
    const wagon = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 5), new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.4, roughness: 0.5 }));
    wagon.position.set(0, 1.2, -i * 5.5);
    train.add(wagon);
  }
  train.position.set(4, 0, -8);
  scene.add(train);

  // trees
  const treeMat = new THREE.MeshStandardMaterial({ color: 0x2a4a18 });
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3e18 });
  for (let z = 0; z < 200; z += 8) {
    for (const x of [-10, 10]) {
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.2, 2), trunkMat);
      trunk.position.set(x + Math.random() * 2 - 1, 1, -z);
      scene.add(trunk);
      const crown = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3, 6), treeMat);
      crown.position.set(trunk.position.x, 3, -z);
      scene.add(crown);
    }
  }

  const st = { speed: 60, time: 30, alive: true, hold: false, carZ: 0, trainZ: -8 };
  let timer;

  function press() { st.hold = true; }
  function release() { st.hold = false; }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(-2, 5, 12); cam.lookAt(-2, 1, -10); },
    start() {
      showHud('30', 'MISSION 03', '60 km/h');
      const gas = TAP;
      gas.textContent = '按住加速';
      gas.classList.add('show');
      gas.onmousedown = press; gas.onmouseup = release; gas.onmouseleave = release;
      gas.ontouchstart = e => { e.preventDefault(); press(); };
      gas.ontouchend = e => { e.preventDefault(); release(); };
      document.onkeydown = e => { if (e.code === 'Space') { e.preventDefault(); press(); } };
      document.onkeyup = e => { if (e.code === 'Space') { e.preventDefault(); release(); } };
      timer = setInterval(() => {
        if (!st.alive) return;
        st.time--;
        showHud(st.time + '', 'MISSION 03', Math.floor(st.speed) + ' km/h');
        if (st.time <= 0) {
          st.alive = false; clearInterval(timer);
          finishLevel({
            code: 'MISSION 03 · 達成', title: '新竹月台 · 準時抵達',
            sub: [['','哥哥把油門踩到底。'],['em','火車剛進月台。'],['','他揮了揮手，沒下車，直接走。']],
            stats: [['最高時速',Math.floor(st.speed)+''],['撐過','30s'],['攔截','成功']]
          });
        }
      }, 1000);
      levelInputs.push(() => {
        clearInterval(timer);
        gas.onmousedown = null; gas.onmouseup = null; gas.onmouseleave = null;
        gas.ontouchstart = null; gas.ontouchend = null;
        gas.textContent = '踏 · 踏 · 踏';
      });
    },
    update(dt) {
      if (!st.alive) return;
      if (st.hold) { st.speed = Math.min(180, st.speed + 80 * dt); sfxEngine(); }
      else st.speed = Math.max(50, st.speed - 30 * dt);
      // move forward
      const carMove = st.speed * dt * 0.5;
      const trainMove = 100 * dt * 0.5; // train at constant 100 km/h equivalent
      st.carZ -= carMove;
      st.trainZ -= trainMove;
      car.position.z = st.carZ;
      train.position.z = st.trainZ;
      camera.position.z = st.carZ + 14;
      camera.lookAt(-2, 1, st.carZ - 10);
      // check if train passes car
      if (st.trainZ < st.carZ - 5) {
        st.alive = false; clearInterval(timer);
        finishLevel({
          code: 'MISSION 03 · 未達成', title: '火車追過去了',
          sub: [['','車速掉下來。'],['em','但哥哥沒說什麼。'],['','他只說：「下次，早點出門。」']],
          stats: [['最高時速',Math.floor(st.speed)+''],['撐過',(30-st.time)+'s'],['距離差','—']]
        });
      }
    },
    stop() { st.alive = false; clearInterval(timer); }
  };
}

/* ══════════════════════════════════════════
   L4 — ARM WRESTLING
   ══════════════════════════════════════════ */
function buildArm() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1008);
  scene.add(new THREE.AmbientLight(0x332211, 0.3));
  const lamp = new THREE.PointLight(0xffcc88, 1.5, 20);
  lamp.position.set(0, 5, 0);
  lamp.castShadow = !isMobile;
  scene.add(lamp);

  // table
  const table = new THREE.Mesh(new THREE.BoxGeometry(3, 0.15, 2), new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.8 }));
  table.position.y = 1;
  table.receiveShadow = true;
  scene.add(table);

  // two arms (cylinders)
  const armMat1 = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.7 });
  const armMat2 = new THREE.MeshStandardMaterial({ color: 0xc8a070, roughness: 0.7 });
  const arm1 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 1.2, 8), armMat1);
  const arm2 = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.18, 1.2, 8), armMat2);
  arm1.position.set(-0.3, 1.7, 0);
  arm2.position.set(0.3, 1.7, 0);
  // pivot point
  const pivot = new THREE.Group();
  pivot.position.set(0, 1.7, 0);
  pivot.add(arm1); arm1.position.set(-0.6, 0, 0);
  pivot.add(arm2); arm2.position.set(0.6, 0, 0);
  scene.add(pivot);

  // crowd silhouettes
  for (let i = 0; i < 6; i++) {
    const sil = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.25, 0.7, 4, 8),
      new THREE.MeshBasicMaterial({ color: 0x0a0806 })
    );
    const angle = (i / 6) * Math.PI * 2;
    sil.position.set(Math.cos(angle) * 3, 1, Math.sin(angle) * 3);
    scene.add(sil);
  }

  const OPPS = [
    { name:'阿忠 · 一兵', power: 0.8 },
    { name:'大胖 · 下士', power: 1.0 },
    { name:'阿榮 · 上兵', power: 1.3 },
    { name:'瘦皮 · 班長', power: 1.6 },
    { name:'老虎 · 副排', power: 1.9 }
  ];
  const st = { round: 0, value: 0, last: '', alive: true };
  let drain;

  function push(side) {
    if (!st.alive || st.last === side) return;
    st.last = side;
    st.value += 4;
    sfxSlam();
  }

  function nextRound() {
    const opp = OPPS[st.round];
    showHud('Round ' + (st.round + 1) + ' / 5', 'MISSION 04', opp.name);
    st.value = 0;
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 4, 3.5); cam.lookAt(0, 1.5, 0); },
    start() {
      nextRound();
      // two buttons for L/R
      FIRE.textContent = '← A';
      FIRE.classList.add('show');
      FIRE.style.left = '25%';
      const tap2 = TAP;
      tap2.textContent = 'D →';
      tap2.classList.add('show');
      tap2.style.left = '75%';
      tap2.style.transform = 'translateX(-50%)';
      FIRE.onclick = () => push('L');
      tap2.onclick = () => push('R');
      document.onkeydown = e => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') { e.preventDefault(); push('L'); }
        if (e.code === 'KeyD' || e.code === 'ArrowRight') { e.preventDefault(); push('R'); }
      };
      drain = setInterval(() => {
        if (!st.alive) return;
        const opp = OPPS[st.round];
        st.value -= opp.power * 0.9;
        // check win/lose
        if (st.value <= -50) {
          st.alive = false; clearInterval(drain);
          finishLevel({
            code: 'MISSION 04 · 未達成', title: '被壓了下去',
            sub: [['','右手還在發燙。'],['em','但你沒有鬆開。'],['','班長說：「明晚再來。」']],
            stats: [['過關','Round ' + st.round + ' / 5'],['對手',opp.name],['右手','還在']]
          });
        } else if (st.value >= 50) {
          sfxSlam();
          st.value = 0; st.last = ''; st.round++;
          if (st.round >= 5) {
            st.alive = false; clearInterval(drain);
            finishLevel({
              code: 'MISSION 04 · 達成', title: '全連皆輸',
              sub: [['','五輪。'],['em','全連都笑不出來了。'],['','班長拍拍你的肩，沒問。']],
              stats: [['連勝','5 / 5'],['剩餘力氣','█ █ █'],['右手','還在']]
            });
          } else {
            nextRound();
          }
        }
      }, 50);
      levelInputs.push(() => {
        clearInterval(drain);
        FIRE.textContent = 'F I R E';
        FIRE.style.left = '50%';
        tap2.textContent = '踏 · 踏 · 踏';
        tap2.style.left = '50%';
      });
    },
    update(dt) {
      if (!st.alive) return;
      const pct = Math.max(-100, Math.min(100, st.value));
      pivot.rotation.z = pct * 0.008;
      // lamp flicker on strong push
      lamp.intensity = 1.5 + Math.sin(Date.now() * 0.01) * 0.1;
    },
    stop() { st.alive = false; clearInterval(drain); }
  };
}

/* ══════════════════════════════════════════
   L5 — MIDNIGHT GUARD
   ══════════════════════════════════════════ */
function buildGuard() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020304);
  addFog(scene, 0x020304, 0.04);

  // moonlight
  const moon = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), new THREE.MeshBasicMaterial({ color: 0xeeeedd }));
  moon.position.set(15, 25, -20);
  scene.add(moon);
  const moonLight = new THREE.DirectionalLight(0x445566, 0.15);
  moonLight.position.copy(moon.position);
  scene.add(moonLight);
  scene.add(new THREE.AmbientLight(0x111118, 0.1));

  // flashlight
  const flashlight = new THREE.SpotLight(0xffffcc, 3, 30, Math.PI * 0.15, 0.5, 1.5);
  flashlight.position.set(0, 2, 0);
  flashlight.target.position.set(0, 0, -10);
  scene.add(flashlight);
  scene.add(flashlight.target);

  // ground
  makeGround(scene, 0x0a0c06, -0.1);

  // guard post
  const post = new THREE.Group();
  const wall = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 2), new THREE.MeshStandardMaterial({ color: 0x3a3a2a, roughness: 0.9 }));
  wall.position.y = 1.25;
  post.add(wall);
  const roof = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 2.5), new THREE.MeshStandardMaterial({ color: 0x555544 }));
  roof.position.y = 2.6;
  post.add(roof);
  post.position.set(-3, 0, 2);
  scene.add(post);

  // distant trees
  const treeSil = new THREE.MeshBasicMaterial({ color: 0x050806 });
  for (let i = 0; i < 20; i++) {
    const t = new THREE.Mesh(new THREE.ConeGeometry(0.8 + Math.random(), 3 + Math.random() * 2, 5), treeSil);
    t.position.set(-15 + i * 1.8 + Math.random(), 1.5, -15 - Math.random() * 5);
    scene.add(t);
  }

  const EVENTS = [
    { txt:'風從林子裡吹過。', real: false },
    { txt:'遠處狗叫了兩聲。', real: false },
    { txt:'腳步聲 —— 從圍牆外。', real: true },
    { txt:'蟲鳴停了一拍。', real: false },
    { txt:'有人翻過鐵絲網的聲音。', real: true },
    { txt:'樹葉落在哨所屋頂。', real: false },
    { txt:'雨，開始下了。', real: false },
    { txt:'金屬輕響 —— 鐵門方向。', real: true },
    { txt:'貓從彈藥庫旁跑過。', real: false },
    { txt:'兩百公尺外，有一道手電筒光。', real: true }
  ];

  // threat silhouette
  const threat = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 1, 4, 8), new THREE.MeshBasicMaterial({ color: 0x1a1a1a }));
  threat.visible = false;
  threat.position.y = 0.8;
  scene.add(threat);

  const st = { i: 0, score: 0, mistakes: 0, alive: true, waiting: false, clock: 150, windTimer: 0 };

  function nextEvent() {
    if (st.i >= 10) { endGuard(); return; }
    st.waiting = true;
    st.clock += 15;
    const mm = Math.floor(st.clock / 60), ss = st.clock % 60;
    showHud((mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss, 'MISSION 05', st.i + ' / 10');
    const ev = EVENTS[st.i];
    showFB(ev.txt, '');
    // show threat silhouette for real threats
    if (ev.real) {
      const a = Math.random() * Math.PI - Math.PI / 2;
      threat.position.set(Math.sin(a) * 12, 0.8, -8 + Math.cos(a) * 5);
      threat.visible = true;
    } else {
      threat.visible = false;
    }
    // ambient sound
    sfxWind();
    if (Math.random() > 0.6) sfxCricket();
  }

  function guardAns(aimed) {
    if (!st.waiting) return;
    st.waiting = false;
    const ev = EVENTS[st.i];
    threat.visible = false;
    if (ev.real === aimed) {
      st.score++;
      showFB(ev.real ? '—— 確認狀況，上報。' : '—— 靜。', 'ok');
      sfxHit();
    } else {
      st.mistakes++;
      showFB(ev.real ? '—— 你遲了半秒。' : '—— 空槍口。', 'ng');
      sfxMiss();
    }
    st.i++;
    setTimeout(nextEvent, 1200);
  }

  function endGuard() {
    st.alive = false;
    if (st.mistakes <= 2) {
      finishLevel({
        code: 'MISSION 05 · 達成', title: '05:00 天亮了',
        sub: [['','你還活著。'],['em','心跳也還活著。'],['','那個名字，也還活著。']],
        stats: [['正確',st.score+' / 10'],['失誤',st.mistakes+''],['撐過','2.5h']]
      });
    } else {
      finishLevel({
        code: 'MISSION 05 · 勉強過關', title: '天亮以前',
        sub: [['','失誤太多，下一班要補一次。'],['em','班長沒罵你。'],['','他說：「想太多，就這樣。」']],
        stats: [['正確',st.score+' / 10'],['失誤',st.mistakes+''],['補哨','1']]
      });
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 3, 5); cam.lookAt(0, 0.5, -8); },
    start() {
      showHud('02:30', 'MISSION 05', '0 / 10');
      // two buttons
      FIRE.textContent = '舉槍';
      FIRE.classList.add('show');
      FIRE.style.left = '65%';
      TAP.textContent = '不動';
      TAP.classList.add('show');
      TAP.style.left = '35%';
      TAP.style.transform = 'translateX(-50%)';
      FIRE.onclick = () => guardAns(true);
      TAP.onclick = () => guardAns(false);
      document.onkeydown = e => {
        if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); guardAns(true); }
        if (e.code === 'KeyX' || e.code === 'ArrowDown') { e.preventDefault(); guardAns(false); }
      };
      setTimeout(nextEvent, 1000);
      levelInputs.push(() => {
        FIRE.textContent = 'F I R E';
        FIRE.style.left = '50%';
        TAP.textContent = '踏 · 踏 · 踏';
        TAP.style.left = '50%';
      });
    },
    update(dt) {
      if (!st.alive) return;
      // flashlight sway
      const t = Date.now() * 0.001;
      flashlight.target.position.x = Math.sin(t * 0.5) * 3;
      flashlight.target.position.z = -10 + Math.cos(t * 0.3) * 2;
      // moon glow pulse
      moon.material.color.setHSL(0.15, 0.05, 0.85 + Math.sin(t) * 0.05);
    },
    stop() { st.alive = false; }
  };
}

/* ══════════════════════════════════════════
   L6 — ONION PICKING
   ══════════════════════════════════════════ */
function buildOnion() {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xc8a050);
  addFog(scene, 0xc8a050, 0.008);
  scene.add(new THREE.HemisphereLight(0xffffdd, 0x886622, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 2.0);
  sun.position.set(10, 30, 5);
  sun.castShadow = !isMobile;
  scene.add(sun);

  // dirt field
  const dirt = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 40),
    new THREE.MeshStandardMaterial({ color: 0x7a5a2e, roughness: 1 })
  );
  dirt.rotation.x = -Math.PI / 2;
  dirt.receiveShadow = true;
  scene.add(dirt);

  // furrow rows
  for (let z = -15; z <= 15; z += 2) {
    const row = new THREE.Mesh(new THREE.BoxGeometry(40, 0.15, 0.4), new THREE.MeshStandardMaterial({ color: 0x5a3e18, roughness: 1 }));
    row.position.set(0, 0.08, z);
    scene.add(row);
  }

  // onion meshes
  const onionMat = new THREE.MeshStandardMaterial({ color: 0xf0e6d2, roughness: 0.6 });
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x558833, roughness: 0.8 });
  const onions = [];
  const raycaster = new THREE.Raycaster();
  const pointer = new THREE.Vector2();

  function spawnOnion() {
    const g = new THREE.Group();
    const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), onionMat.clone());
    bulb.position.y = 0.1;
    g.add(bulb);
    const leaf = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.05, 0.5, 4), leafMat);
    leaf.position.y = 0.45;
    g.add(leaf);
    g.position.set((Math.random() - 0.5) * 30, 0, (Math.random() - 0.5) * 20);
    g.userData.picked = false;
    g.userData.age = 0;
    scene.add(g);
    onions.push(g);
    return g;
  }

  const st = { picked: 0, time: 60, alive: true };
  let timer, spawnTimer;

  function pickOnion(g) {
    if (g.userData.picked || !st.alive) return;
    g.userData.picked = true;
    st.picked++;
    sfxOnionPop();
    showHud(st.picked + ' / 30', 'MISSION 06', st.time + 's');
    // pop animation
    const startY = g.position.y;
    const popStart = Date.now();
    const popAnim = setInterval(() => {
      const t = (Date.now() - popStart) / 400;
      if (t >= 1) { clearInterval(popAnim); scene.remove(g); return; }
      g.position.y = startY + 3 * Math.sin(Math.PI * t);
      g.scale.setScalar(1 + t * 0.5);
      g.children[0].material.opacity = 1 - t;
      g.children[0].material.transparent = true;
    }, 16);
    if (st.picked >= 30) {
      st.alive = false; clearInterval(timer); clearInterval(spawnTimer);
      setTimeout(() => finishLevel({
        code: 'MISSION 06 · 達成', title: '30 顆洋蔥 · 30 個日子',
        sub: [['','弟兄們邊拔邊唱歌。'],['em','你跟著笑。'],['','原來平凡，也是一種原諒。']],
        stats: [['拔起','30'],['剩時',st.time+'s'],['心情','光']]
      }), 500);
    }
  }

  function onClick(e) {
    if (!st.alive) return;
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    for (const o of onions) {
      if (o.userData.picked) continue;
      const hits = raycaster.intersectObjects(o.children, true);
      if (hits.length > 0) { pickOnion(o); return; }
    }
  }

  return {
    scene,
    cameraSetup(cam) { cam.position.set(0, 12, 12); cam.lookAt(0, 0, -2); },
    start() {
      showHud('0 / 30', 'MISSION 06', '60s');
      // spawn initial onions
      for (let i = 0; i < 8; i++) spawnOnion();
      // spawn more over time
      spawnTimer = setInterval(() => {
        if (!st.alive) return;
        if (onions.filter(o => !o.userData.picked).length < 12) spawnOnion();
      }, 500);
      renderer.domElement.addEventListener('pointerdown', onClick);
      timer = setInterval(() => {
        if (!st.alive) return;
        st.time--;
        showHud(st.picked + ' / 30', 'MISSION 06', st.time + 's');
        if (st.time <= 0) {
          st.alive = false; clearInterval(timer); clearInterval(spawnTimer);
          finishLevel({
            code: 'MISSION 06 · 未達成', title: '收工',
            sub: [['','日頭下山了。'],['em','你手上還抓著半顆洋蔥。'],['','班長說：「明天再拔。」']],
            stats: [['拔起',st.picked+''],['剩時','0'],['心情','—']]
          });
        }
      }, 1000);
      levelInputs.push(() => {
        clearInterval(timer); clearInterval(spawnTimer);
        renderer.domElement.removeEventListener('pointerdown', onClick);
      });
    },
    update(dt) {
      // age onions — wilt old unpicked ones
      for (const o of onions) {
        if (o.userData.picked) continue;
        o.userData.age += dt;
        if (o.userData.age > 4) {
          o.userData.picked = true;
          scene.remove(o);
        }
      }
    },
    stop() { st.alive = false; clearInterval(timer); clearInterval(spawnTimer); }
  };
}

/* ══════════════════════════════════════════
   GAME LOOP
   ══════════════════════════════════════════ */
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (currentLevel && currentLevel.update) currentLevel.update(dt);
  renderer.render(activeScene, camera);
}

animate();
showIntro();
</script>
