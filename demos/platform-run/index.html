<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>月台上的奔跑 — 三十秒偶像劇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif}
canvas{display:block;width:100%;height:100%}

/* ── 全畫面覆蓋層 ── */
#overlay{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── 標題畫面 ── */
#title-screen{position:fixed;inset:0;z-index:100;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.2s}
#title-screen.hide{opacity:0;pointer-events:none}
.title-year{font-size:clamp(14px,2vw,20px);color:#b8956a;letter-spacing:0.5em;margin-bottom:12px;opacity:0;animation:fadeUp 1.5s 0.5s forwards}
.title-main{font-size:clamp(28px,5vw,56px);color:#e8d5b8;font-weight:700;letter-spacing:0.15em;opacity:0;animation:fadeUp 1.5s 1s forwards}
.title-sub{font-size:clamp(14px,2.5vw,22px);color:#8a7560;margin-top:16px;opacity:0;animation:fadeUp 1.5s 1.5s forwards}
.title-start{font-size:clamp(12px,1.8vw,16px);color:#b8956a;margin-top:48px;opacity:0;animation:fadeUp 1.5s 2.2s forwards,pulse 2s 3s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── 遊戲 HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:12px 20px;display:none;pointer-events:none}
#timer-bar{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:8px}
#timer-fill{width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#f39c12,#2ecc71);border-radius:3px;transition:width 0.1s}
#hud-info{display:flex;justify-content:space-between;align-items:center;color:#e8d5b8;font-size:clamp(12px,1.6vw,16px)}
#timer-text{color:#f39c12;font-weight:700;font-size:clamp(16px,2.5vw,24px)}
#distance-text{color:#b8956a}
#sprint-bar-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:none;width:clamp(120px,30vw,200px)}
#sprint-bar{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
#sprint-fill{width:100%;height:100%;background:linear-gradient(90deg,#3498db,#1abc9c);border-radius:2px;transition:width 0.15s}
#sprint-label{text-align:center;color:#5a8a9a;font-size:11px;margin-top:4px}

/* ── 敘事文字 ── */
#narrative{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:30;text-align:center;pointer-events:none;width:clamp(280px,80vw,600px)}
#narrative p{color:#e8d5b8;font-size:clamp(14px,2.2vw,20px);line-height:1.8;opacity:0;transition:opacity 0.8s;text-shadow:0 2px 12px rgba(0,0,0,0.8)}
#narrative p.show{opacity:1}

/* ── 結果畫面 ── */
#result-screen{position:fixed;inset:0;z-index:90;background:rgba(10,10,10,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#result-screen.show{display:flex}
.result-text{color:#e8d5b8;font-size:clamp(20px,4vw,40px);font-weight:700;opacity:0;animation:fadeUp 1s 0.5s forwards}
.result-sub{color:#8a7560;font-size:clamp(13px,2vw,18px);margin-top:20px;line-height:2;text-align:center;max-width:500px;opacity:0;animation:fadeUp 1s 1.2s forwards}
.result-retry{color:#b8956a;font-size:clamp(12px,1.6vw,15px);margin-top:40px;cursor:pointer;pointer-events:auto;opacity:0;animation:fadeUp 1s 2s forwards}
.result-retry:hover{color:#e8d5b8}

/* ── 電影黑邊 ── */
.letterbox-top,.letterbox-bot{position:fixed;left:0;right:0;height:0;background:#0a0a0a;z-index:5;transition:height 0.8s}
.letterbox-top{top:0}
.letterbox-bot{bottom:0}
.letterbox-on .letterbox-top,.letterbox-on .letterbox-bot{height:clamp(30px,6vh,60px)}

/* ── 紅暈（時間不足警告）── */
#vignette{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;transition:opacity 0.3s;background:radial-gradient(ellipse at center,transparent 50%,rgba(180,40,40,0.4) 100%)}

/* ── 手機觸控搖桿 ── */
#touch-controls{position:fixed;bottom:30px;left:20px;z-index:40;display:none}
#joystick-area{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);position:relative}
#joystick-knob{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.15);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:none}
#sprint-btn{position:fixed;bottom:60px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(243,156,18,0.2);border:2px solid rgba(243,156,18,0.4);color:#f39c12;font-size:12px;font-weight:700;line-height:64px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── 跳躍按鈕（手機）── */
#jump-btn{position:fixed;bottom:140px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(46,204,113,0.2);border:2px solid rgba(46,204,113,0.4);color:#2ecc71;font-size:12px;font-weight:700;line-height:64px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ── 必殺技按鈕 ── */
#ultimate-btn{position:fixed;bottom:220px;right:30px;z-index:40;display:none;width:64px;height:64px;border-radius:50%;background:rgba(255,215,0,0.15);border:2px solid rgba(255,215,0,0.5);color:#ffd700;font-size:10px;font-weight:700;line-height:1.2;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;padding-top:18px}
#ultimate-btn.used{opacity:0.3;border-color:rgba(255,215,0,0.15);pointer-events:none}

/* ── 道具拾取通知 ── */
#pickup-notify{position:fixed;top:clamp(60px,10vh,80px);left:50%;transform:translateX(-50%);z-index:25;color:#ffd700;font-size:clamp(14px,2vw,18px);font-weight:700;text-shadow:0 0 12px rgba(255,215,0,0.6);opacity:0;transition:opacity 0.4s;pointer-events:none}
#pickup-notify.show{opacity:1}

/* ── 金色閃光（必殺技）── */
#gold-flash{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,215,0,0.5) 0%,transparent 70%);opacity:0;transition:opacity 0.3s}

/* ── 靜音按鈕 ── */
#mute-btn{position:fixed;top:12px;right:16px;z-index:50;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#e8d5b8;font-size:18px;line-height:36px;text-align:center;cursor:pointer;display:none;-webkit-tap-highlight-color:transparent;pointer-events:auto}

/* ── 呼吸提示 ── */
#breath-hint{position:fixed;bottom:clamp(80px,12vh,120px);left:50%;transform:translateX(-50%);z-index:20;color:#b8956a;font-size:clamp(11px,1.4vw,14px);opacity:0;transition:opacity 0.5s;pointer-events:none;text-align:center;white-space:nowrap}

/* ── 道具效果指示器 ── */
#buff-indicators{position:fixed;top:clamp(40px,7vh,60px);left:20px;z-index:21;display:none;pointer-events:none}
.buff-item{color:#ffd700;font-size:clamp(11px,1.4vw,14px);margin-bottom:4px;opacity:0.9;text-shadow:0 0 6px rgba(255,215,0,0.4)}
</style>

<script type="module">
import * as THREE from "three";

/* ════════════════════════════════════════════════
   常數與設定
   ════════════════════════════════════════════════ */
const PLATFORM_LEN = 320;
const PLATFORM_W   = 10;
const RUN_SPEED    = 8.5;
const SPRINT_SPEED = 12.5;
const SPRINT_MAX   = 100;
const SPRINT_DRAIN = 35;
const SPRINT_REGEN = 18;
const GAME_TIME    = 36;
const DODGE_SPEED  = 6;
const NPC_COUNT    = 35;
const CAR_LEN      = 22;
const CAR_COUNT    = 8;
const DAUGHTER_Z   = -(PLATFORM_LEN / 2 - 25);

const POWERUP_COLLECT_RADIUS = 1.5;
const NPC_SAFE_DISTANCE = 3;

/* Jump constants */
const JUMP_VELOCITY = 5;
const JUMP_GRAVITY  = -15;

/* Luggage constants */
const LUGGAGE_COUNT = 10;
const LUGGAGE_COLLISION_RADIUS = 0.5;
const LUGGAGE_CLEAR_HEIGHT = 0.3;

/* ════════════════════════════════════════════════
   DOM 參照
   ════════════════════════════════════════════════ */
const dom = {
  title:        document.getElementById("title-screen"),
  hud:          document.getElementById("hud"),
  timerFill:    document.getElementById("timer-fill"),
  timerText:    document.getElementById("timer-text"),
  distText:     document.getElementById("distance-text"),
  sprintWrap:   document.getElementById("sprint-bar-wrap"),
  sprintFill:   document.getElementById("sprint-fill"),
  narrText:     document.getElementById("narr-text"),
  vignette:     document.getElementById("vignette"),
  result:       document.getElementById("result-screen"),
  resultTitle:  document.getElementById("result-title"),
  resultBody:   document.getElementById("result-body"),
  resultRetry:  document.getElementById("result-retry"),
  touchCtrl:    document.getElementById("touch-controls"),
  joystickArea: document.getElementById("joystick-area"),
  joystickKnob: document.getElementById("joystick-knob"),
  sprintBtn:    document.getElementById("sprint-btn"),
  jumpBtn:      document.getElementById("jump-btn"),
  ultimateBtn:  document.getElementById("ultimate-btn"),
  breathHint:   document.getElementById("breath-hint"),
  pickupNotify: document.getElementById("pickup-notify"),
  goldFlash:    document.getElementById("gold-flash"),
  muteBtn:      document.getElementById("mute-btn"),
  buffIndicators: document.getElementById("buff-indicators"),
};

/* ════════════════════════════════════════════════
   遊戲狀態
   ════════════════════════════════════════════════ */
const state = {
  phase: "title",
  clock: 0,
  timeLeft: GAME_TIME,
  sprint: SPRINT_MAX,
  playerZ: PLATFORM_LEN / 2 - 10,
  playerX: 0,
  playerVx: 0,
  sprinting: false,
  gotDaughter: false,
  introTimer: 0,
  narrTimer: 0,
  cameraShake: 0,
  heartRate: 60,
  trainSouthZ: PLATFORM_LEN,
  trainNorthZ: -PLATFORM_LEN,
  trainSouthArrived: false,
  trainNorthArrived: false,
  trainNorthDoorOpen: false,
  trainNorthLeaving: false,
  doorPhase: 0,
  /* power-up timers */
  riceBallTimer: 0,
  coffeeTimer: 0,
  collisionSlowTimer: 0,
  /* ultimate */
  ultimateUsed: false,
  ultimateTimer: 0,
  /* pickup notification */
  pickupNotifyTimer: 0,
  /* jump state */
  jumpY: 0,
  jumpVel: 0,
  isJumping: false,
  /* luggage slow */
  luggageSlowTimer: 0,
};

/* ════════════════════════════════════════════════
   背景音樂
   ════════════════════════════════════════════════ */
const bgm = new Audio("\u628A\u62D4\u6211\u6703\u60F3\u4F60\u7684\u62F7\u8C9D.mp3");
bgm.loop = true;
bgm.volume = 0.3;
let bgmMuted = false;
let bgmFading = false;
let bgmFadeStart = 0;

dom.muteBtn.textContent = "\uD83D\uDD0A";
dom.muteBtn.addEventListener("click", () => {
  bgmMuted = !bgmMuted;
  bgm.muted = bgmMuted;
  dom.muteBtn.textContent = bgmMuted ? "\uD83D\uDD07" : "\uD83D\uDD0A";
});

/* ════════════════════════════════════════════════
   Three.js 初始化
   ════════════════════════════════════════════════ */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.006);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 12, PLATFORM_LEN / 2 + 20);
camera.lookAt(0, 0, 0);

/* ════════════════════════════════════════════════
   光源
   ════════════════════════════════════════════════ */
const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.25);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffe8cc, 1.2);
mainLight.position.set(10, 30, 0);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(1024, 1024);
mainLight.shadow.camera.left   = -15;
mainLight.shadow.camera.right  =  15;
mainLight.shadow.camera.top    =  60;
mainLight.shadow.camera.bottom = -60;
scene.add(mainLight);

const warmFill = new THREE.PointLight(0xffaa55, 0.6, 50);
warmFill.position.set(0, 8, 0);
scene.add(warmFill);

/* ════════════════════════════════════════════════
   材質庫
   ════════════════════════════════════════════════ */
const MAT = {
  platform:   new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 }),
  yellow:     new THREE.MeshStandardMaterial({ color: 0xf0c040, roughness: 0.5 }),
  rail:       new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 }),
  gravel:     new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 1.0 }),
  pillar:     new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.6 }),
  roof:       new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5, transparent: true, opacity: 0.7 }),
  window:     new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.1, metalness: 0.5 }),
  door:       new THREE.MeshStandardMaterial({ color: 0xbbbbbb, roughness: 0.3, metalness: 0.4 }),
  skin:       new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.8 }),
  fatherBody: new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.7 }),
  pink:       new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.6 }),
  bench:      new THREE.MeshStandardMaterial({ color: 0x8b7355, roughness: 0.8 }),
  hair:       new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 }),
  pants:      new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.7 }),
  shoe:       new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 }),
  pinkDress:  new THREE.MeshStandardMaterial({ color: 0xffb6c1, roughness: 0.6 }),
  pinkBag:    new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.6 }),
};

/* Father-specific materials */
const MAT_whiteSneaker = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.5 });
const MAT_glasses      = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.3 });
const MAT_fauxHawk     = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });

/* ════════════════════════════════════════════════
   迷彩紋理（背包 + 短褲用）
   ════════════════════════════════════════════════ */
function createCamoTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#556b2f";
  ctx.fillRect(0, 0, 128, 128);
  const colors = ["#3b5323", "#2e4a1e", "#6b4f2a", "#4a5d23", "#3d3d1e", "#5c4a1f"];
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
    ctx.beginPath();
    const cx = Math.random() * 128;
    const cy = Math.random() * 128;
    const rx = 5 + Math.random() * 18;
    const ry = 3 + Math.random() * 10;
    const rot = Math.random() * Math.PI;
    ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI * 2);
    ctx.fill();
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const camoTexture = createCamoTexture();
const MAT_camo = new THREE.MeshStandardMaterial({ map: camoTexture, roughness: 0.8 });

/* ════════════════════════════════════════════════
   建立月台
   ════════════════════════════════════════════════ */
function buildPlatform() {
  const g = new THREE.BoxGeometry(PLATFORM_W, 0.6, PLATFORM_LEN);
  const m = new THREE.Mesh(g, MAT.platform);
  m.position.y = -0.3;
  m.receiveShadow = true;
  scene.add(m);

  for (const side of [-1, 1]) {
    const yg = new THREE.BoxGeometry(0.3, 0.02, PLATFORM_LEN);
    const ym = new THREE.Mesh(yg, MAT.yellow);
    ym.position.set(side * (PLATFORM_W / 2 - 0.2), 0.01, 0);
    scene.add(ym);
  }

  for (const side of [-1, 1]) {
    const gg = new THREE.BoxGeometry(4, 0.1, PLATFORM_LEN);
    const gm = new THREE.Mesh(gg, MAT.gravel);
    gm.position.set(side * (PLATFORM_W / 2 + 3), -0.85, 0);
    scene.add(gm);
  }

  for (const side of [-1, 1]) {
    for (const rr of [-0.4, 0.4]) {
      const rg = new THREE.BoxGeometry(0.08, 0.12, PLATFORM_LEN);
      const rm = new THREE.Mesh(rg, MAT.rail);
      rm.position.set(side * (PLATFORM_W / 2 + 3) + rr, -0.7, 0);
      scene.add(rm);
    }
  }

  for (let z = -PLATFORM_LEN / 2 + 10; z <= PLATFORM_LEN / 2 - 10; z += 20) {
    for (const x of [-3, 3]) {
      const pg = new THREE.CylinderGeometry(0.2, 0.25, 6, 8);
      const pm = new THREE.Mesh(pg, MAT.pillar);
      pm.position.set(x, 3, z);
      pm.castShadow = true;
      scene.add(pm);
    }
    const rg = new THREE.BoxGeometry(PLATFORM_W + 2, 0.15, 18);
    const rm = new THREE.Mesh(rg, MAT.roof);
    rm.position.set(0, 6, z);
    scene.add(rm);
  }

  for (let z = -PLATFORM_LEN / 2 + 30; z <= PLATFORM_LEN / 2 - 30; z += 40) {
    const bg = new THREE.BoxGeometry(2, 0.5, 0.6);
    const bm = new THREE.Mesh(bg, MAT.bench);
    bm.position.set(-2.5, 0.25, z);
    bm.castShadow = true;
    scene.add(bm);
  }

  const floorG = new THREE.PlaneGeometry(100, PLATFORM_LEN + 40);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 1 });
  const floorM = new THREE.Mesh(floorG, floorMat);
  floorM.rotation.x = -Math.PI / 2;
  floorM.position.y = -0.9;
  floorM.receiveShadow = true;
  scene.add(floorM);
}

/* ════════════════════════════════════════════════
   建立火車
   ════════════════════════════════════════════════ */
const trainSouth = new THREE.Group();
const trainNorth = new THREE.Group();
const northDoors = [];

function buildTrain(group, color, stripe, hasDoors) {
  for (let i = 0; i < CAR_COUNT; i++) {
    const cz = -i * CAR_LEN;
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(3.2, 2.8, CAR_LEN - 1),
      new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.25 })
    );
    body.position.set(0, 1.4, cz);
    body.castShadow = true;
    group.add(body);

    const sg = new THREE.BoxGeometry(3.22, 0.2, CAR_LEN - 1.2);
    const sm = new THREE.Mesh(sg, new THREE.MeshStandardMaterial({ color: stripe, roughness: 0.4 }));
    sm.position.set(0, 1.8, cz);

    for (let wz = -CAR_LEN / 2 + 3; wz < CAR_LEN / 2 - 3; wz += 3) {
      for (const wx of [-1.61, 1.61]) {
        const wg = new THREE.BoxGeometry(0.02, 0.8, 1.4);
        const wm = new THREE.Mesh(wg, MAT.window);
        wm.position.set(wx, 2.0, cz + wz);
        group.add(wm);
      }
    }

    if (hasDoors) {
      for (const dz of [-CAR_LEN / 4, CAR_LEN / 4]) {
        const doorL = new THREE.Mesh(
          new THREE.BoxGeometry(0.05, 2.2, 0.7),
          MAT.door.clone()
        );

        doorL.position.set(1.61, 1.1, cz + dz - 0.35);
        doorR.position.set(1.61, 1.1, cz + dz + 0.35);
        group.add(doorL);
        group.add(doorR);
        northDoors.push({ left: doorL, right: doorR, z: cz + dz });
      }
    }

    for (const bz of [-CAR_LEN / 3, CAR_LEN / 3]) {
      const bg = new THREE.BoxGeometry(3.0, 0.5, 2);

      bm.position.set(0, -0.25, cz + bz);
      group.add(bm);
    }
  }
}

/* ════════════════════════════════════════════════
   Enhanced NPC humanoid builder
   ════════════════════════════════════════════════ */
function makeHumanoid(bodyColor, h, w, headSize) {
  const g = new THREE.Group();
  const scale = h / 1.7; /* normalize to ~1.7 average */

  /* Random clothing colors */
  const shirtColors = [0x555555, 0x666677, 0x776655, 0x557766, 0x886655, 0x556688, 0x778855, 0x887766, 0x993333, 0x336699, 0x669933, 0x996633];
  const pantsColors = [0x2a2a3a, 0x333344, 0x3a3a2a, 0x222233, 0x1a1a2a, 0x2a3a2a, 0x443322];
  const hairColors  = [0x1a1a1a, 0x3a2a1a, 0x2a1a0a, 0x5a3a2a, 0x1a0a0a, 0x4a3a2a];
  const shoeColors  = [0x1a1a1a, 0x2a2a2a, 0x3a2a1a, 0xf0f0f0, 0x555555];

  const shirtMat = new THREE.MeshStandardMaterial({ color: bodyColor || shirtColors[Math.floor(Math.random() * shirtColors.length)], roughness: 0.7 });
  const pantsMat = new THREE.MeshStandardMaterial({ color: pantsColors[Math.floor(Math.random() * pantsColors.length)], roughness: 0.7 });
  const hairMat  = new THREE.MeshStandardMaterial({ color: hairColors[Math.floor(Math.random() * hairColors.length)], roughness: 0.9 });
  const shoeMat  = new THREE.MeshStandardMaterial({ color: shoeColors[Math.floor(Math.random() * shoeColors.length)], roughness: 0.8 });

  /* Head */
  const headMesh = new THREE.Mesh(new THREE.SphereGeometry(headSize, 8, 8), MAT.skin);
  headMesh.position.y = h * 0.82;
  headMesh.castShadow = true;
  g.add(headMesh);

  /* Hair on top */
  const hairMesh = new THREE.Mesh(new THREE.SphereGeometry(headSize * 0.85, 6, 6), hairMat);
  hairMesh.position.y = h * 0.82 + headSize * 0.55;
  hairMesh.scale.set(1.1, 0.5, 1.1);
  g.add(hairMesh);

  /* Torso */
  const torsoH = h * 0.3;
  const torsoMesh = new THREE.Mesh(new THREE.CapsuleGeometry(w * 0.5, torsoH, 4, 8), shirtMat);
  torsoMesh.position.y = h * 0.52;
  torsoMesh.castShadow = true;
  g.add(torsoMesh);

  /* Left arm */
  const armLen = h * 0.25;
  const npcLeftArm = new THREE.Group();
  const armLMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.04 * scale, 0.035 * scale, armLen, 6), shirtMat);
  armLMesh.position.y = -armLen * 0.4;
  npcLeftArm.add(armLMesh);
  npcLeftArm.position.set(-(w * 0.5 + 0.06), h * 0.62, 0);
  npcLeftArm.rotation.z = 0.12;
  g.add(npcLeftArm);
  g.userData.leftArm = npcLeftArm;

  /* Right arm */
  const npcRightArm = new THREE.Group();
  const armRMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.04 * scale, 0.035 * scale, armLen, 6), shirtMat);
  armRMesh.position.y = -armLen * 0.4;
  npcRightArm.add(armRMesh);
  npcRightArm.position.set(w * 0.5 + 0.06, h * 0.62, 0);
  npcRightArm.rotation.z = -0.12;
  g.add(npcRightArm);
  g.userData.rightArm = npcRightArm;

  /* Left leg */
  const legLen = h * 0.22;
  const npcLeftLeg = new THREE.Group();
  const legLMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.055 * scale, 0.045 * scale, legLen, 6), pantsMat);
  legLMesh.position.y = -legLen * 0.4;
  npcLeftLeg.add(legLMesh);
  const shoeLMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1 * scale, 0.06 * scale, 0.16 * scale), shoeMat);
  shoeLMesh.position.set(0, -legLen * 0.85, -0.02);
  npcLeftLeg.add(shoeLMesh);
  npcLeftLeg.position.set(-w * 0.22, h * 0.24, 0);
  g.add(npcLeftLeg);
  g.userData.leftLeg = npcLeftLeg;

  /* Right leg */
  const npcRightLeg = new THREE.Group();
  const legRMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.055 * scale, 0.045 * scale, legLen, 6), pantsMat);
  legRMesh.position.y = -legLen * 0.4;
  npcRightLeg.add(legRMesh);
  const shoeRMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1 * scale, 0.06 * scale, 0.16 * scale), shoeMat);
  shoeRMesh.position.set(0, -legLen * 0.85, -0.02);
  npcRightLeg.add(shoeRMesh);
  npcRightLeg.position.set(w * 0.22, h * 0.24, 0);
  g.add(npcRightLeg);
  g.userData.rightLeg = npcRightLeg;

  /* Some NPCs carry bags/luggage (30% chance) */
  if (Math.random() < 0.3) {
    const bagColors = [0x8b4513, 0x2a2a2a, 0x556b2f, 0x4a3728, 0xcc6622];
    const bagMat = new THREE.MeshStandardMaterial({ color: bagColors[Math.floor(Math.random() * bagColors.length)], roughness: 0.7 });
    const bagW = 0.15 + Math.random() * 0.1;
    const bagH = 0.2 + Math.random() * 0.1;
    const bagD = 0.08 + Math.random() * 0.06;
    const bag = new THREE.Mesh(new THREE.BoxGeometry(bagW, bagH, bagD), bagMat);
    const side = Math.random() > 0.5 ? 1 : -1;
    bag.position.set(side * (w * 0.5 + 0.12), h * 0.35, 0);
    g.add(bag);
  }

  return g;
}

/* ════════════════════════════════════════════════
   行李障礙物系統
   ════════════════════════════════════════════════ */
const luggageItems = [];

function isNearNPCOrLuggage(x, z) {
  for (const npc of npcs) {
    const dx = x - npc.userData.baseX;
    const dz = z - npc.userData.baseZ;
    if (Math.sqrt(dx * dx + dz * dz) < NPC_SAFE_DISTANCE) return true;
  }
  for (const lg of luggageItems) {
    const dx = x - lg.position.x;
    const dz = z - lg.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < 2) return true;
  }
  return false;
}

function spawnLuggage() {
  const luggageColors = [0x8b4513, 0x2a2a2a, 0x666666, 0x1a2a4a, 0x4a3728, 0x3a3a3a];
  const zStart = PLATFORM_LEN / 2 - 25;
  const zEnd = DAUGHTER_Z + 15;

  for (let i = 0; i < LUGGAGE_COUNT; i++) {
    const segLen = (zStart - zEnd) / LUGGAGE_COUNT;
    const zMin = zStart - (i + 1) * segLen;
    const zMax = zStart - i * segLen;

    let px, pz, found = false;
    for (let attempt = 0; attempt < 30; attempt++) {
      px = (Math.random() - 0.5) * (PLATFORM_W - 4);
      pz = zMin + Math.random() * (zMax - zMin);
      if (!isNearNPCOrLuggage(px, pz)) { found = true; break; }
    }
    if (!found) {
      px = (Math.random() - 0.5) * 3;
      pz = zMin + Math.random() * (zMax - zMin);
    }

    const w = 0.5 + Math.random() * 0.2;
    const h = 0.3 + Math.random() * 0.1;
    const d = 0.35 + Math.random() * 0.1;
    const color = luggageColors[Math.floor(Math.random() * luggageColors.length)];
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(px, h / 2, pz);
    mesh.rotation.y = Math.random() * Math.PI;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    /* Add a handle/strap on top */
    const handleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.04, 0.04), handleMat);
    handle.position.y = h / 2 + 0.02;
    mesh.add(handle);

    scene.add(mesh);
    luggageItems.push(mesh);
  }
}

function resetLuggage() {
  for (const lg of luggageItems) {
    scene.remove(lg);
    lg.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material && child.material.dispose) child.material.dispose();
    });
  }
  luggageItems.length = 0;
  spawnLuggage();
}

function checkLuggageCollisions() {
  if (state.luggageSlowTimer > 0) return;
  for (const lg of luggageItems) {
    const dx = father.position.x - lg.position.x;
    const dz = father.position.z - lg.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < LUGGAGE_COLLISION_RADIUS) {
      /* If jumping high enough, clear the luggage */
      if (state.jumpY > LUGGAGE_CLEAR_HEIGHT) continue;
      /* Hit luggage: slow + camera shake */
      state.luggageSlowTimer = 0.5;
      state.cameraShake = 4;
      playCollisionBump();
      showPickupNotify("\u884C\u674E\u7D46\u5012\uFF01\u6E1B\u901F\u4E2D...");
    }
  }
}

    const dx = x - npc.userData.baseX;
    const dz = z - npc.userData.baseZ;
    if (Math.sqrt(dx * dx + dz * dz) < NPC_SAFE_DISTANCE) return true;
  }
  return false;
}

function findSafePosition(zMin, zMax) {
  for (let attempt = 0; attempt < 30; attempt++) {
    const x = (Math.random() - 0.5) * (PLATFORM_W - 4);
    const z = zMin + Math.random() * (zMax - zMin);
    if (!isNearNPC(x, z)) return { x, z };

  return { x: (Math.random() - 0.5) * 3, z: zMin + Math.random() * (zMax - zMin) };

  const zStart = PLATFORM_LEN / 2 - 20;
  const zEnd = DAUGHTER_Z + 10;

  for (let i = 0; i < RICEBALL_COUNT; i++) {
    const segLen = (zStart - zEnd) / RICEBALL_COUNT;
    const zMin = zStart - (i + 1) * segLen;
    const zMax = zStart - i * segLen;
    const pos = findSafePosition(zMin, zMax);
    createRiceBall(pos.x, pos.z);
  }

  for (let i = 0; i < COFFEE_COUNT; i++) {
    const segLen = (zStart - zEnd) / COFFEE_COUNT;
    const zMin = zStart - (i + 1) * segLen;
    const zMax = zStart - i * segLen;
    const pos = findSafePosition(zMin, zMax);
    createCoffee(pos.x, pos.z);
  }
}

function resetPowerups() {
  for (const p of powerups) {
    scene.remove(p);
    /* Dispose geometries and materials */
    p.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material && child.material.dispose) child.material.dispose();
    });
  }
  powerups.length = 0;
  spawnPowerups();
}

function updatePowerups(dt) {
  for (const p of powerups) {
    if (p.userData.collected) continue;
    /* Float and rotate */
    p.rotation.y += dt * 1.5;
    p.position.y = p.userData.baseY + Math.sin(state.clock * 3 + p.position.z) * 0.1;

    /* Check collection */
    const dx = father.position.x - p.position.x;
    const dz = father.position.z - p.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < POWERUP_COLLECT_RADIUS) {
      p.userData.collected = true;
      scene.remove(p);

      if (p.userData.type === "riceball") {
        state.riceBallTimer = 3;
        showPickupNotify("+\u5FA1\u98EF\u7CF0\uFF1A\u885D\u523A\u5EF6\u9577\uFF01");
      } else if (p.userData.type === "coffee") {
        state.coffeeTimer = 3;
        showPickupNotify("+\u7279\u5927\u71B1\u7F8E\u5F0F\uFF1A\u901F\u5EA6\u52A0\u500D\uFF01");
      }
    }
  }

  /* Update timers */
  if (state.riceBallTimer > 0) state.riceBallTimer = Math.max(0, state.riceBallTimer - dt);
  if (state.coffeeTimer > 0) state.coffeeTimer = Math.max(0, state.coffeeTimer - dt);
  if (state.collisionSlowTimer > 0) state.collisionSlowTimer = Math.max(0, state.collisionSlowTimer - dt);
  if (state.ultimateTimer > 0) state.ultimateTimer = Math.max(0, state.ultimateTimer - dt);
  if (state.luggageSlowTimer > 0) state.luggageSlowTimer = Math.max(0, state.luggageSlowTimer - dt);

  /* Update pickup notification */
  if (state.pickupNotifyTimer > 0) {
    state.pickupNotifyTimer -= dt;
    if (state.pickupNotifyTimer <= 0) {
      dom.pickupNotify.classList.remove("show");
    }
  }
}

function showPickupNotify(text) {
  dom.pickupNotify.textContent = text;
  dom.pickupNotify.classList.add("show");
  state.pickupNotifyTimer = 2;
}

let doorMarker = null;

function createDoorMarker() {
  const group = new THREE.Group();
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.5, 0.08, 8, 24),
    new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.8, transparent: true, opacity: 0.8 })
  );
  ring.rotation.x = -Math.PI / 2;
  group.add(ring);

  const arrow = new THREE.Mesh(
    new THREE.ConeGeometry(0.25, 0.6, 4),
    new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.6 })
  );
  arrow.position.y = 1.5;
  group.add(arrow);

  const glow = new THREE.PointLight(0x00ff88, 2, 10);
  glow.position.y = 1;
  group.add(glow);

  group.visible = false;
  scene.add(group);
  doorMarker = group;
}

function updateDoorMarker() {
  if (!doorMarker) return;
  if (state.gotDaughter && state.phase === "sprint2") {
    doorMarker.visible = true;
    /* Find nearest door */
    let nearestDoor = null;
    let nearestDist = Infinity;
    for (const d of northDoors) {
      const doorWorldZ = trainNorth.position.z + d.z;
      const dz = Math.abs(father.position.z - doorWorldZ);
      if (dz < nearestDist) {
        nearestDist = dz;
        nearestDoor = d;
      }
    }
    if (nearestDoor) {
      const doorWorldZ = trainNorth.position.z + nearestDoor.z;
      const markerX = PLATFORM_W / 2 - 1;
      doorMarker.position.set(markerX, 0.1, doorWorldZ);
      /* Pulse animation */
      doorMarker.children[1].position.y = 1.5 + Math.sin(state.clock * 4) * 0.3;
      doorMarker.children[1].rotation.y = state.clock * 2;
    }
  } else {
    doorMarker.visible = false;
  }
}

/* ════════════════════════════════════════════════
   音效系統（程序化生成）
   ════════════════════════════════════════════════ */
let audioCtx = null;
let nextBeat = 0;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playHeartbeat() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  if (now < nextBeat) return;
  const interval = 60 / state.heartRate;
  nextBeat = now + interval;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(55, now);
  osc.frequency.exponentialRampToValueAtTime(35, now + 0.15);
  gain.gain.setValueAtTime(0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.3);

  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = "sine";
  osc2.frequency.setValueAtTime(50, now + 0.12);
  osc2.frequency.exponentialRampToValueAtTime(30, now + 0.27);
  gain2.gain.setValueAtTime(0.2, now + 0.12);
  gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(now + 0.12);
  osc2.stop(now + 0.4);
}

function playFootstep() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.015));
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.08;
  const filter = audioCtx.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 800;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(now);
}

function playDoorChime() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  for (let i = 0; i < 4; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, now + i * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.3 + 0.2);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.3);
    osc.stop(now + i * 0.3 + 0.25);
  }
}

function playSuccess() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  [523, 659, 784].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.12, now + i * 0.2);
    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.4);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now + i * 0.2);
    osc.stop(now + i * 0.2 + 0.5);
  });
}

function playCollisionBump() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(120, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
  gain.gain.setValueAtTime(0.15, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.25);
}

/* ════════════════════════════════════════════════
   環境音效系統（車站氛圍）
   ════════════════════════════════════════════════ */
const ambientNodes = [];
let ambientRunning = false;
let nextPAChime = 0;

function startAmbientSounds() {
  if (!audioCtx || ambientRunning) return;
  ambientRunning = true;

  /* 1) Crowd murmur: filtered white noise at very low volume */
  const crowdBufLen = audioCtx.sampleRate * 4;
  const crowdBuf = audioCtx.createBuffer(1, crowdBufLen, audioCtx.sampleRate);
  const crowdData = crowdBuf.getChannelData(0);
  for (let i = 0; i < crowdBufLen; i++) crowdData[i] = (Math.random() * 2 - 1);
  const crowdSrc = audioCtx.createBufferSource();
  crowdSrc.buffer = crowdBuf;
  crowdSrc.loop = true;
  const crowdFilter = audioCtx.createBiquadFilter();
  crowdFilter.type = "lowpass";
  crowdFilter.frequency.value = 400;
  const crowdFilter2 = audioCtx.createBiquadFilter();
  crowdFilter2.type = "highpass";
  crowdFilter2.frequency.value = 80;
  const crowdGain = audioCtx.createGain();
  crowdGain.gain.value = 0.04;
  crowdSrc.connect(crowdFilter);
  crowdFilter.connect(crowdFilter2);
  crowdFilter2.connect(crowdGain);
  crowdGain.connect(audioCtx.destination);
  crowdSrc.start();
  ambientNodes.push(crowdSrc, crowdFilter, crowdFilter2, crowdGain);

  /* 2) Platform hum: low-frequency continuous tone (~100Hz) */
  const humOsc = audioCtx.createOscillator();
  humOsc.type = "sine";
  humOsc.frequency.value = 100;
  const humGain = audioCtx.createGain();
  humGain.gain.value = 0.015;
  humOsc.connect(humGain);
  humGain.connect(audioCtx.destination);
  humOsc.start();
  ambientNodes.push(humOsc, humGain);

  /* 3) PA announcement timer */
  nextPAChime = audioCtx.currentTime + 12 + Math.random() * 5;
}

function playPAChime() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  /* Ding */
  const ding = audioCtx.createOscillator();
  ding.type = "sine";
  ding.frequency.value = 880;
  const dingGain = audioCtx.createGain();
  dingGain.gain.setValueAtTime(0.06, now);
  dingGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
  ding.connect(dingGain);
  dingGain.connect(audioCtx.destination);
  ding.start(now);
  ding.stop(now + 0.9);
  /* Dong */
  const dong = audioCtx.createOscillator();
  dong.type = "sine";
  dong.frequency.value = 660;
  const dongGain = audioCtx.createGain();
  dongGain.gain.setValueAtTime(0.06, now + 0.5);
  dongGain.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
  dong.connect(dongGain);
  dongGain.connect(audioCtx.destination);
  dong.start(now + 0.5);
  dong.stop(now + 1.4);
}

function playTrainScreech() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  /* Metallic screech using sawtooth with bandpass */
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
  const noiseData = noiseBuf.getChannelData(0);
  for (let i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() * 2 - 1);
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuf;
  const bandpass = audioCtx.createBiquadFilter();
  bandpass.type = "bandpass";
  bandpass.frequency.value = 3000;
  bandpass.Q.value = 5;
  const screechGain = audioCtx.createGain();
  screechGain.gain.setValueAtTime(0.06, now);
  screechGain.gain.linearRampToValueAtTime(0.1, now + 0.3);
  screechGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
  noiseSrc.connect(bandpass);
  bandpass.connect(screechGain);
  screechGain.connect(audioCtx.destination);
  noiseSrc.start(now);
}

function updateAmbientSounds() {
  if (!ambientRunning || !audioCtx) return;
  /* Periodic PA chime */
  if (audioCtx.currentTime >= nextPAChime) {
    playPAChime();
    nextPAChime = audioCtx.currentTime + 13 + Math.random() * 5;
  }
}

function stopAmbientSounds() {
  ambientRunning = false;
  for (const node of ambientNodes) {
    try {
      if (node.stop) node.stop();
      if (node.disconnect) node.disconnect();
    } catch (e) { /* ignore */ }
  }
  ambientNodes.length = 0;
}

const keys = {};
let isMobile = false;

function triggerJump() {
  if (!state.isJumping && (state.phase === "running" || state.phase === "sprint2")) {
    state.isJumping = true;
    state.jumpVel = JUMP_VELOCITY;

function detectMobile() {
  isMobile = "ontouchstart" in window || navigator.maxTouchPoints > 0;
  if (isMobile) {
    dom.touchCtrl.style.display = "block";
    dom.sprintBtn.style.display = "block";

    dom.breathHint.textContent = "\u5DE6\u624B\u6416\u687F\u79FB\u52D5 \u00B7 \u53F3\u624B\u885D\u523A \u00B7 \u8DF3\u8E8D \u00B7 \u5FC5\u6BBA\u6280[E]";
  } else {
    dom.breathHint.textContent = "WASD \u79FB\u52D5 \u00B7 Shift \u885D\u523A \u00B7 Space \u8DF3\u8E8D \u00B7 E \u5FC5\u6BBA\u6280";
  }
}

let joyActive = false;
let joyCenter = { x: 0, y: 0 };
dom.joystickArea.addEventListener("touchstart", e => {
  e.preventDefault();
  joyActive = true;
  const r = dom.joystickArea.getBoundingClientRect();
  joyCenter = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}, { passive: false });
dom.joystickArea.addEventListener("touchmove", e => {
  e.preventDefault();
  if (!joyActive) return;
  const t = e.touches[0];
  const dx = t.clientX - joyCenter.x;
  const dy = t.clientY - joyCenter.y;
  const maxR = 50;
  const dist = Math.min(Math.sqrt(dx * dx + dy * dy), maxR);
  const angle = Math.atan2(dy, dx);
  touchJoyX = Math.cos(angle) * (dist / maxR);
  touchJoyY = Math.sin(angle) * (dist / maxR);
  dom.joystickKnob.style.transform = "translate(calc(-50% + " + (touchJoyX * 38) + "px), calc(-50% + " + (touchJoyY * 38) + "px))";
}, { passive: false });
const endJoy = () => { joyActive = false; touchJoyX = 0; touchJoyY = 0; dom.joystickKnob.style.transform = "translate(-50%,-50%)"; };
dom.joystickArea.addEventListener("touchend", endJoy);
dom.joystickArea.addEventListener("touchcancel", endJoy);

dom.sprintBtn.addEventListener("touchstart", e => { e.preventDefault(); touchSprinting = true; }, { passive: false });
dom.sprintBtn.addEventListener("touchend",   () => { touchSprinting = false; });
dom.sprintBtn.addEventListener("touchcancel", () => { touchSprinting = false; });

dom.jumpBtn.addEventListener("touchstart", e => { e.preventDefault(); triggerJump(); }, { passive: false });

dom.ultimateBtn.addEventListener("touchstart", e => { e.preventDefault(); activateUltimate(); }, { passive: false });

}

/* ════════════════════════════════════════════════
   碰撞偵測
   ════════════════════════════════════════════════ */
function checkCollisions() {
  for (const npc of npcs) {
    const dx = father.position.x - npc.position.x;
    const dz = father.position.z - npc.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 0.8) {
      const push = (0.8 - dist) * 0.7;
      father.position.x += (dx / dist) * push;
      father.position.z += (dz / dist) * push;

      /* NPC collision penalty */
      if (state.collisionSlowTimer <= 0) {
        state.collisionSlowTimer = 1.0;
        state.cameraShake = 3;
        playCollisionBump();
      }
    }
  }
  const halfW = PLATFORM_W / 2 - 0.5;
  father.position.x = Math.max(-halfW, Math.min(halfW, father.position.x));

  /* Z-axis boundary clamping */
  const halfZ = PLATFORM_LEN / 2 - 2;
  father.position.z = Math.max(-halfZ, Math.min(halfZ, father.position.z));
}

/* ════════════════════════════════════════════════
   開場動畫
   ════════════════════════════════════════════════ */
let introScreechPlayed = false;

function startIntro() {
  state.phase = "intro";
  state.introTimer = 0;
  introScreechPlayed = false;
  document.body.classList.add("letterbox-on");
  state.trainSouthZ = PLATFORM_LEN * 0.8;
  state.trainNorthZ = -PLATFORM_LEN * 0.8;
  state.trainSouthArrived = false;
  state.trainNorthArrived = false;
}

function updateIntro(dt) {
  state.introTimer += dt;
  const t = state.introTimer;

  if (t < 4) {
    const p = t / 4;
    camera.position.set(
      Math.sin(p * 0.3) * 8,
      15 - p * 5,
      PLATFORM_LEN / 2 - p * 30
    );
    camera.lookAt(0, 0, PLATFORM_LEN / 3);
    if (t > 1 && t < 3.5) showNarrative("\u5357\u4E0B\u7684\u706B\u8ECA\u6162\u6162\u6ED1\u9032\u53F0\u4E2D\u7AD9", 2);
  }

  if (!state.trainSouthArrived) {
    state.trainSouthZ -= dt * 25;
    /* Play train screech when approaching */
    if (!introScreechPlayed && state.trainSouthZ < PLATFORM_LEN * 0.4) {
      introScreechPlayed = true;
      playTrainScreech();
    }
    if (state.trainSouthZ <= 0) {
      state.trainSouthZ = 0;
      state.trainSouthArrived = true;
    }
    trainSouth.position.z = state.trainSouthZ;
  }

  if (t >= 4 && t < 7) {
    const p = (t - 4) / 3;
    camera.position.set(2, 2.5, state.playerZ + 5 - p * 3);
    camera.lookAt(father.position.x, 1.2, father.position.z);
    if (t > 4.5 && t < 6.5) showNarrative("\u6709\u4E00\u500B\u4EBA\u5F9E\u4E00\u865F\u8ECA\u5EC2\u885D\u4E86\u51FA\u4F86\u2014\u2014\u90A3\u662F\u628A\u62D4", 2.5);
  }

  if (t > 3 && !state.trainNorthArrived) {
    state.trainNorthZ += dt * 20;
    if (state.trainNorthZ >= 0) {
      state.trainNorthZ = 0;
      state.trainNorthArrived = true;
      state.trainNorthDoorOpen = true;
      state.doorPhase = 0;
    }
    trainNorth.position.z = state.trainNorthZ;
  }

  if (t >= 7 && t < 9) {
    const p = (t - 7) / 2;
    camera.position.set(
      THREE.MathUtils.lerp(2, 3, p),
      THREE.MathUtils.lerp(2.5, 2, p),
      THREE.MathUtils.lerp(state.playerZ + 2, DAUGHTER_Z + 8, p)
    );
    camera.lookAt(1, 0.5, DAUGHTER_Z);
    if (t > 7.5) showNarrative("\u6708\u53F0\u53E6\u4E00\u7AEF\uFF0C\u6709\u500B\u7C89\u7D05\u8272\u5C0F\u80CC\u5305\u5728\u7B49\u4ED6", 2);
  }

  if (t >= 9.5) {
    state.phase = "running";
    state.timeLeft = GAME_TIME;
    dom.hud.style.display = "block";
    dom.sprintWrap.style.display = "block";
    dom.muteBtn.style.display = "block";
    dom.buffIndicators.style.display = "block";
    dom.breathHint.style.opacity = "1";
    setTimeout(() => { dom.breathHint.style.opacity = "0"; }, 4000);
    document.body.classList.remove("letterbox-on");
    showNarrative("\u8DD1\uFF01", 1.5);
    if (audioCtx) playDoorChime();
    startAmbientSounds();
  }
}

/* ════════════════════════════════════════════════
   門動畫
   ════════════════════════════════════════════════ */
function updateDoors() {
  const dt = 0.016;
  if (state.trainNorthDoorOpen && state.doorPhase < 1) {
    state.doorPhase = Math.min(1, state.doorPhase + dt * 1.5);
  }
  if (state.trainNorthLeaving && state.doorPhase > 0) {
    state.doorPhase = Math.max(0, state.doorPhase - dt * 2);
  }
  const offset = state.doorPhase * 0.65;
  for (const d of northDoors) {
    d.left.position.z  = d.z - 0.35 - offset;
    d.right.position.z = d.z + 0.35 + offset;
  }
}

/* ════════════════════════════════════════════════
   HUD 道具效果指示
   ════════════════════════════════════════════════ */
function updateBuffIndicators() {
  dom.buffIndicators.textContent = "";
  if (state.riceBallTimer > 0) {
    const el = document.createElement("div");
    el.className = "buff-item";
    el.textContent = "\u5FA1\u98EF\u7CF0 " + state.riceBallTimer.toFixed(1) + "s";
    dom.buffIndicators.appendChild(el);
  }
  if (state.coffeeTimer > 0) {
    const el = document.createElement("div");
    el.className = "buff-item";
    el.textContent = "\u7279\u5927\u71B1\u7F8E\u5F0F " + state.coffeeTimer.toFixed(1) + "s";
    dom.buffIndicators.appendChild(el);
  }
  if (state.ultimateTimer > 0) {
    const el = document.createElement("div");
    el.className = "buff-item";
    el.textContent = "\u2728 \u6211\u4E5F\u6703\u60F3\u59B3\u7684 " + state.ultimateTimer.toFixed(1) + "s";
    dom.buffIndicators.appendChild(el);
  }
  if (state.collisionSlowTimer > 0) {
    const el = document.createElement("div");
    el.className = "buff-item";
    el.style.color = "#e74c3c";
    el.textContent = "\u6E1B\u901F\u4E2D " + state.collisionSlowTimer.toFixed(1) + "s";
    dom.buffIndicators.appendChild(el);
  }
  if (state.luggageSlowTimer > 0) {
    const el = document.createElement("div");
    el.className = "buff-item";
    el.style.color = "#e74c3c";
    el.textContent = "\u884C\u674E\u7D46\u5012 " + state.luggageSlowTimer.toFixed(1) + "s";
    dom.buffIndicators.appendChild(el);
  }
}

/* ════════════════════════════════════════════════
   跳躍物理更新
   ════════════════════════════════════════════════ */
function updateJump(dt) {
  if (state.isJumping) {
    state.jumpVel += JUMP_GRAVITY * dt;
    state.jumpY += state.jumpVel * dt;
    if (state.jumpY <= 0) {
      state.jumpY = 0;
      state.jumpVel = 0;
      state.isJumping = false;
    }
  }
}

/* ════════════════════════════════════════════════
   遊戲邏輯更新
   ════════════════════════════════════════════════ */
let footstepTimer = 0;
let sprint2HintShown = false;

function updateGame(dt) {
  if (state.phase !== "running" && state.phase !== "sprint2") return;

  let moveX = 0, moveZ = 0;
  if (isMobile) {
    moveX = touchJoyX;
    moveZ = -touchJoyY;
    state.sprinting = touchSprinting;
  } else {
    if (keys["KeyA"] || keys["ArrowLeft"])  moveX = -1;
    if (keys["KeyD"] || keys["ArrowRight"]) moveX =  1;
    if (keys["KeyW"] || keys["ArrowUp"])    moveZ = -1;
    if (keys["KeyS"] || keys["ArrowDown"])  moveZ =  1;
    state.sprinting = !!(keys["ShiftLeft"] || keys["ShiftRight"]);
  }

  /* Calculate speed multipliers */
  let speedMult = 1, drainMult = 1;
  if (state.coffeeTimer > 0) speedMult *= 2;
  if (state.riceBallTimer > 0) drainMult *= 0.5;
  if (state.ultimateTimer > 0) { speedMult *= 2; drainMult *= 0.5; }
  if (state.collisionSlowTimer > 0) speedMult *= 0.5;
  if (state.luggageSlowTimer > 0) speedMult *= 0.3;

  if (state.sprinting && state.sprint > 0) {
    state.sprint = Math.max(0, state.sprint - SPRINT_DRAIN * drainMult * dt);
  } else {
    state.sprinting = false;
    state.sprint = Math.min(SPRINT_MAX, state.sprint + SPRINT_REGEN * dt);
  }

  const baseSpeed = state.sprinting ? SPRINT_SPEED : RUN_SPEED;
  const speed = baseSpeed * speedMult;
  const carrying = state.gotDaughter ? 0.75 : 1;

  let vz = -speed * carrying;
  if (moveZ > 0) vz = speed * 0.3 * carrying;
  if (moveZ < 0) vz = -speed * carrying;

  father.position.z += vz * dt;
  father.position.x += moveX * DODGE_SPEED * speedMult * dt;

  /* sprint2: auto-steer slightly right toward train */
  if (state.phase === "sprint2") {
    father.position.x += 0.5 * dt;

    if (!sprint2HintShown) {
      sprint2HintShown = true;
      setTimeout(() => {
        if (state.phase === "sprint2") {
          showNarrative("\u5F80\u53F3\u908A\uFF01\u885D\u5411\u5317\u4E0A\u81EA\u5F37\u865F\u7684\u8ECA\u9580\uFF01", 3);
        }
      }, 2800);
    }
  }

  checkCollisions();
  checkLuggageCollisions();

  /* Update jump physics */
  updateJump(dt);

  state.timeLeft -= dt;

  const urgency = 1 - state.timeLeft / GAME_TIME;
  state.heartRate = 60 + urgency * 120;
  playHeartbeat();

  footstepTimer -= dt;
  if (footstepTimer <= 0 && !state.isJumping) {
    playFootstep();
    footstepTimer = state.sprinting ? 0.25 : 0.35;
  }

  /* Father position: grounded base + bob + jump */
  const bobFreq = state.sprinting ? 12 : 8;
  const bobAmt = state.isJumping ? 0 : (Math.abs(Math.sin(state.clock * bobFreq)) * 0.035);
  father.position.y = FATHER_BASE_Y + bobAmt + state.jumpY;
  father.rotation.z = state.isJumping ? 0 : (Math.sin(state.clock * bobFreq * 0.5) * 0.05);

  /* Leg animation */
  if (state.isJumping) {
    /* Tucked pose during jump */
    fatherLeftLeg.rotation.x = 0.3;
    fatherRightLeg.rotation.x = 0.3;
    fatherLeftArm.rotation.x = -0.2;
    fatherRightArm.rotation.x = -0.2;
  } else {
    const legSwing = Math.sin(state.clock * bobFreq) * 0.5;
    fatherLeftLeg.rotation.x = legSwing;
    fatherRightLeg.rotation.x = -legSwing;
    fatherLeftArm.rotation.x = -legSwing * 0.7;
    fatherRightArm.rotation.x = legSwing * 0.7;
  }

  /* Father glow during ultimate */
  if (fatherGlowLight && state.ultimateTimer > 0) {
    fatherGlowLight.intensity = 2 + Math.sin(state.clock * 8) * 1;
  }

  const pct = Math.max(0, state.timeLeft / GAME_TIME) * 100;
  dom.timerFill.style.width = pct + "%";
  dom.timerText.textContent = Math.max(0, state.timeLeft).toFixed(1);
  dom.sprintFill.style.width = (state.sprint / SPRINT_MAX * 100) + "%";

  if (!state.gotDaughter) {
    const dist = Math.abs(father.position.z - DAUGHTER_Z);
    dom.distText.textContent = "\u8DDD\u96E2\u5973\u5152 " + Math.max(0, dist).toFixed(0) + "m";
  } else {
    let minD = Infinity;
    for (const d of northDoors) {
      const dWorldZ = trainNorth.position.z + d.z;
      const dz = Math.abs(father.position.z - dWorldZ);
      if (dz < minD) minD = dz;
    }
    dom.distText.textContent = "\u8DDD\u96E2\u8ECA\u9580 " + Math.max(0, minD).toFixed(0) + "m";
  }

  dom.vignette.style.opacity = state.timeLeft < 10 ? String((1 - state.timeLeft / 10) * 0.6) : "0";

  if (state.timeLeft < 8) {
    dom.timerText.style.color = "#e74c3c";
  } else if (state.timeLeft < 15) {
    dom.timerText.style.color = "#f39c12";
  }

  /* Power-ups */
  updatePowerups(dt);
  updateBuffIndicators();
  updateDoorMarker();
  updateAmbientSounds();

  if (!state.gotDaughter && Math.abs(father.position.z - DAUGHTER_Z) < 2.5) {
    state.gotDaughter = true;
    state.phase = "grabbed";
    showNarrative("\u628A\u62D4\u628A\u6211\u6574\u500B\u62B1\u8D77\u4F86", 2);
    playSuccess();
    scene.remove(daughter);
    father.add(daughter);
    daughter.position.set(0.3, 0.6, 0.2);
    setTimeout(() => {
      state.phase = "sprint2";
      showNarrative("\u5FEB\uFF01\u5317\u4E0A\u81EA\u5F37\u865F\u7684\u9580\u8981\u95DC\u4E86\uFF01", 2.5);
      if (audioCtx) playDoorChime();
    }, 1500);
    return;
  }

  /* Victory detection — generous zone */
  if (state.gotDaughter && state.phase === "sprint2") {
    for (const d of northDoors) {
      const doorWorldZ = trainNorth.position.z + d.z;
      const dz = Math.abs(father.position.z - doorWorldZ);
      if (father.position.x > 2 && dz < 5) {
        victory();
        return;
      }
    }
  }

  if (state.timeLeft <= 0) {
    failure();
  }
}

/* ════════════════════════════════════════════════
   BGM 淡出
   ════════════════════════════════════════════════ */
function fadeBGM(duration) {
  bgmFading = true;
  bgmFadeStart = performance.now();
  const startVol = bgm.volume;
  function fadeStep() {
    if (!bgmFading) return;
    const elapsed = (performance.now() - bgmFadeStart) / 1000;
    const ratio = Math.max(0, 1 - elapsed / duration);
    bgm.volume = startVol * ratio;
    if (ratio > 0) {
      requestAnimationFrame(fadeStep);
    } else {
      bgm.pause();
      bgmFading = false;
    }
  }
  requestAnimationFrame(fadeStep);
}

/* ════════════════════════════════════════════════
   勝利 / 失敗
   ════════════════════════════════════════════════ */
function victory() {
  state.phase = "victory";
  document.body.classList.add("letterbox-on");
  dom.hud.style.display = "none";
  dom.sprintWrap.style.display = "none";
  dom.vignette.style.opacity = "0";
  dom.buffIndicators.style.display = "none";
  if (isMobile) {
    dom.touchCtrl.style.display = "none";
    dom.sprintBtn.style.display = "none";
    dom.jumpBtn.style.display = "none";
    dom.ultimateBtn.style.display = "none";
  }
  playSuccess();
  showNarrative("\u300C\u6211\u8D95\u4E0A\u4E86\u3002\u300D", 4);
  stopAmbientSounds();

  /* Fade BGM */
  fadeBGM(3);

  setTimeout(() => {
    showNarrative("\u4ED6\u4E00\u908A\u5598\u6C23\uFF0C\u4E00\u908A\u7B11", 3);
  }, 4500);

  setTimeout(() => {
    dom.result.classList.add("show");
    dom.resultTitle.textContent = "\u6211\u8D95\u4E0A\u4E86\u3002";
    dom.resultBody.textContent = "";
    const lines = [
      "\u5728\u90A3\u500B\u64C1\u62B1\u88E1\uFF0C\u6211\u770B\u5230\u4ED6\u5FC3\u88E1\u771F\u6B63\u60F3\u7684\u662F\uFF1A",
      "\u4E0D\u7BA1\u591A\u8D95\u3001\u591A\u7D2F\uFF0C\u4ED6\u90FD\u8981\u300C\u6BCF\u4E00\u6B21\u90FD\u8D95\u4E0A\u300D\u3002",
      "",
      "\u53EA\u8981\u4ED6\u9084\u9858\u610F\u5728\u6708\u53F0\u4E0A\u90A3\u6A23\u7528\u529B\u5954\u8DD1\uFF0C",
      "\u6211\u5011\u4E4B\u9593\uFF0C\u5C31\u9084\u6709\u4E00\u689D",
      "\u62C9\u5F97\u518D\u9577\u4E5F\u4E0D\u6703\u65B7\u7684\u7DDA\u3002"
    ];
    lines.forEach((line) => {
      const el = document.createElement("div");
      el.textContent = line || "\u00A0";
      dom.resultBody.appendChild(el);
    });
  }, 8000);
}

function failure() {
  state.phase = "fail";
  state.trainNorthLeaving = true;
  document.body.classList.add("letterbox-on");
  dom.hud.style.display = "none";
  dom.sprintWrap.style.display = "none";
  dom.vignette.style.opacity = "0";
  dom.buffIndicators.style.display = "none";
  if (isMobile) {
    dom.touchCtrl.style.display = "none";
    dom.sprintBtn.style.display = "none";
    dom.jumpBtn.style.display = "none";
    dom.ultimateBtn.style.display = "none";
  }
  showNarrative("\u8ECA\u9580\u95DC\u4E0A\u4E86\u2026\u2026", 4);
  stopAmbientSounds();

  /* Stop BGM */
  bgm.pause();

  setTimeout(() => {
    dom.result.classList.add("show");
    dom.resultTitle.textContent = "\u4F86\u4E0D\u53CA\u4E86";
    dom.resultBody.textContent = "";
    const lines = [
      "\u53EF\u662F\u4ED6\u5F9E\u4E0D\u653E\u68C4\u3002",
      "\u6BCF\u4E00\u6B21\uFF0C\u4ED6\u90FD\u6703\u518D\u8A66\u4E00\u6B21\u3002",
      "",
      "\u56E0\u70BA\u6708\u53F0\u7684\u53E6\u4E00\u7AEF\uFF0C",
      "\u6709\u4ED6\u6700\u60F3\u8D95\u4E0A\u7684\u4EBA\u3002"
    ];
    lines.forEach((line) => {
      const el = document.createElement("div");
      el.textContent = line || "\u00A0";
      dom.resultBody.appendChild(el);
    });
  }, 4000);
}

/* ════════════════════════════════════════════════
   攝影機系統
   ════════════════════════════════════════════════ */
const camTarget = new THREE.Vector3();
const camPos    = new THREE.Vector3();

function updateCamera(dt) {
  if (state.phase === "intro") return;

  if (state.phase === "running" || state.phase === "sprint2") {
    const behind = 6;
    const height = 3.5;
    const fovTarget = state.sprinting ? 68 : 58;
    camera.fov = THREE.MathUtils.lerp(camera.fov, fovTarget, dt * 3);
    camera.updateProjectionMatrix();

    camPos.set(
      father.position.x * 0.3,
      height,
      father.position.z + behind
    );
    camTarget.set(father.position.x, 1.2, father.position.z - 8);

    camera.position.lerp(camPos, dt * 5);
    camera.lookAt(camTarget);

    if (state.cameraShake > 0) {
      camera.position.x += (Math.random() - 0.5) * state.cameraShake * 0.1;
      camera.position.y += (Math.random() - 0.5) * state.cameraShake * 0.05;
      state.cameraShake *= 0.9;
      if (state.cameraShake < 0.01) state.cameraShake = 0;
    }
  }

  if (state.phase === "grabbed") {
    camPos.set(father.position.x + 2, 2, father.position.z + 2);
    camera.position.lerp(camPos, dt * 3);
    camera.lookAt(father.position.x, 1, father.position.z);
  }

  if (state.phase === "victory") {
    camPos.set(father.position.x + 3, 3, father.position.z + 6);
    camera.position.lerp(camPos, dt * 0.5);
    camera.lookAt(father.position.x, 1.2, father.position.z);
  }

  if (state.phase === "fail") {
    camPos.set(father.position.x, 4, father.position.z + 12);
    camera.position.lerp(camPos, dt * 1);
    camera.lookAt(trainNorth.position.x, 2, trainNorth.position.z);
  }
}

/* ════════════════════════════════════════════════
   NPC 微動 + idle animation
   ════════════════════════════════════════════════ */
function updateNPCs(dt) {
  for (const npc of npcs) {
    const d = npc.userData;
    d.wobblePhase += d.wobbleSpeed * dt;
    npc.position.x = d.baseX + Math.sin(d.wobblePhase) * 0.15;

    /* Idle leg/arm sway */
    const sway = Math.sin(d.wobblePhase * 1.5) * 0.08;
    if (d.leftLeg) d.leftLeg.rotation.x = sway;
    if (d.rightLeg) d.rightLeg.rotation.x = -sway;
    if (d.leftArm) d.leftArm.rotation.x = -sway * 0.5;
    if (d.rightArm) d.rightArm.rotation.x = sway * 0.5;
  }
}

/* ════════════════════════════════════════════════
   火車離站動畫
   ════════════════════════════════════════════════ */
function updateTrainLeave(dt) {
  if (state.trainNorthLeaving) {
    trainNorth.position.z += dt * 15;
  }
}

/* ════════════════════════════════════════════════
   主迴圈
   ════════════════════════════════════════════════ */
const gameClock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  {
  const dt = Math.min(gameClock.getDelta(), 0.05);
  state.clock += dt;

  mainLight.position.z = father.position.z;
  mainLight.target.position.z = father.position.z;
  warmFill.position.z = father.position.z;

  if (!state.gotDaughter && daughter.parent === scene) {
    const beaconLight = daughter.children.find(c => c.isLight);
    if (beaconLight) beaconLight.intensity = 1.5 + Math.sin(state.clock * 4) * 0.8;
  }

  switch (state.phase) {
    case "intro":
      updateIntro(dt);
      updateDoors();
      break;
    case "running":
    case "sprint2":
      updateGame(dt);
      updateDoors();
      updateNPCs(dt);
      updateCamera(dt);
      break;
    case "grabbed":
      updateDoors();
      updateCamera(dt);
      break;
    case "victory":
      updateCamera(dt);
      updateDoors();
      break;
    case "fail":
      updateTrainLeave(dt);
      updateDoors();
      updateCamera(dt);
      break;
  }

  updateNarrative(dt);
  renderer.render(scene, camera);
  }
}

/* ════════════════════════════════════════════════
   初始化與事件
   ════════════════════════════════════════════════ */
function init() {
  buildPlatform();
  setupTrains();
  buildCharacters();
  spawnPowerups();
  spawnLuggage();
  createDoorMarker();
  detectMobile();
  animate();
}

function resetGame() {
  /* Core state reset */
  state.phase = "title";
  state.clock = 0;
  state.timeLeft = GAME_TIME;
  state.sprint = SPRINT_MAX;
  state.playerZ = PLATFORM_LEN / 2 - 10;
  state.playerX = 0;
  state.sprinting = false;
  state.gotDaughter = false;
  state.introTimer = 0;
  state.narrTimer = 0;
  state.cameraShake = 0;
  state.heartRate = 60;
  state.trainSouthArrived = false;
  state.trainNorthArrived = false;
  state.trainNorthDoorOpen = false;
  state.trainNorthLeaving = false;
  state.doorPhase = 0;

  /* Power-up state reset */
  state.riceBallTimer = 0;
  state.coffeeTimer = 0;
  state.collisionSlowTimer = 0;
  state.ultimateUsed = false;
  state.ultimateTimer = 0;
  state.pickupNotifyTimer = 0;
  sprint2HintShown = false;

  /* Jump state reset */
  state.jumpY = 0;
  state.jumpVel = 0;
  state.isJumping = false;

  /* Luggage state reset */
  state.luggageSlowTimer = 0;

  /* Audio reset */
  nextBeat = 0;
  bgm.pause();
  bgm.currentTime = 0;
  bgm.volume = 0.3;
  bgmFading = false;

  /* Stop ambient sounds */
  stopAmbientSounds();

  /* Father glow cleanup */
  if (fatherGlowLight && fatherGlowLight.parent) {
    father.remove(fatherGlowLight);
    fatherGlowLight = null;
  }

  /* Position resets */
  father.position.set(0, FATHER_BASE_Y, state.playerZ);
  father.rotation.set(0, 0, 0);

  /* Restore daughter */
  if (daughter.parent === father) {
    father.remove(daughter);
    scene.add(daughter);
  }
  daughter.position.set(1, 0, DAUGHTER_Z);

  /* Train positions */
  trainSouth.position.z = PLATFORM_LEN;
  trainNorth.position.z = -PLATFORM_LEN;

  /* Reset NPC positions */
  for (const npc of npcs) {
    npc.position.x = npc.userData.baseX;
    npc.position.z = npc.userData.baseZ;
    npc.userData.wobblePhase = Math.random() * Math.PI * 2;
  }

  /* Recreate power-ups and luggage */
  resetPowerups();
  resetLuggage();

  /* Door marker */
  if (doorMarker) doorMarker.visible = false;

  /* Clear keyboard states */
  for (const key in keys) keys[key] = false;
  touchJoyX = 0;
  touchJoyY = 0;
  touchSprinting = false;
  touchJumping = false;
  dom.joystickKnob.style.transform = "translate(-50%,-50%)";

  /* DOM resets */
  dom.result.classList.remove("show");
  dom.resultBody.textContent = "";
  dom.hud.style.display = "none";
  dom.sprintWrap.style.display = "none";
  dom.vignette.style.opacity = "0";
  dom.timerText.style.color = "#f39c12";
  dom.narrText.classList.remove("show");
  dom.pickupNotify.classList.remove("show");
  dom.goldFlash.style.opacity = "0";
  dom.buffIndicators.style.display = "none";
  dom.buffIndicators.textContent = "";
  dom.muteBtn.style.display = "none";
  document.body.classList.remove("letterbox-on");

  /* Ultimate button reset */
  dom.ultimateBtn.classList.remove("used");

  /* Title screen reset: remove and re-add animation classes */
  dom.title.style.display = "flex";
  dom.title.classList.remove("hide");

  /* Force re-trigger animations by removing and re-adding children */
  const titleChildren = dom.title.children;
  for (let i = 0; i < titleChildren.length; i++) {
    const child = titleChildren[i];
    const clone = child.cloneNode(true);
    child.parentNode.replaceChild(clone, child);
  }

  footstepTimer = 0;
  introScreechPlayed = false;
}

dom.title.addEventListener("click", () => {
  initAudio();
  /* Start BGM on user gesture */
  bgm.currentTime = 0;
  bgm.volume = 0.3;
  bgm.muted = bgmMuted;
  bgm.play().catch(() => {});
  dom.title.classList.add("hide");
  setTimeout(() => {
    dom.title.style.display = "none";
    startIntro();
  }, 1200);
});

dom.resultRetry.addEventListener("click", () => {
  resetGame();
});

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();

</script>
