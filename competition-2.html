function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function smooth01(v) {
  v = clamp01(v);
  return v * v * (3 - 2 * v);
}

function remap(v, a, b) {
  return clamp01((v - a) / (b - a));
}

function mixVec(a, b, t, out = new THREE.Vector3()) {
  return out.copy(a).lerp(b, t);

function makeTextTexture(lines, options = {}) {
  const scale = 2;
  const width = options.width || 512;
  const height = options.height || 256;
  const canvas = document.createElement('canvas');
  canvas.width = width * scale;
  canvas.height = height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.clearRect(0, 0, width, height);
  const bg = options.background || 'rgba(5,7,10,0.66)';
  if (bg !== 'transparent') {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, width, height);
  }
  if (options.border !== false) {
    ctx.strokeStyle = options.borderColor || 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.strokeRect(4, 4, width - 8, height - 8);
  }
  const list = Array.isArray(lines) ? lines : String(lines).split('\n');
  ctx.textBaseline = 'top';
  ctx.textAlign = options.align || 'left';
  const x = options.align === 'center' ? width / 2 : 24;
  let y = options.y || 22;
  for (let i = 0; i < list.length; i++) {
    const item = list[i];
    const isTitle = i === 0 && options.title !== false;
    ctx.font = `${isTitle ? 700 : 500} ${isTitle ? (options.titleSize || 34) : (options.size || 20)}px "Noto Sans TC", "PingFang TC", sans-serif`;
    ctx.fillStyle = isTitle ? (options.titleColor || '#ffd08b') : (options.color || 'rgba(241,238,230,.86)');
    ctx.fillText(item, x, y);
    y += isTitle ? (options.titleLine || 44) : (options.line || 31);
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

function makeLabelSprite(text, options = {}) {
  const tex = makeTextTexture(text, {
    width: options.width || 256,
    height: options.height || 92,
    background: options.background || 'rgba(5,7,10,.58)',
    borderColor: options.borderColor || 'rgba(121,230,255,.42)',
    titleSize: options.titleSize || 24,
    size: options.size || 17,
    align: options.align || 'center',
    title: options.title ?? true,
    y: options.y || 18
  });
  const mat = new THREE.SpriteMaterial({
    map: tex,
    transparent: true,
    depthWrite: false,
    depthTest: true
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(options.scaleX || 1.2, options.scaleY || 0.42, 1);
  sprite.userData.texture = tex;
  return sprite;
}

function addBox(parent, size, pos, mat, name) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), mat);
  mesh.position.copy(pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.name = name || '';
  parent.add(mesh);
  return mesh;
}

function cylinderBetween(a, b, radius, mat, radial = 10) {
  const dir = tmpV.subVectors(b, a);
  const len = dir.length();
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, len, radial, 1), mat);
  mesh.position.copy(a).addScaledVector(dir, 0.5);
  mesh.quaternion.setFromUnitVectors(up, dir.normalize());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

function addOutline(mesh, color = 0x05070a, scale = 1.035) {
  const outline = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({
    color,
    side: THREE.BackSide,
    transparent: true,
    opacity: 0.86
  }));
  outline.position.copy(mesh.position);
  outline.rotation.copy(mesh.rotation);
  outline.quaternion.copy(mesh.quaternion);
  outline.scale.copy(mesh.scale).multiplyScalar(scale);
  outline.name = `${mesh.name || 'mesh'}_outline`;
  mesh.parent.add(outline);
  outline.renderOrder = -1;
  return outline;
}

function makePlaneTextureMaterial(texture, opacity = 0.88) {
  return new THREE.MeshBasicMaterial({
    map: texture,
    transparent: true,
    opacity,
    side: THREE.DoubleSide,
    depthWrite: false
  });
}

function makeHologramMaterial(colorHex, opacity = 0.45) {
  return new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      time: { value: 0 },
      color: { value: new THREE.Color(colorHex) },
      opacity: { value: opacity }
    },
    vertexShader: `
      varying vec3 vNormalW;
      varying vec3 vWorld;
      varying vec2 vUv;
      uniform float time;
      void main() {
        vUv = uv;
        vec3 p = position;
        p.x += sin(position.y * 18.0 + time * 2.2) * 0.004;
        vec4 world = modelMatrix * vec4(p, 1.0);
        vWorld = world.xyz;
        vNormalW = normalize(mat3(modelMatrix) * normal);
        gl_Position = projectionMatrix * viewMatrix * world;
      }
    `,
    fragmentShader: `
      varying vec3 vNormalW;
      varying vec3 vWorld;
      varying vec2 vUv;
      uniform vec3 color;
      uniform float opacity;
      uniform float time;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorld);
        float rim = pow(1.0 - abs(dot(normalize(vNormalW), viewDir)), 2.4);
        float scan = smoothstep(0.42, 0.52, sin((vWorld.y + time * 0.32) * 42.0) * 0.5 + 0.5);
        float alpha = opacity * (0.18 + rim * 0.92 + scan * 0.08);
        gl_FragColor = vec4(color * (0.65 + rim * 1.4), alpha);
      }
    `
  });
}

const beamMat = new THREE.ShaderMaterial({

  depthWrite: false,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  uniforms: {
    time: { value: 0 },
    progress: { value: 0 },
    colorA: { value: new THREE.Color(0xffd08b) },
    colorB: { value: new THREE.Color(0x79e6ff) }
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float time;
    uniform float progress;
    uniform vec3 colorA;
    uniform vec3 colorB;
    void main() {
      float edge = smoothstep(0.0, 0.18, vUv.x) * smoothstep(1.0, 0.72, vUv.x);
      float fade = smoothstep(0.0, 0.12, vUv.y) * smoothstep(1.0, 0.2, vUv.y);
      float ribs = 0.58 + 0.42 * sin(vUv.y * 40.0 + time * 1.8 + progress * 8.0);
      vec3 col = mix(colorA, colorB, vUv.y);
      gl_FragColor = vec4(col, edge * fade * ribs * 0.16);

});

  `,
  fragmentShader: `

    uniform float time;
    uniform float progress;
    uniform vec3 colorA;
    uniform vec3 colorB;

      vec3 col = mix(colorA, colorB, smoothstep(0.1, 0.95, vUv.x));

function buildDesks() {
  const positions = [];
  for (let rz = 0; rz < 4; rz++) {

      positions.push({
        x: -2.25 + cx * 1.28 + (rz % 2) * 0.12,

  const tops = new THREE.InstancedMesh(topGeo, mats.wood, positions.length);
  const seats = new THREE.InstancedMesh(seatGeo, mats.woodDark, positions.length);
  const backs = new THREE.InstancedMesh(backGeo, mats.woodDark, positions.length);
  const legs = new THREE.InstancedMesh(legGeo, mats.metal, positions.length * 8);
  tops.castShadow = seats.castShadow = backs.castShadow = legs.castShadow = true;
  tops.receiveShadow = seats.receiveShadow = backs.receiveShadow = legs.receiveShadow = true;

  let legIndex = 0;
  positions.forEach((p, i) => {
    dummy.position.set(p.x, 0.78, p.z);
    dummy.rotation.set(0, p.r, 0);
    dummy.scale.set(1, 1, 1);
    dummy.updateMatrix();
    tops.setMatrixAt(i, dummy.matrix);

    dummy.position.set(p.x, 0.42, p.z - 0.62);
    dummy.rotation.set(0, p.r, 0);
    dummy.updateMatrix();
    seats.setMatrixAt(i, dummy.matrix);

    dummy.position.set(p.x, 0.76, p.z - 0.86);
    dummy.rotation.set(-0.12, p.r, 0);
    dummy.updateMatrix();
    backs.setMatrixAt(i, dummy.matrix);

    for (const dz of [-0.22, 0.22]) {
      for (const dx of [-0.33, 0.33]) {
        dummy.position.set(p.x + dx, 0.48, p.z + dz);
        dummy.rotation.set(0, p.r, 0);
        dummy.updateMatrix();
        legs.setMatrixAt(legIndex++, dummy.matrix);
      }
    }
    for (const dz of [-0.16, 0.16]) {
      for (const dx of [-0.17, 0.17]) {
        dummy.position.set(p.x + dx, 0.22, p.z - 0.62 + dz);
        dummy.rotation.set(0, p.r, 0);
        dummy.updateMatrix();
        legs.setMatrixAt(legIndex++, dummy.matrix);
      }
    }
  });

  classroom.add(tops, seats, backs, legs);
  return { positions, tops, seats, backs, legs };
}

  }

  if (options.glasses) {
    const rimMat = new THREE.MeshStandardMaterial({ color: 0x08080a, roughness: 0.3, metalness: 0.15 });
    for (const sx of [-1, 1]) {
      const rim = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.008, 8, 18), rimMat);

  const hairBase = new THREE.Mesh(new THREE.SphereGeometry(options.headRadius || 0.18, 18, 10, 0, Math.PI * 2, 0, Math.PI * 0.62), hairMat);
  hairBase.position.set(0, 1.72, -0.015);
  hairBase.scale.set(0.95, 0.72, 0.9);

  if (options.planeHair) {
    for (let i = 0; i < 7; i++) {
      const blade = new THREE.Mesh(new THREE.ConeGeometry(0.038 - i * 0.002, 0.35 - i * 0.018, 6), hairMat);
      blade.position.set((i - 3) * 0.034, 1.84 + Math.sin(i) * 0.01, -0.1 - Math.abs(i - 3) * 0.008);
      blade.rotation.x = -0.82 + (i - 3) * 0.04;
      blade.rotation.z = (i - 3) * 0.08;
      group.add(blade);
    }
  } else if (options.longHair) {
    const backHair = new THREE.Mesh(new THREE.CapsuleGeometry(0.19, 0.58, 6, 14), hairMat);
    backHair.position.set(0, 1.45, 0.095);
    backHair.scale.set(0.95, 1.0, 0.5);
    group.add(backHair);
    for (const sx of [-1, 1]) {
      const sideHair = new THREE.Mesh(new THREE.CapsuleGeometry(0.055, 0.54, 5, 9), hairMat);
      sideHair.position.set(sx * 0.17, 1.46, -0.04);
      sideHair.rotation.z = sx * 0.12;
      group.add(sideHair);
    }
  }

  const upperArmL = cylinderBetween(new THREE.Vector3(-0.22, 1.27, -0.02), new THREE.Vector3(-0.38, 0.93, -0.08), 0.04, torsoMat, 10);
  const upperArmR = cylinderBetween(new THREE.Vector3(0.22, 1.27, -0.02), new THREE.Vector3(0.38, 0.93, -0.08), 0.04, torsoMat, 10);
  const foreArmL = cylinderBetween(new THREE.Vector3(-0.38, 0.93, -0.08), new THREE.Vector3(-0.32, 0.68, -0.05), 0.036, skinMat, 10);
  const foreArmR = cylinderBetween(new THREE.Vector3(0.38, 0.93, -0.08), new THREE.Vector3(0.32, 0.68, -0.05), 0.036, skinMat, 10);
  group.add(upperArmL, upperArmR, foreArmL, foreArmR);
  group.userData.arms = { upperArmL, upperArmR, foreArmL, foreArmR };

  const hipY = 0.64;
  if (options.skirt) {

    skirt.rotation.y = Math.PI / 4;
    skirt.scale.z = 0.76;
    group.add(skirt);
  }
  for (const sx of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.58, 4, 10), legMat);
    leg.position.set(sx * 0.09, 0.36, 0);
    leg.scale.z = 0.82;
    group.add(leg);
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.055, 0.22), mats.black);
    shoe.position.set(sx * 0.09, 0.04, -0.05);
    group.add(shoe);
  }

  const pick = new THREE.Mesh(new THREE.SphereGeometry(0.58, 12, 8), mats.pick);
  pick.position.set(0, 1.08, 0);
  pick.userData.pickTarget = options.kind;
  group.add(pick);
  pickables.push(pick);

  group.traverse((obj) => {
    if (obj.isMesh) {
      obj.castShadow = obj.material !== mats.pick;
      obj.receiveShadow = obj.material !== mats.pick;
    }
  });

  for (const mesh of [torso, head]) addOutline(mesh, 0x05070a, 1.04);

  if (options.phone) {
    const phone = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.13, 0.025), new THREE.MeshBasicMaterial({ color: 0x121519 }));
    phone.position.set(0.34, 1.36, -0.16);
    phone.rotation.set(-0.25, 0.1, -0.22);
    group.add(phone);
    group.userData.phone = phone;
  }

  return group;
}

function buildParticles() {
  const count = 2400;
  const positions = new Float32Array(count * 3);
  const seeds = new Float32Array(count);
  const colorsAttr = new Float32Array(count * 3);
  const ages = new Float32Array(count);
  const palette = [colors.cyan, colors.hot, colors.warm, colors.violet, colors.green];
  for (let i = 0; i < count; i++) {
    const lane = Math.random();
    let x;
    let z;
    let y;
    if (lane < 0.45) {
      x = -3.1 + Math.random() * 5.7;
      z = -4.85 + Math.random() * 9.8;
      y = 0.35 + Math.random() * 2.25;
    } else if (lane < 0.78) {
      const a = Math.random() * Math.PI * 2;
      const r = 0.35 + Math.random() * 1.1;
      x = 2.35 + Math.cos(a) * r;
      z = -4.15 + Math.sin(a) * r * 0.55;
      y = 1.0 + Math.random() * 1.35;
    } else {
      x = 3.3 + Math.random() * 1.5;
      z = -4.6 + Math.random() * 9.2;
      y = 0.55 + Math.random() * 1.8;
    }
    positions[i * 3 + 0] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;
    seeds[i] = Math.random() * 1000;
    ages[i] = Math.random();
    const c = palette[Math.floor(Math.random() * palette.length)];
    colorsAttr[i * 3 + 0] = c.r;
    colorsAttr[i * 3 + 1] = c.g;
    colorsAttr[i * 3 + 2] = c.b;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));
  geo.setAttribute('aColor', new THREE.BufferAttribute(colorsAttr, 3));
  geo.setAttribute('aAge', new THREE.BufferAttribute(ages, 1));
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      time: { value: 0 },
      progress: { value: 0 },
      pixelRatio: { value: renderer.getPixelRatio() }
    },
    vertexShader: `
      attribute float aSeed;
      attribute vec3 aColor;
      attribute float aAge;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float time;
      uniform float progress;
      uniform float pixelRatio;
      void main() {
        vec3 p = position;
        float pulse = sin(aSeed + time * (0.45 + aAge * 1.2) + progress * 9.0);
        p.x += sin(time * 0.28 + aSeed * 1.71) * 0.05;
        p.y += pulse * 0.04 + progress * 0.08 * sin(aSeed);
        p.z += cos(time * 0.23 + aSeed * 1.37) * 0.05;
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        float nearDoor = smoothstep(0.0, 1.0, progress);
        gl_PointSize = pixelRatio * (2.0 + aAge * 3.6 + nearDoor * 1.4) * (10.0 / max(2.5, -mv.z));
        vColor = aColor;
        vAlpha = 0.20 + 0.45 * (pulse * 0.5 + 0.5);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        vec2 p = gl_PointCoord - 0.5;
        float d = length(p);
        float alpha = smoothstep(0.5, 0.0, d) * vAlpha;
        gl_FragColor = vec4(vColor, alpha);
      }
    `
  });
  const points = new THREE.Points(geo, mat);
  narrative.add(points);
  return { points, mat };
}

function buildTimeShards() {
  const count = 180;
  const geo = new THREE.PlaneGeometry(0.16, 0.82, 1, 4);
  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending,
    uniforms: {
      time: { value: 0 },
      progress: { value: 0 }
    },
    vertexShader: `
      varying vec2 vUv;
      uniform float time;
      void main() {
        vUv = uv;
        vec3 p = position;
        p.x += sin(p.y * 7.0 + time * 1.6) * 0.012;
        #ifdef USE_INSTANCING
          gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(p, 1.0);
        #else
          gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
        #endif
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      uniform float time;
      uniform float progress;
      void main() {
        float edge = smoothstep(0.0, 0.08, vUv.x) * smoothstep(1.0, 0.88, vUv.x);
        float sweep = sin(vUv.y * 18.0 + time * 2.6 + progress * 8.0) * 0.5 + 0.5;
        vec3 col = mix(vec3(1.0, 0.36, 0.48), vec3(0.48, 0.9, 1.0), vUv.y);
        gl_FragColor = vec4(col, edge * (0.05 + sweep * 0.28));
      }
    `
  });
  const shards = new THREE.InstancedMesh(geo, mat, count);
  const meta = [];
  for (let i = 0; i < count; i++) {
    const band = i / count;
    const x = -3.0 + Math.random() * 6.1;
    const z = 5.0 - band * 9.8 + (Math.random() - 0.5) * 0.4;
    const y = 0.45 + Math.random() * 2.2;
    const s = 0.4 + Math.random() * 1.8;
    const yaw = Math.random() * Math.PI;
    meta.push({ x, y, z, s, yaw, band, spin: (Math.random() - 0.5) * 0.45 });
    dummy.position.set(x, y, z);
    dummy.rotation.set(0.08, yaw, 0);
    dummy.scale.set(s, s, s);
    dummy.updateMatrix();
    shards.setMatrixAt(i, dummy.matrix);
  }
  shards.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  shards.frustumCulled = false;  /* animated per-frame, see beads comment */
  shards.userData.meta = meta;
  narrative.add(shards);
  return shards;
}

function positionOnSeniorPath(p) {
  const a = new THREE.Vector3(4.25, 0, 6.08);
  const b = new THREE.Vector3(3.48, 0, 4.15);
  const c = new THREE.Vector3(3.68, 0, 2.0);
  const d = new THREE.Vector3(3.58, 0, -1.4);
  const e = new THREE.Vector3(3.42, 0, -4.15);
  const f = new THREE.Vector3(2.72, 0, -4.25);
  if (p < 0.18) return mixVec(a, b, smooth01(p / 0.18), new THREE.Vector3());
  if (p < 0.37) return b.clone();
  if (p < 0.68) {
    const q = smooth01((p - 0.37) / 0.31);
    const r1 = mixVec(b, c, remap(q, 0, 0.34), new THREE.Vector3());
    const r2 = mixVec(c, d, remap(q, 0.28, 0.72), new THREE.Vector3());
    const r3 = mixVec(d, e, remap(q, 0.66, 1), new THREE.Vector3());
    if (q < 0.34) return r1;
    if (q < 0.72) return r2;
    return r3;
  }
  if (p < 0.86) return mixVec(e, f, smooth01((p - 0.68) / 0.18), new THREE.Vector3());
  return f.clone();
}

function setCharacterYawFromVelocity(group, current, previous, lookAt = null) {
  const dir = lookAt ? tmpV.subVectors(lookAt, current) : tmpV.subVectors(current, previous);
  dir.y = 0;
  if (dir.lengthSq() < 0.0001) return;
  dir.normalize();
  const yaw = Math.atan2(dir.x, dir.z) + Math.PI;
  group.rotation.y = THREE.MathUtils.lerp(group.rotation.y, yaw, 0.1);
}

function updateSeniorPose(p, dt) {
  const now = positionOnSeniorPath(p);
  const prev = positionOnSeniorPath(Math.max(0, p - 0.01));
  senior.position.lerp(now, 1 - Math.pow(0.0001, dt));
  const meetLook = p > 0.68 ? junior.position : null;
  setCharacterYawFromVelocity(senior, now, prev, meetLook);

  const phoneRaise = smooth01(remap(p, 0.18, 0.28)) * (1 - smooth01(remap(p, 0.43, 0.54)));
  const arms = senior.userData.arms;
  if (arms && senior.userData.phone) {
    arms.upperArmR.rotation.z = THREE.MathUtils.lerp(arms.upperArmR.rotation.z, -0.9 * phoneRaise, 0.18);
    arms.foreArmR.rotation.z = THREE.MathUtils.lerp(arms.foreArmR.rotation.z, -1.7 * phoneRaise, 0.18);
    senior.userData.phone.visible = phoneRaise > 0.08;
    senior.userData.phone.position.set(0.34 - phoneRaise * 0.19, 1.08 + phoneRaise * 0.38, -0.16);
  }
  lights.phoneGlow.intensity = 0.3 + phoneRaise * 2.1;
  lights.phoneGlow.position.copy(senior.localToWorld(new THREE.Vector3(0.18, 1.45, -0.18)));
}

function updateJuniorPose(p, time, dt) {
  junior.position.lerp(new THREE.Vector3(2.35, 0, -4.15), 1 - Math.pow(0.0001, dt));
  const targetYaw = p > 0.68 ? -0.92 : -Math.PI / 2;
  junior.rotation.y = THREE.MathUtils.lerp(junior.rotation.y, targetYaw, 0.06);
  const breath = Math.sin(time * 2.0) * 0.012;
  junior.scale.y = 1 + breath;
  eighteenGhost.position.x = -0.18 + Math.sin(time * 1.7) * 0.025;
  eighteenGhost.position.z = 0.22 + Math.cos(time * 1.2) * 0.025;
  eighteenGhost.visible = p > 0.17;
  innerCouncil.visible = p > 0.21;
  innerCouncil.rotation.y = time * 0.34 + p * Math.PI * 0.8;
  for (const m of innerCouncil.userData.members) {
    m.lookAt(camera.position);
    m.rotateY(Math.PI);
  }
}

function updateNarrativeObjects(p, time) {
  beamMat.uniforms.time.value = time;
  beamMat.uniforms.progress.value = p;
  lineMat.uniforms.time.value = time;
  lineMat.uniforms.progress.value = p;
  particles.mat.uniforms.time.value = time;
  particles.mat.uniforms.progress.value = p;
  timeShards.material.uniforms.time.value = time;
  timeShards.material.uniforms.progress.value = p;
  for (const key of Object.keys(shaderMats)) shaderMats[key].uniforms.time.value = time;

  phoneLine.mesh.visible = p > 0.18;
  phoneLine.mesh.material.opacity = 1;
  for (let i = 0; i < phoneLine.beads.count; i++) {
    const t = (i / phoneLine.beads.count + time * 0.08 + p * 0.45) % 1;
    const pt = phoneLine.curve.getPoint(t);
    const scale = (p > 0.18 ? 1 : 0) * (0.55 + Math.sin(time * 5 + i) * 0.18);
    dummy.position.copy(pt);
    dummy.scale.setScalar(scale);
    dummy.updateMatrix();
    phoneLine.beads.setMatrixAt(i, dummy.matrix);
  }
  phoneLine.beads.instanceMatrix.needsUpdate = true;

  const shardMeta = timeShards.userData.meta;
  for (let i = 0; i < shardMeta.length; i++) {
    const m = shardMeta[i];
    const sweep = Math.abs(p - m.band);
    const active = smooth01(1 - Math.min(1, sweep * 5.2));
    dummy.position.set(
      m.x + Math.sin(time * 0.32 + m.band * 18) * active * 0.12,
      m.y + active * 0.32,
      m.z
    );
    dummy.rotation.set(0.08 + active * 0.4, m.yaw + time * m.spin, active * 0.3);
    dummy.scale.setScalar(m.s * (0.45 + active * 0.95));
    dummy.updateMatrix();
    timeShards.setMatrixAt(i, dummy.matrix);
  }
  timeShards.instanceMatrix.needsUpdate = true;

  const paperMeta = paperEchoes.userData.meta;
  const paperPower = smooth01(remap(p, 0.64, 0.96));
  paperEchoes.visible = paperPower > 0.03;
  for (let i = 0; i < paperMeta.length; i++) {
    const m = paperMeta[i];
    const lift = paperPower * (0.25 + m.t * 1.2);
    dummy.position.set(
      m.x + Math.cos(time * 0.7 + m.a) * 0.05,
      m.y + lift + Math.sin(time + m.a) * 0.04,
      m.z + Math.sin(time * 0.5 + m.a) * 0.05
    );
    dummy.rotation.set(time * 0.25 + m.a, time * 0.4 + m.t * 4, Math.sin(time + m.a) * 0.4);
    dummy.scale.setScalar(m.s * (0.65 + paperPower * 0.75));
    dummy.updateMatrix();
    paperEchoes.setMatrixAt(i, dummy.matrix);
  }
  paperEchoes.instanceMatrix.needsUpdate = true;

  speech.bubble.visible = p > 0.36 && p < 0.66;
  speech.quote.visible = p > 0.86;
  if (speech.bubble.visible) speech.bubble.position.y = 2.18 + Math.sin(time * 2.2) * 0.035;
  if (speech.quote.visible) speech.quote.position.y = 2.05 + Math.sin(time * 1.7) * 0.03;

  narrative.userData.commandNote.visible = p > 0.28;
  narrative.userData.commandNote.material.opacity = 0.2 + smooth01(remap(p, 0.28, 0.5)) * 0.66;

  clockFloor.rotation.y = Math.sin(time * 0.15) * 0.03;
}

  if (state.focus === 'senior') {
    const head = senior.localToWorld(new THREE.Vector3(0, 1.58, -0.12));
    const look = p > 0.66 ? junior.localToWorld(new THREE.Vector3(0, 1.55, 0)) : senior.localToWorld(new THREE.Vector3(0, 1.42, -1.6));
    const side = p > 0.66 ? new THREE.Vector3(1.0, 0.55, 1.15) : new THREE.Vector3(-0.65, 0.32, -1.35);
    pos.copy(head).add(side);
    target.copy(look);
  } else if (state.focus === 'junior') {
    const head = junior.localToWorld(new THREE.Vector3(0, 1.56, -0.1));
    pos.copy(head).add(new THREE.Vector3(-1.0, 0.42, 1.38));
    target.copy(senior.localToWorld(new THREE.Vector3(0, 1.5, 0)));
    if (p < 0.6) target.copy(junior.localToWorld(new THREE.Vector3(0, 1.48, -0.55)));
  } else if (state.focus === 'council') {
    const center = junior.localToWorld(new THREE.Vector3(0, 1.82, 0.08));
    const a = performance.now() * 0.00022;
    pos.copy(center).add(new THREE.Vector3(Math.cos(a) * 1.15, 0.45, Math.sin(a) * 1.15));
    target.copy(center);
  } else if (state.focus === 'floorplan') {
    pos.set(0.3, 9.4, 0.25);
    target.set(0.35, 0, -0.35);
  } else {
    const yaw = state.orbitYaw;
    const pitch = state.orbitPitch;
    const d = state.orbitDistance;
    const focusDrift = new THREE.Vector3(1.1 * smooth01(remap(p, 0.52, 0.85)), 0, -2.2 * smooth01(remap(p, 0.38, 0.8)));
    target.add(focusDrift);
    pos.set(
      target.x + Math.sin(yaw) * Math.cos(pitch) * d,
      target.y + Math.sin(pitch) * d,
      target.z + Math.cos(yaw) * Math.cos(pitch) * d
    );
  }
  return { pos, target };
}

function updateCamera(dt) {
  const pose = getCameraPose();
  const t = 1 - Math.pow(0.0006, dt);
  camera.position.lerp(pose.pos, t);
  const currentTarget = tmpV2.set(0, 0, -1).applyQuaternion(camera.quaternion).multiplyScalar(5).add(camera.position);
  currentTarget.lerp(pose.target, t);
  camera.lookAt(currentTarget);
}

function setProgress(v, snap = false) {
  state.targetProgress = clamp01(v);
  if (snap) state.progress = state.targetProgress;
  updateBeatUi();
}

function updateBeatUi() {
  let idx = 0;
  let best = Infinity;
  for (let i = 0; i < beatData.length; i++) {
    const d = Math.abs(state.targetProgress - beatData[i].progress);
    if (d < best) {
      best = d;
      idx = i;
    }
  }
  state.activeBeat = idx;
  for (let i = 0; i < ui.beats.length; i++) ui.beats[i].classList.toggle('active', i === idx);
  ui.timeStamp.textContent = beatData[idx].stamp;
  ui.captionText.textContent = beatData[idx].caption;
  ui.timeSlider.value = String(Math.round(state.targetProgress * 1000));
}

function setBeat(index) {
  const beat = beatData[Math.max(0, Math.min(beatData.length - 1, index))];
  setProgress(beat.progress);
}

function togglePlay() {
  state.playing = !state.playing;
  ui.playBtn.textContent = state.playing ? 'Ⅱ' : '▶';
  ui.playBtn.classList.toggle('active', state.playing);
  ui.toast.textContent = state.playing ? 'PLAY' : 'PAUSED';
  ui.toast.classList.add('show');
  state.pausedToastTimer = 0.55;
}

function updateUiRuntime(dt) {
  if (state.pausedToastTimer > 0) {
    state.pausedToastTimer -= dt;
    if (state.pausedToastTimer <= 0) ui.toast.classList.remove('show');
  }
  ui.modeText.textContent = state.playing ? '自動巡航' : '互動剖面';
}

ui.playBtn.addEventListener('click', togglePlay);
ui.resetBtn.addEventListener('click', () => {
  state.playing = false;
  ui.playBtn.textContent = '▶';
  ui.playBtn.classList.remove('active');
  setFocus('overview');
  setProgress(0, true);
});
ui.timeSlider.addEventListener('input', () => {
  state.playing = false;
  ui.playBtn.textContent = '▶';
  ui.playBtn.classList.remove('active');
  setProgress(Number(ui.timeSlider.value) / 1000);
});
for (const beat of ui.beats) {
  beat.addEventListener('click', () => setBeat(Number(beat.dataset.beat)));
}
for (const btn of ui.focusButtons) {
  btn.addEventListener('click', () => setFocus(btn.dataset.focus));
}

canvas.addEventListener('pointerdown', (event) => {
  state.drag = {
    x: event.clientX,
    y: event.clientY,
    yaw: state.orbitYaw,
    pitch: state.orbitPitch,
    pointerId: event.pointerId
  };
  state.clickMoved = false;
  canvas.setPointerCapture(event.pointerId);
});

canvas.addEventListener('pointermove', (event) => {
  if (!state.drag) return;
  const dx = event.clientX - state.drag.x;
  const dy = event.clientY - state.drag.y;
  if (Math.abs(dx) + Math.abs(dy) > 4) state.clickMoved = true;
  if (state.focus === 'overview') {
    state.orbitYaw = state.drag.yaw - dx * 0.006;
    state.orbitPitch = THREE.MathUtils.clamp(state.drag.pitch + dy * 0.004, 0.16, 1.18);
  }
});

canvas.addEventListener('pointerup', (event) => {
  if (state.drag) {
    try { canvas.releasePointerCapture(state.drag.pointerId); } catch (err) {}
    state.drag = null;
  }
  if (!state.clickMoved) {
    pointerNdc.x = (event.clientX / window.innerWidth) * 2 - 1;
    pointerNdc.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointerNdc, camera);
    const hits = raycaster.intersectObjects(pickables, false);
    if (hits.length && hits[0].object.userData.pickTarget) {
      setFocus(hits[0].object.userData.pickTarget);
    }
  }
});

canvas.addEventListener('wheel', (event) => {
  state.orbitDistance = THREE.MathUtils.clamp(state.orbitDistance + event.deltaY * 0.006, 5.2, 16.5);
}, { passive: true });

window.addEventListener('keydown', (event) => {
  if (event.code === 'Space') {
    event.preventDefault();
    togglePlay();
  } else if (event.code === 'ArrowRight') {
    event.preventDefault();
    setBeat(Math.min(beatData.length - 1, state.activeBeat + 1));
  } else if (event.code === 'ArrowLeft') {
    event.preventDefault();
    setBeat(Math.max(0, state.activeBeat - 1));
  } else if (/^Digit[1-5]$/.test(event.code)) {
    setBeat(Number(event.code.slice(-1)) - 1);
  } else if (event.code === 'KeyO') {
    setFocus('overview');
  } else if (event.code === 'KeyS') {
    setFocus('senior');
  } else if (event.code === 'KeyJ') {
    setFocus('junior');
  } else if (event.code === 'KeyC') {
    setFocus('council');
  } else if (event.code === 'KeyF') {
    setFocus('floorplan');
  }
});

function createPost() {
  const target = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
    samples: 0,
    colorSpace: THREE.SRGBColorSpace
  });
  target.texture.name = 'competition2.sceneTarget';
  const postScene = new THREE.Scene();
  const postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      tDiffuse: { value: target.texture },
      resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      time: { value: 0 },
      progress: { value: 0 },
      intensity: { value: state.postIntensity }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `,
    fragmentShader: `
      varying vec2 vUv;
      uniform sampler2D tDiffuse;
      uniform vec2 resolution;
      uniform float time;
      uniform float progress;
      uniform float intensity;
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }
      void main() {
        vec2 uv = vUv;
        vec2 center = vec2(0.5);
        vec2 d = uv - center;
        float radius = length(d);
        float split = smoothstep(0.42, 1.0, progress);
        float glitch = sin((uv.y + time * 0.09) * 70.0) * 0.0018 * intensity * split;
        float chroma = (0.0015 + radius * 0.003) * intensity * (0.45 + split);
        vec3 col;
        col.r = texture2D(tDiffuse, uv + vec2(chroma + glitch, 0.0)).r;
        col.g = texture2D(tDiffuse, uv).g;
        col.b = texture2D(tDiffuse, uv - vec2(chroma - glitch, 0.0)).b;
        float vignette = smoothstep(0.88, 0.18, radius);
        float grain = hash(uv * resolution.xy + time * 31.0) - 0.5;
        float scan = sin((uv.y * resolution.y) * 1.45) * 0.012;
        vec3 warm = vec3(1.05, 0.94, 0.84);
        vec3 cyan = vec3(0.82, 0.96, 1.08);
        col *= mix(warm, cyan, smoothstep(0.25, 0.85, progress) * 0.55);
        col += grain * 0.035 + scan;
        col *= 0.42 + vignette * 0.72;
        float freezeLine = smoothstep(0.012, 0.0, abs(uv.x - mix(0.18, 0.82, progress)));
        col += freezeLine * vec3(0.4, 0.8, 1.0) * 0.12;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat);
  postScene.add(quad);
  return { target, scene: postScene, camera: postCam, material: mat };
}

const post = createPost();

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  post.target.setSize(w, h);
  post.material.uniforms.resolution.value.set(w, h);
  particles.mat.uniforms.pixelRatio.value = renderer.getPixelRatio();
}

window.addEventListener('resize', resize);

canvas.addEventListener('webglcontextlost', (event) => {
  event.preventDefault();
  ui.captionText.textContent = 'WebGL context lost；請重新整理頁面。';
});

let fpsAcc = 0;
let fpsFrames = 0;
let fpsLast = performance.now();

function updateStats(now) {
  fpsFrames++;
  if (now - fpsLast > 500) {
    const fps = Math.round((fpsFrames * 1000) / (now - fpsLast));
    ui.fpsReadout.textContent = String(fps);
    fpsFrames = 0;
    fpsLast = now;
    const info = renderer.info.render;
    ui.geomReadout.textContent = `${info.calls} calls · ${info.triangles} tri`;
  }
}

function animate() {
  const dt = Math.min(0.05, clock.getDelta());
  const time = clock.elapsedTime;
  if (state.playing) {
    const next = state.targetProgress + dt * 0.058;
    state.targetProgress = next > 1 ? 0 : next;
    updateBeatUi();
  }
  state.progress = THREE.MathUtils.damp(state.progress, state.targetProgress, 5.2, dt);

  updateSeniorPose(state.progress, dt);
  updateJuniorPose(state.progress, time, dt);
  updateNarrativeObjects(state.progress, time);
  updateCamera(dt);
  updateUiRuntime(dt);

  post.material.uniforms.time.value = time;
  post.material.uniforms.progress.value = state.progress;
  post.material.uniforms.intensity.value = state.postIntensity;

  renderer.setRenderTarget(post.target);
  renderer.clear();
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  renderer.render(post.scene, post.camera);

  updateStats(performance.now());
  requestAnimationFrame(animate);
}

setProgress(0, true);
setFocus('overview');
resize();
animate();
</script>
</body>
