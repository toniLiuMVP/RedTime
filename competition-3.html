<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>選手 3 號 · LM402 一眼瞬間 · 意識菜市場</title>
<meta name="description" content="2005/10/17 11:00 LM402 一眼瞬間：穿越時空的五重意識與那一條穿透紅線。">
<meta name="theme-color" content="#0a0c10">
<meta name="color-scheme" content="dark">
<style>
  :root {
    --accent-red: #ff3344;
    --accent-gold: #ffcc33;
    --accent-blue: #33ccff;
    --bg-dark: #0a0c10;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { 
    width: 100%; height: 100%; overflow: hidden; 
    background: var(--bg-dark); color: #f0f0f0; 
    font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    pointer-events: none;
    display: flex; flex-direction: column;
    padding: 30px;
    background: radial-gradient(circle at center, transparent 40%, rgba(10, 12, 16, 0.8) 100%);
  }

  .header { display: flex; justify-content: space-between; align-items: flex-start; }
  .title-group { pointer-events: auto; }
  .main-title { 
    font-size: 24px; font-weight: 300; letter-spacing: 0.2em; 
    color: var(--accent-red); text-shadow: 0 0 10px rgba(255, 51, 68, 0.5);
  }
  .sub-title { font-size: 10px; opacity: 0.6; letter-spacing: 0.4em; margin-top: 5px; text-transform: uppercase; }

  .nav-back {
    pointer-events: auto;
    text-decoration: none; color: #fff; font-size: 12px;
    padding: 8px 16px; border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px; transition: all 0.3s;
  }
  .nav-back:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-red); }

  .narrative-box {
    margin-top: auto; max-width: 600px;
    background: rgba(10, 12, 16, 0.7);
    backdrop-filter: blur(10px);
    padding: 24px; border-left: 3px solid var(--accent-red);
    opacity: 0; transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .narrative-box.active { opacity: 1; transform: translateY(0); }
  .narrative-text { font-size: 16px; line-height: 1.8; letter-spacing: 0.05em; font-weight: 300; }
  .narrative-time { font-size: 10px; margin-bottom: 10px; opacity: 0.5; font-family: monospace; }

  .controls-hint {
    position: absolute; bottom: 30px; right: 30px;
    font-size: 10px; opacity: 0.4; text-align: right;
    letter-spacing: 0.1em; pointer-events: auto;
  }

  .consciousness-indicator {
    position: absolute; left: 30px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 20px;
  }
  .age-node {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; cursor: pointer; pointer-events: auto;
    transition: all 0.3s; color: rgba(255,255,255,0.5);
  }
  .age-node:hover { border-color: #fff; color: #fff; transform: scale(1.1); }
  .age-node.active { background: #fff; color: var(--bg-dark); box-shadow: 0 0 15px #fff; }

  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
  }

  #glitch-overlay {
    position: fixed; inset: 0; pointer-events: none;
    background: var(--accent-red); opacity: 0;
    z-index: 5; mix-blend-mode: color-dodge;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.05); opacity: 1; }
    100% { transform: scale(1); opacity: 0.8; }
  }
  .pulse { animation: pulse 2s infinite ease-in-out; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="vignette"></div>
<div id="glitch-overlay"></div>

<div id="overlay">
  <div class="header">
    <div class="title-group">
      <h1 class="main-title">一眼瞬間 · 一沙一世界</h1>
      <p class="sub-title">LM402 Consciousness Marketplace</p>
    </div>
    <a href="index.html" class="nav-back">RETROSPECT</a>
  </div>

  <!-- div → button + tabindex + ARIA so keyboard / screen readers can drive 意識切換 (Codex r4) -->
  <div class="consciousness-indicator" id="ageNodes" role="radiogroup" aria-label="意識年紀切換">
    <button class="age-node" type="button" tabindex="0" role="radio" aria-checked="false" data-age="18" title="18 歲：初遇的純粹">18</button>
    <button class="age-node active" type="button" tabindex="0" role="radio" aria-checked="true" data-age="29" title="29 歲：迷失的當下">29</button>
    <button class="age-node" type="button" tabindex="0" role="radio" aria-checked="false" data-age="33" title="33 歲：巔峰的穩定">33</button>
    <button class="age-node" type="button" tabindex="0" role="radio" aria-checked="false" data-age="39" title="39 歲：深沉的理解">39</button>
    <button class="age-node" type="button" tabindex="0" role="radio" aria-checked="false" data-age="49" title="49 歲：智慧的告別">49</button>
  </div>

  <div class="narrative-box" id="narrativeBox">
    <div class="narrative-time" id="narrativeTime">2005/10/17 11:00</div>
    <div class="narrative-text" id="narrativeText"></div>
  </div>

  <div class="controls-hint">
    DRAG TO EXPLORE TIME<br>
    CLICK AGES TO SYNC CONSCIOUSNESS
  </div>
</div>

<script type="module">
import * as THREE from './assets/lm402/vendor-three.module.js';

/*
 * AI 3D 競賽選手 3 號 (Gemini) - 3D Narrative Demo
 * 主題：一眼瞬間的量子糾纏與五重意識
 * 技術：Instanced Shards, GPU Lines, Consciousness Layers Shader
 */

/* CONFIG.ages removed — was unused; the 5 ages are encoded in CONFIG.colors keys
 * + the static HTML age-node buttons (Codex r5). */
const CONFIG = {
  colors: {
    18: 0x33ccff,
    29: 0xff3344,
    33: 0xffcc33,
    39: 0xbb33ff,
    49: 0xe0e0e0
  },
  narratives: [
    { time: "2005/10/17 10:58", text: "利瑪竇大樓 LM401 階梯，學長深吸一口氣，走向 402。" },
    { time: "2005/10/17 11:00", text: "前門，電話響起。那一秒，時間停滯了。" },
    { time: "2005/10/17 11:00:01", text: "「你走到後門。」我在 29 歲的殼裡，聽見 18 歲的自己在大喊。" },
    { time: "2005/10/17 11:00:05", text: "五個時空的我在這間教室重疊。所有的懊悔與希望，都在這一眼。" },
    { time: "2005/10/17 11:00:10", text: "「也太像徐若瑄了吧...」他呆住了。紅線在我們之間，穿透了三十年的時光。" }
  ]
};

class Demo {
  constructor() {
    this.container = document.getElementById('canvas-container');
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x0a0c10);
    this.scene.fog = new THREE.FogExp2(0x0a0c10, 0.05);

    this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.camera.position.set(0, 2, 8);

    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    /* r155+ replaced outputEncoding/sRGBEncoding with outputColorSpace/SRGBColorSpace.
     * Claude r1 audit: this is r179 so the old API is a no-op that warns. */
    this.renderer.outputColorSpace = THREE.SRGBColorSpace;
    this.container.appendChild(this.renderer.domElement);

    this.mouse = new THREE.Vector2();
    this.targetMouse = new THREE.Vector2();
    this.clock = new THREE.Clock();
    this.currentAge = 29;
    this.beatIndex = 0;

    this.init();
    this.animate();
    this.setupEvents();
    this.startNarrative();
  }

  init() {
    this.createClassroom();
    this.createCharacters();
    this.createRedThread();
    this.createEnvironment();
  }

  createClassroom() {
    // LM402 Ghost Room - Wireframe Shards
    const roomSize = { w: 12, h: 5, d: 15 };
    
    // Floor
    const floorGeo = new THREE.PlaneGeometry(roomSize.w, roomSize.d, 20, 20);
    const floorMat = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 },
        activeAgeColor: { value: new THREE.Color(CONFIG.colors[29]) }
      },
      vertexShader: `
        varying vec2 vUv;
        varying float vDist;
        void main() {
          vUv = uv;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          vDist = length(position.xy);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        varying float vDist;
        uniform float time;
        uniform vec3 activeAgeColor;
        void main() {
          float grid = (sin(vUv.x * 60.0) + sin(vUv.y * 60.0)) * 0.5;
          grid = step(0.9, grid);
          float alpha = (1.0 - smoothstep(0.0, 10.0, vDist)) * 0.3;
          gl_FragColor = vec4(activeAgeColor, grid * alpha);
        }
      `,
      transparent: true,
      side: THREE.DoubleSide
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    this.scene.add(floor);
    this.floor = floor;

    // Floating Shards (Classroom structure)
    const shardCount = 200;
    const shardGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const shardMat = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true });
    this.shards = new THREE.InstancedMesh(shardGeo, shardMat, shardCount);
    
    const dummy = new THREE.Object3D();
    for (let i = 0; i < shardCount; i++) {
      dummy.position.set(
        (Math.random() - 0.5) * roomSize.w * 1.5,
        Math.random() * roomSize.h,
        (Math.random() - 0.5) * roomSize.d
      );
      dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      dummy.scale.setScalar(Math.random() * 2 + 0.5);
      dummy.updateMatrix();
      this.shards.setMatrixAt(i, dummy.matrix);
    }
    this.scene.add(this.shards);
  }

  createCharacters() {
    this.chars = new THREE.Group();
    
    // Senior (學長) - 21yo, Pompadour, White T, Jeans
    this.senior = this.createHumanoid(0xffffff, "SENIOR");
    this.senior.position.set(-2, 0, -4); // Near front door
    this.chars.add(this.senior);

    // Junior (學妹) - 29yo Body, Multi-layered Consciousness
    this.juniorGroup = new THREE.Group();
    this.juniorGroup.position.set(2, 0, 4); // Near back door
    
    // Core body (29yo)
    this.juniorBody = this.createHumanoid(CONFIG.colors[29], "JUNIOR_CORE");
    this.juniorGroup.add(this.juniorBody);

    // Consciousness Layers (18, 33, 39, 49)
    this.layers = {};
    [18, 33, 39, 49].forEach(age => {
      const ghost = this.createHumanoid(CONFIG.colors[age], `GHOST_${age}`, true);
      ghost.scale.setScalar(1.05 + (age - 29) * 0.002);
      ghost.visible = false;
      this.juniorGroup.add(ghost);
      this.layers[age] = ghost;
    });

    this.scene.add(this.juniorGroup);
    this.scene.add(this.chars);
  }

  createHumanoid(color, name, isGhost = false) {
    const group = new THREE.Group();
    const mat = new THREE.MeshPhongMaterial({
      color: color,
      transparent: true,
      opacity: isGhost ? 0.2 : 0.8,
      emissive: color,
      emissiveIntensity: isGhost ? 0.5 : 0.1,
      shininess: 100
    });

    // Body
    const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.6, 4, 8), mat);
    torso.position.y = 1.1;
    group.add(torso);

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), mat);
    head.position.y = 1.7;
    group.add(head);

    if (name.includes("SENIOR")) {
      // Pompadour hair (Airplane head)
      const hair = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.4), mat);
      hair.position.set(0, 1.9, 0.1);
      group.add(hair);
      
      // Glasses
      const glasses = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.05), new THREE.MeshBasicMaterial({color: 0x000000}));
      glasses.position.set(0, 1.75, 0.2);
      group.add(glasses);
    }

    // Limbs (Simple procedural)
    const legGeo = new THREE.CapsuleGeometry(0.1, 0.8, 4, 8);
    const lLeg = new THREE.Mesh(legGeo, mat);
    lLeg.position.set(-0.15, 0.45, 0);
    group.add(lLeg);
    
    const rLeg = new THREE.Mesh(legGeo, mat);
    rLeg.position.set(0.15, 0.45, 0);
    group.add(rLeg);

    const armGeo = new THREE.CapsuleGeometry(0.08, 0.7, 4, 8);
    const lArm = new THREE.Mesh(armGeo, mat);
    lArm.position.set(-0.4, 1.2, 0);
    lArm.rotation.z = 0.2;
    group.add(lArm);

    const rArm = new THREE.Mesh(armGeo, mat);
    rArm.position.set(0.4, 1.2, 0);
    rArm.rotation.z = -0.2;
    group.add(rArm);

    return group;
  }

  createRedThread() {
    /* Pre-allocate fixed-resolution tube; update vertex positions in animate()
     * instead of recreating geometry every frame (Claude r2 audit). */
    this.threadSegments = 64;
    this.threadRadialSegs = 8;
    const points = [];
    for (let i = 0; i <= 20; i++) points.push(new THREE.Vector3(0, 0, 0));
    this.threadCurve = new THREE.CatmullRomCurve3(points);
    const geo = new THREE.TubeGeometry(this.threadCurve, this.threadSegments, 0.015, this.threadRadialSegs, false);
    /* _threadBaseGeo cache removed — never read (Codex r5) */
    const mat = new THREE.MeshBasicMaterial({ color: 0xff3344, transparent: true, opacity: 0.8 });
    this.thread = new THREE.Mesh(geo, mat);
    this.scene.add(this.thread);
  }

  createEnvironment() {
    const amb = new THREE.AmbientLight(0xffffff, 0.2);
    this.scene.add(amb);

    const p1 = new THREE.PointLight(0xff3344, 2, 20);
    p1.position.set(2, 2, 4);
    this.scene.add(p1);

    const p2 = new THREE.PointLight(0x33ccff, 2, 20);
    p2.position.set(-2, 2, -4);
    this.scene.add(p2);

    // Particle field
    const pGeo = new THREE.BufferGeometry();
    const pCount = 2000;
    const pos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i++) pos[i] = (Math.random() - 0.5) * 30;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff, transparent: true, opacity: 0.3 });
    this.particles = new THREE.Points(pGeo, pMat);
    this.scene.add(this.particles);
  }

  /* Post-processing intentionally omitted — Three.js r179 built-in tone-map
   * + outputColorSpace gives clean baseline. Glitch overlay handled in CSS.
   * Claude r3 audit: removed empty stub method that was being called unused. */

  setupEvents() {
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('mousemove', (e) => {
      this.targetMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      this.targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    /* Age nodes — click + keyboard, stopPropagation to avoid bubble triggering
     * the global mousedown handler that advances narrative (Codex r1 + r4). */
    document.querySelectorAll('.age-node').forEach(node => {
      const advance = (e) => {
        e.stopPropagation();
        const age = parseInt(node.dataset.age);
        this.switchAge(age);
      };
      node.addEventListener('pointerdown', advance);
      node.addEventListener('keydown', (e) => {
        if (e.code === 'Enter' || e.code === 'Space') advance(e);
      });
    });
  }

  switchAge(age) {
    this.currentAge = age;
    document.querySelectorAll('.age-node').forEach(n => {
      const isActive = parseInt(n.dataset.age) === age;
      n.classList.toggle('active', isActive);
      n.setAttribute('aria-checked', isActive ? 'true' : 'false');
    });

    // Visual feedback
    const color = CONFIG.colors[age];
    this.floor.material.uniforms.activeAgeColor.value.set(color);
    
    // Highlight specific ghost
    Object.keys(this.layers).forEach(k => {
      this.layers[k].visible = (parseInt(k) === age);
    });

    // Glitch effect
    const glitch = document.getElementById('glitch-overlay');
    glitch.style.opacity = '0.3';
    setTimeout(() => glitch.style.opacity = '0', 150);

    // Trigger narrative if relevant
    if (age === 18 && this.beatIndex < 2) this.nextBeat(2);
  }

  startNarrative() {
    this.nextBeat(0);
    
    // Auto-advance some beats for intro
    setTimeout(() => this.nextBeat(1), 4000);
  }

  nextBeat(index) {
    if (index >= CONFIG.narratives.length) return;
    this.beatIndex = index;
    const beat = CONFIG.narratives[index];
    
    const box = document.getElementById('narrativeBox');
    const text = document.getElementById('narrativeText');
    const time = document.getElementById('narrativeTime');

    box.classList.remove('active');
    setTimeout(() => {
      text.innerText = beat.text;
      time.innerText = beat.time;
      box.classList.add('active');
    }, 500);

    // Move camera/characters based on beat
    if (index === 1) {
      // Focus on phone/front door
      this.cameraTargetPos = new THREE.Vector3(-3, 2, -2);
    } else if (index === 2) {
      // Junior realizes
      this.switchAge(18);
    } else if (index === 4) {
      // The Glance
      this.cameraTargetPos = new THREE.Vector3(0, 1.8, 2);
    }
  }

  animate() {
    requestAnimationFrame(() => this.animate());
    /* delta removed — was unused (Codex r5). Use elapsedTime for shader/anim. */
    const time = this.clock.elapsedTime;

    // Smooth mouse follow
    this.mouse.x += (this.targetMouse.x - this.mouse.x) * 0.05;
    this.mouse.y += (this.targetMouse.y - this.mouse.y) * 0.05;

    // Camera movement
    const orbitRadius = 10;
    const targetX = Math.sin(this.mouse.x * 0.5) * orbitRadius;
    const targetZ = Math.cos(this.mouse.x * 0.5) * orbitRadius;
    
    /* cameraTargetPos auto-clears once the lerp settles, so DRAG TO EXPLORE
     * regains control after a scripted beat camera move (Codex r3). */
    if (this.cameraTargetPos) {
      this.camera.position.lerp(this.cameraTargetPos, 0.02);
      if (this.camera.position.distanceTo(this.cameraTargetPos) < 0.05) {
        this.cameraTargetPos = null;
      }
    } else {
      this.camera.position.x += (targetX - this.camera.position.x) * 0.02;
      this.camera.position.z += (targetZ - this.camera.position.z) * 0.02;
      this.camera.position.y += (2 + this.mouse.y * 2 - this.camera.position.y) * 0.02;
    }
    this.camera.lookAt(0, 1, 0);

    // Update characters
    if (this.senior) {
      this.senior.rotation.y = Math.sin(time * 0.5) * 0.2;
      this.senior.position.y = Math.sin(time * 2) * 0.02;
    }
    if (this.juniorGroup) {
      this.juniorGroup.rotation.y = Math.sin(time * 0.3) * 0.1;
      // Breathe effect for all layers
      this.juniorGroup.children.forEach(c => {
        if(c.isGroup) c.scale.setScalar(1 + Math.sin(time * 1.5) * 0.01);
      });
    }

    // Update Red Thread
    this.updateThread(time);

    // Shards movement
    if (this.shards) {
      this.shards.rotation.y += 0.001;
    }

    // Floor shader
    if (this.floor) {
      this.floor.material.uniforms.time.value = time;
    }

    this.renderer.render(this.scene, this.camera);
  }

  updateThread(time) {
    if (!this.thread || !this.senior || !this.juniorGroup) return;

    const start = new THREE.Vector3().setFromMatrixPosition(this.senior.children[0].matrixWorld);
    const end = new THREE.Vector3().setFromMatrixPosition(this.juniorBody.children[0].matrixWorld);

    /* Mutate curve in place (no allocation) — TubeGeometry recreated cost too
     * much per-frame (Claude r2 audit). Build new geometry only every ~6 frames
     * to keep pulse animation but avoid per-frame churn. */
    const newPoints = this.threadCurve.points;
    for (let i = 0; i <= 20; i++) {
      const t = i / 20;
      if (!newPoints[i]) newPoints[i] = new THREE.Vector3();
      newPoints[i].lerpVectors(start, end, t);
      newPoints[i].y += Math.sin(t * Math.PI + time * 2) * 0.5;
      newPoints[i].x += Math.cos(t * Math.PI * 2 + time) * 0.2;
    }
    /* Throttle expensive geometry rebuild to ~10 Hz instead of 60 Hz */
    this._threadAcc = (this._threadAcc || 0) + 1;
    if (this._threadAcc >= 6) {
      this._threadAcc = 0;
      this.thread.geometry.dispose();
      this.thread.geometry = new THREE.TubeGeometry(
        this.threadCurve, this.threadSegments,
        0.01 + Math.sin(time * 5) * 0.005, this.threadRadialSegs, false
      );
    }
  }
}

// Start the show
window.addEventListener('load', () => {
  const demo = new Demo();
  
  // Click handler for narrative progression
  window.addEventListener('mousedown', () => {
    if (demo.beatIndex < CONFIG.narratives.length - 1) {
      demo.nextBeat(demo.beatIndex + 1);
    }
  });
});

</script>
</body>
</html>
