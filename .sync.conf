# RedTime（時間裡的兩個妳）sync.sh 設定檔
# 學自 JYQXZ 範本（5 個專案實證）
# 由 sync.sh 自動讀取

MASTER="/Volumes/Mac Mini M4/Red Time"
WORK="/Volumes/Work/RedTime"
PROJECT_NAME="時間裡的兩個妳 RedTime"
LAUNCHD_LABEL="redtime_autosync"   # 對應 ~/Library/LaunchAgents/com.toni.redtime_autosync.plist + log: ~/Library/Logs/redtime_sync.log

# RedTime 額外排除（陣列形式）
EXCLUDES_EXTRA=(
    --exclude='*.original.js'
    --exclude='*.original.css'
    --exclude='tools/lighthouse-baseline'
    --exclude='tools/smoke-tests'
    --exclude='Thumbs.db'
)
