<script type="module">
import * as THREE from './assets/lm402/vendor-three.module.js';

/* ===================================================================
   一眼瞬間 · 3D 全景 — 程序生成 全角色 + 場景物品
   ===================================================================
   - 完全程序生成 (procedural) 不依賴外部 GLB / 貼圖
   - 角色 6 個: 學長 / 學妹 / 4 同學 — 多 part humanoid mesh
   - 場景物品: 8 桌椅 array + 黑板 + LM402 標牌 + 紙條 + 機車不在此 demo
   - shader: 5 個 custom GLSL (紅線 / 塵粒 / 髮絲 / 皮膚 fresnel / 後製合成)
   - post-processing: 多 pass (亮度抽取 + 兩向 Gaussian blur + 合成)
   =================================================================== */

const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.94;
renderer.outputColorSpace = THREE.SRGBColorSpace;
/* Soft shadows — PCF 5x5 kernel for smoother edges than basic shadow map */
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x14100a, 0.042);

const cam = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 80);
cam.position.set(0.4, 1.62, 4.2);
cam.lookAt(0, 1.45, -2);

/* ===================================================================
   程序紋理 — Canvas-based PBR 木地板
   =================================================================== */
function makeWoodCanvas(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 28; i++) {
    const y0 = (i / 28) * size + (Math.random() - 0.5) * 9;
    const hue = 16 + (Math.random() - 0.5) * 10;
    const sat = 36 + Math.random() * 20;
    const lit = 13 + Math.random() * 14;
    ctx.strokeStyle = `hsl(${hue}, ${sat}%, ${lit}%)`;
    ctx.lineWidth = 1.4 + Math.random() * 4;
    ctx.beginPath();
    for (let x = 0; x <= size; x += 4) {
      const wave = Math.sin(x * 0.022 + i * 0.7) * 5 + Math.sin(x * 0.084 + i * 1.4) * 2.4 + (Math.random() - 0.5) * 1.4;
      if (x === 0) ctx.moveTo(x, y0 + wave); else ctx.lineTo(x, y0 + wave);
    }
    ctx.stroke();
  }
  for (let k = 0; k < 7; k++) {
    const cx = Math.random() * size, cy = Math.random() * size;
    const grd = ctx.createRadialGradient(cx, cy, 1, cx, cy, 24);
    grd.addColorStop(0, 'rgba(18,8,4,0.88)'); grd.addColorStop(1, 'rgba(18,8,4,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI * 2); ctx.fill();
  }
  const id = ctx.getImageData(0, 0, size, size);
  for (let p = 0; p < id.data.length; p += 4) {
    const n = (Math.random() - 0.5) * 18;
    id.data[p] = Math.max(0, Math.min(255, id.data[p] + n));
    id.data[p + 1] = Math.max(0, Math.min(255, id.data[p + 1] + n * 0.9));
    id.data[p + 2] = Math.max(0, Math.min(255, id.data[p + 2] + n * 0.7));
  }
  ctx.putImageData(id, 0, 0);
  return c;
}
function makeNormalFromCanvas(srcCanvas, strength) {
  const size = srcCanvas.width;
  const out = document.createElement('canvas'); out.width = out.height = size;
  const sctx = srcCanvas.getContext('2d').getImageData(0, 0, size, size);
  const octx = out.getContext('2d');
  const oid = octx.createImageData(size, size);
  function lum(x, y) { const i = (Math.max(0, Math.min(size-1, y)) * size + Math.max(0, Math.min(size-1, x))) * 4; return (sctx.data[i] + sctx.data[i+1] + sctx.data[i+2]) / 3; }
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const dx = (lum(x+1, y) - lum(x-1, y)) / 255 * strength;
      const dy = (lum(x, y+1) - lum(x, y-1)) / 255 * strength;
      const nz = Math.sqrt(Math.max(0, 1 - dx*dx - dy*dy));
      const i = (y * size + x) * 4;
      oid.data[i] = Math.round((dx*0.5+0.5)*255);
      oid.data[i+1] = Math.round((dy*0.5+0.5)*255);
      oid.data[i+2] = Math.round(nz * 255);
      oid.data[i+3] = 255;
    }
  }
  octx.putImageData(oid, 0, 0);
  return out;
}

const woodCanvas = makeWoodCanvas(512);
const woodTex = new THREE.CanvasTexture(woodCanvas);
woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping;
woodTex.repeat.set(4, 8); woodTex.anisotropy = 8;
woodTex.colorSpace = THREE.SRGBColorSpace;
const woodNormalTex = new THREE.CanvasTexture(makeNormalFromCanvas(woodCanvas, 4.2));
woodNormalTex.wrapS = woodNormalTex.wrapT = THREE.RepeatWrapping;
woodNormalTex.repeat.set(4, 8);

const floorMat = new THREE.MeshStandardMaterial({ map: woodTex, normalMap: woodNormalTex, normalScale: new THREE.Vector2(0.7, 0.7), roughness: 0.62, metalness: 0.06 });
const floorPlainMat = new THREE.MeshStandardMaterial({ color: 0x14100c, roughness: 0.85 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 26), floorMat);
floor.rotation.x = -Math.PI / 2; floor.position.z = -6;

/* ===================================================================
   走廊 + 教室 結構

const wallTrimMat = new THREE.MeshStandardMaterial({ color: 0x261c14, roughness: 0.7 });

wallL.position.set(-5, 1.75, -6); scene.add(wallL);

wallR.position.set(5, 1.75, -6); scene.add(wallR);

/* 走廊腰線 (skirting) */

/* 走廊盡頭窗 (god ray source) */

const windowPanel = new THREE.Mesh(new THREE.PlaneGeometry(3.2, 2.1), windowPanelMat);
windowPanel.position.set(0, 1.85, -18.85); scene.add(windowPanel);
const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.55 });
const wfTop = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.08, 0.12), windowFrameMat);
wfTop.position.set(0, 2.95, -18.84); scene.add(wfTop);
const wfBot = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.08, 0.12), windowFrameMat);
wfBot.position.set(0, 0.78, -18.84); scene.add(wfBot);

/* LM402 教室門 + 標牌 */
const doorMat = new THREE.MeshStandardMaterial({ color: 0x3a2418, roughness: 0.42, metalness: 0.06 });
const doorFront = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.1), doorMat);
doorFront.position.set(4.7, 1.1, -3); scene.add(doorFront);
const doorBack = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.1), doorMat);
doorBack.position.set(4.7, 1.1, -8); scene.add(doorBack);
const doorHandleMat = new THREE.MeshStandardMaterial({ color: 0x8a7044, roughness: 0.3, metalness: 0.62 });
const handleF = new THREE.Mesh(new THREE.SphereGeometry(0.04, 12, 10), doorHandleMat);
handleF.position.set(4.62, 1.1, -2.55); scene.add(handleF);
const handleB = handleF.clone(); handleB.position.set(4.62, 1.1, -7.55); scene.add(handleB);

function makeLM402Sign() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 96;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1a1410'; ctx.fillRect(0, 0, 256, 96);
  ctx.strokeStyle = '#3a2818'; ctx.lineWidth = 4; ctx.strokeRect(2, 2, 252, 92);
  ctx.fillStyle = '#ffd388'; ctx.font = 'bold 48px "DM Mono", monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('LM 402', 128, 50);
  const tex = new THREE.CanvasTexture(c);
  const m = new THREE.Mesh(new THREE.PlaneGeometry(0.85, 0.32), new THREE.MeshBasicMaterial({ map: tex }));
  return m;
}
const sign1 = makeLM402Sign(); sign1.position.set(4.0, 2.55, -3); sign1.rotation.y = -Math.PI / 2; scene.add(sign1);
const sign2 = makeLM402Sign(); sign2.position.set(4.0, 2.55, -8); sign2.rotation.y = -Math.PI / 2; scene.add(sign2);

/* 教室內 (透過 doorBack 看進去) — 簡化背景 wall + 黑板 + 桌椅 */
const classroomWallMat = new THREE.MeshStandardMaterial({ color: 0x1f1812, roughness: 0.78 });
const classWallBack = new THREE.Mesh(new THREE.BoxGeometry(6, 3.5, 0.2), classroomWallMat);
classWallBack.position.set(8, 1.75, -8); classWallBack.rotation.y = -Math.PI / 2;
scene.add(classWallBack);

/* 黑板 */
function makeBlackboardTex() {
  const c = document.createElement('canvas'); c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1c2820'; ctx.fillRect(0, 0, 512, 256);
  /* chalk wisps */
  ctx.strokeStyle = 'rgba(220, 220, 200, 0.18)'; ctx.lineWidth = 1.2;
  for (let i = 0; i < 40; i++) {
    ctx.beginPath();
    const x = Math.random() * 512, y = Math.random() * 256;
    ctx.moveTo(x, y); ctx.lineTo(x + (Math.random()-0.5)*60, y + (Math.random()-0.5)*20);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255, 252, 240, 0.78)'; ctx.font = 'italic 38px serif'; ctx.textBaseline = 'middle';
  ctx.fillText('LM402 — 11:00', 22, 50);
  ctx.font = 'italic 28px serif';
  ctx.fillText('also like 徐若瑄...', 22, 130);
  return c;
}
const blackboardMat = new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(makeBlackboardTex()), roughness: 0.72 });
const blackboard = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 1.2), blackboardMat);
blackboard.position.set(7.85, 1.9, -7); blackboard.rotation.y = -Math.PI / 2; scene.add(blackboard);
const bbFrame = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.32, 2.52), windowFrameMat);
bbFrame.position.set(7.86, 1.9, -7); scene.add(bbFrame);

/* ===================================================================
   程序角色 - Humanoid Mesh Builders
   =================================================================== */

/* ─── 共用 helpers ─── */
/* Skin pore + freckle canvas — subtle micro-variation that picks up under close light */
function makeSkinTexture(baseColor) {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(baseColor);
  const r0 = Math.round(col.r * 255), g0 = Math.round(col.g * 255), b0 = Math.round(col.b * 255);
  ctx.fillStyle = `rgb(${r0}, ${g0}, ${b0})`;
  ctx.fillRect(0, 0, size, size);
  /* pore dots — slightly darker, ~3500 */
  for (let i = 0; i < 3500; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    const k = 0.86 + Math.random() * 0.08;
    const a = 0.04 + Math.random() * 0.06;
    ctx.fillStyle = `rgba(${Math.round(r0*k)}, ${Math.round(g0*k)}, ${Math.round(b0*k)}, ${a})`;
    ctx.beginPath(); ctx.arc(x, y, 0.7 + Math.random() * 1.1, 0, Math.PI * 2); ctx.fill();
  }
  /* lighter highlights — sebum sheen — ~1200 */
  for (let i = 0; i < 1200; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    const k = 1.06 + Math.random() * 0.06;
    const a = 0.025 + Math.random() * 0.04;
    ctx.fillStyle = `rgba(${Math.min(255, Math.round(r0*k))}, ${Math.min(255, Math.round(g0*k))}, ${Math.min(255, Math.round(b0*k))}, ${a})`;
    ctx.beginPath(); ctx.arc(x, y, 0.5 + Math.random() * 0.9, 0, Math.PI * 2); ctx.fill();
  }
  /* freckles cluster on upper-mid (cheek band) — only sparse */
  for (let i = 0; i < 24; i++) {
    const x = 180 + Math.random() * 152;  /* mid-band only */
    const y = 220 + Math.random() * 80;
    ctx.fillStyle = `rgba(${Math.round(r0*0.72)}, ${Math.round(g0*0.66)}, ${Math.round(b0*0.6)}, ${0.22 + Math.random() * 0.18})`;
    ctx.beginPath(); ctx.arc(x, y, 0.9 + Math.random() * 1.3, 0, Math.PI * 2); ctx.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* Cached skin textures keyed by base color (avoid duplicate canvas work per character) */
const _skinTexCache = new Map();
function getSkinTex(baseColor) {
  const k = '' + baseColor;
  if (!_skinTexCache.has(k)) _skinTexCache.set(k, makeSkinTexture(baseColor));
  return _skinTexCache.get(k);
}

/* Skin material with SSS approximation via onBeforeCompile —
 * Fresnel-edge red bleed simulates light scattering through thin tissue (ears, nose tip, edges).
 * Cheaper than real BSSRDF; visually close enough for stylised realism. */
function makeSkinMaterial(baseColor) {
  const col = new THREE.Color(baseColor);
  const mat = new THREE.MeshPhysicalMaterial({
    color: baseColor,
    map: getSkinTex(baseColor),
    roughness: 0.58,
    metalness: 0.02,
    clearcoat: 0.18,           /* very faint dermal sheen */
    clearcoatRoughness: 0.62,
    emissive: col.clone().multiplyScalar(0.05),
    sheen: 0.22,
    sheenColor: new THREE.Color(0xff8d70),  /* warm-edge sheen */
    sheenRoughness: 0.42
  });
  /* SSS injection — Fresnel-weighted red glow on silhouette via opaque_fragment hook (r179).
   * `normal` is in scope after normal_fragment_maps; `vViewPosition` is a Physical-material varying. */
  mat.onBeforeCompile = (shader) => {
    shader.uniforms.uSSSColor = { value: new THREE.Color(0xc05438) };
    shader.uniforms.uSSSStrength = { value: 0.32 };
    shader.fragmentShader = shader.fragmentShader
      .replace('#include <common>',
        '#include <common>\nuniform vec3 uSSSColor;\nuniform float uSSSStrength;')
      .replace('#include <opaque_fragment>',
        'float sssFres = pow(1.0 - max(0.0, dot(normalize(normal), normalize(vViewPosition))), 3.0);\n' +
        'outgoingLight += uSSSColor * uSSSStrength * sssFres;\n' +
        '#include <opaque_fragment>');
  };
  return mat;
}

/* 程序生成虹膜紋路 texture — radial gradient + 隨機 streaks */
function makeIrisTexture(baseHex) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(baseHex);
  const r0 = Math.round(col.r * 255), g0 = Math.round(col.g * 255), b0 = Math.round(col.b * 255);
  /* 環境暈染:深 ↔ 中 ↔ 邊緣暗環 */
  const grd = ctx.createRadialGradient(64, 64, 6, 64, 64, 60);
  grd.addColorStop(0,   `rgb(${Math.round(r0*0.32)}, ${Math.round(g0*0.32)}, ${Math.round(b0*0.32)})`);
  grd.addColorStop(0.55, `rgb(${r0}, ${g0}, ${b0})`);
  grd.addColorStop(0.92, `rgb(${Math.round(r0*0.7)}, ${Math.round(g0*0.7)}, ${Math.round(b0*0.7)})`);
  grd.addColorStop(1,   `rgb(${Math.round(r0*0.25)}, ${Math.round(g0*0.25)}, ${Math.round(b0*0.25)})`);
  ctx.fillStyle = grd; ctx.fillRect(0, 0, 128, 128);
  /* 放射 streak (32 條) */
  ctx.lineWidth = 0.8;
  for (let a = 0; a < 36; a++) {
    const ang = (a / 36) * Math.PI * 2 + (Math.random() - 0.5) * 0.18;
    const inner = 10 + Math.random() * 4;
    const outer = 50 + Math.random() * 8;
    const alpha = 0.18 + Math.random() * 0.3;
    ctx.strokeStyle = `rgba(${Math.min(255, Math.round(r0*1.4))}, ${Math.min(255, Math.round(g0*1.4))}, ${Math.min(255, Math.round(b0*1.4))}, ${alpha})`;
    ctx.beginPath();
    ctx.moveTo(64 + Math.cos(ang) * inner, 64 + Math.sin(ang) * inner);
    ctx.lineTo(64 + Math.cos(ang) * outer, 64 + Math.sin(ang) * outer);
    ctx.stroke();
  }
  /* 邊緣 limbal ring (暗環) */
  ctx.strokeStyle = `rgba(${Math.round(r0*0.3)}, ${Math.round(g0*0.3)}, ${Math.round(b0*0.3)}, 0.55)`;
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.arc(64, 64, 56, 0, Math.PI * 2); ctx.stroke();
  return c;
}

/* 5-layer 真實眼 — sclera + cornea (折射) + iris (procedural) + pupil + eyelashes */
function buildEye(opts, side) {
  const g = new THREE.Group();
  const skinMat = makeSkinMaterial(opts.skinColor || 0xe8c8b0);
  /* sclera (眼白) — 球體 */
  const sclera = new THREE.Mesh(
    new THREE.SphereGeometry(0.026, 18, 14),
    new THREE.MeshStandardMaterial({ color: 0xf8f5ee, roughness: 0.26, metalness: 0.02 })
  );
  g.add(sclera);
  /* 微 redness — sclera 外側淡紅 (vein hint via emissive tint) */
  const veinTint = new THREE.Mesh(
    new THREE.SphereGeometry(0.0258, 14, 10, 0, Math.PI, 0, Math.PI),
    new THREE.MeshStandardMaterial({ color: 0xf8e8d8, roughness: 0.32, transparent: true, opacity: 0.4 })
  );
  veinTint.rotation.y = side * Math.PI / 6;
  g.add(veinTint);
  /* cornea (角膜) — 透明凸起,折射感 */
  const cornea = new THREE.Mesh(
    new THREE.SphereGeometry(0.015, 14, 12, 0, Math.PI * 2, 0, Math.PI / 2),
    new THREE.MeshPhysicalMaterial({
      color: 0xddeef2, transparent: true, opacity: 0.32,
      roughness: 0.05, metalness: 0, transmission: 0.55, ior: 1.376
    })
  );
  cornea.position.z = 0.016;
  g.add(cornea);
  /* iris (虹膜) — 用 procedural texture */
  const irisTex = new THREE.CanvasTexture(makeIrisTexture(opts.eyeColor || 0x4a2a14));
  const iris = new THREE.Mesh(
    new THREE.CircleGeometry(0.0098, 28),
    new THREE.MeshStandardMaterial({ map: irisTex, roughness: 0.34, metalness: 0.08 })
  );
  iris.position.z = 0.022;
  g.add(iris);
  /* pupil (瞳孔) — 黑點 */
  const pupil = new THREE.Mesh(
    new THREE.CircleGeometry(0.0042, 18),
    new THREE.MeshBasicMaterial({ color: 0x040404 })
  );
  pupil.position.z = 0.0224;
  g.add(pupil);
  /* highlight catch — 高光小白點(眼神光) */
  const catchLight = new THREE.Mesh(
    new THREE.CircleGeometry(0.0014, 12),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  catchLight.position.set(-0.0028 * side, 0.003, 0.0225);
  g.add(catchLight);
  /* 上眼瞼 (upper lid) — 厚 sphere segment */
  const upperLid = new THREE.Mesh(
    new THREE.SphereGeometry(0.029, 16, 10, 0, Math.PI * 2, 0, Math.PI / 2.4),
    skinMat
  );
  upperLid.scale.set(1, 0.42, 1);
  upperLid.position.set(0, 0.005, 0.0015);
  g.add(upperLid);
  /* 下眼瞼 (lower lid) — 較薄 */
  const lowerLid = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 16, 10, 0, Math.PI * 2, Math.PI / 1.8, Math.PI / 3),
    skinMat
  );
  lowerLid.scale.set(1, 0.32, 1);
  lowerLid.position.set(0, -0.003, 0.0015);
  g.add(lowerLid);
  /* 眼睫毛 — 6 strand 細短 curved cylinder 朝上 */
  const lashMat = new THREE.MeshBasicMaterial({ color: 0x0a0604 });
  for (let i = 0; i < 6; i++) {
    const t = (i / 5) - 0.5;  /* -0.5 ~ +0.5 */
    const lash = new THREE.Mesh(
      new THREE.CylinderGeometry(0.0006, 0.00018, 0.009, 4),
      lashMat
    );
    lash.position.set(t * 0.024, 0.014, 0.019);
    lash.rotation.x = -0.45;
    lash.rotation.z = t * 0.35;
    g.add(lash);
  }
  g.position.set(side * 0.048, 0.022, 0.105);
  return g;
}

/* sculpted head — 細分 icosahedron + 5 區域 vertex 位移 */
function buildHead(opts) {
  const g = new THREE.Group();
  g.userData.kind = 'head';
  const skinColor = opts.skinColor || 0xe8c8b0;
  const skinMat = makeSkinMaterial(skinColor);
  /* === 1. 雕刻 head shape — start with subdivided icosahedron === */
  const headGeo = new THREE.IcosahedronGeometry(0.13, 4);
  const pos = headGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    /* 縱向 elongate */
    y *= 1.16;
    /* 後腦勺 — z<0 拉長 */
    if (z < 0) z *= 1.18;
    /* 顴骨 cheekbone — 在臉側 y~-0.02, |x|>0.06, z>0.05 推外 */
    if (Math.abs(x) > 0.06 && y > -0.08 && y < 0.05 && z > 0.04) {
      const cheekW = 1 - Math.abs((y + 0.02)) / 0.07;
      x += Math.sign(x) * cheekW * 0.014;
    }
    /* 下巴 jaw — taper bottom inward */
    if (y < -0.04) {
      const t = (0.13 + y) / 0.09;
      const tap = 0.88 + 0.12 * Math.max(0, t);
      x *= tap;
      z *= tap;
    }
    /* 額頭 forehead — 微 flatten */
    if (y > 0.08 && z > 0.07) z *= 0.96;
    /* 眼窩 eye socket — 內凹 */
    const eyeDistL = Math.sqrt((x + 0.05) ** 2 + (y - 0.025) ** 2);
    const eyeDistR = Math.sqrt((x - 0.05) ** 2 + (y - 0.025) ** 2);
    const minD = Math.min(eyeDistL, eyeDistR);
    if (minD < 0.038 && z > 0.07) {
      const amt = (1 - minD / 0.038) * 0.014;
      z -= amt;
    }
    /* 鼻樑 bridge — 中央前推 */
    if (Math.abs(x) < 0.018 && y > -0.04 && y < 0.04 && z > 0.1) {
      z += (1 - Math.abs(y) / 0.04) * 0.013;
    }
    /* 嘴周 (philtrum + 唇下) — 微 inward */
    if (y < -0.04 && y > -0.075 && z > 0.1) z -= 0.006;
    /* 下巴尖 chin — 凸 */
    if (y < -0.08 && Math.abs(x) < 0.04) z += 0.008;
    pos.setXYZ(i, x, y, z);
  }
  headGeo.computeVertexNormals();
  const head = new THREE.Mesh(headGeo, skinMat);
  g.add(head);
  /* === 2. 耳 — 多 part: 外輪廓 + 內凹 === */
  function buildEar(side) {
    const eg = new THREE.Group();
    /* 外耳輪 */
    const outerGeo = new THREE.SphereGeometry(0.028, 12, 10);
    outerGeo.scale(0.8, 1.5, 0.5);
    const outer = new THREE.Mesh(outerGeo, skinMat);
    eg.add(outer);
    /* 內凹 (concha) — 較深陰影 */
    const innerMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(skinColor).multiplyScalar(0.7), roughness: 0.85 });
    const innerGeo = new THREE.SphereGeometry(0.018, 10, 8);
    innerGeo.scale(0.7, 1.2, 0.3);
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.position.set(side * 0.005, 0, 0.012);
    eg.add(inner);
    /* 耳垂 (lobe) */
    const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.012, 8, 8), skinMat);
    lobe.position.set(side * -0.005, -0.028, 0);
    eg.add(lobe);
    eg.position.set(side * 0.135, 0.012, 0);
    return eg;
  }
  g.add(buildEar(-1));
  g.add(buildEar(1));
  /* === 3. 鼻 lathe — 用 LatheGeometry 旋轉 profile 形成立體鼻 === */
  const nosePoints = [
    new THREE.Vector2(0.000, 0.000),
    new THREE.Vector2(0.008, 0.005),
    new THREE.Vector2(0.012, 0.015),
    new THREE.Vector2(0.014, 0.030),
    new THREE.Vector2(0.012, 0.045),
    new THREE.Vector2(0.005, 0.055),
    new THREE.Vector2(0.000, 0.058)
  ];
  const noseGeo = new THREE.LatheGeometry(nosePoints, 18);
  noseGeo.rotateX(Math.PI / 2);
  noseGeo.translate(0, -0.018, 0.13);
  const nose = new THREE.Mesh(noseGeo, skinMat);
  g.add(nose);
  /* 鼻孔 — 兩個小暗點 */
  const nostrilMat = new THREE.MeshStandardMaterial({ color: 0x4a2818, roughness: 0.9 });
  for (let s of [-1, 1]) {
    const nostril = new THREE.Mesh(new THREE.SphereGeometry(0.0035, 8, 6), nostrilMat);
    nostril.position.set(s * 0.007, -0.038, 0.142);
    g.add(nostril);
  }
  /* === 4. 真實眼睛 === */
  const eyeL = buildEye(opts, -1);
  const eyeR = buildEye(opts, 1);
  g.add(eyeL); g.add(eyeR);
  /* === 5. 眉毛 — 多 strand 模擬 (每邊 9 條短 cylinder) === */
  const browMat = new THREE.MeshStandardMaterial({ color: 0x180b04, roughness: 0.78 });
  for (let s of [-1, 1]) {
    for (let i = 0; i < 9; i++) {
      const t = (i / 8) - 0.5;  /* -0.5 ~ +0.5 */
      const strand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.0014, 0.0006, 0.012, 4),
        browMat
      );
      const baseX = s * (0.05 + t * 0.025);
      strand.position.set(baseX, 0.063 + Math.abs(t) * 0.005, 0.122);
      strand.rotation.x = Math.PI / 2;
      strand.rotation.z = s * 0.12 - t * 0.4;
      g.add(strand);
    }
  }
  /* === 6. 嘴 — 上下唇 (兩 curved sliver) + 唇縫 === */
  const lipUpperMat = new THREE.MeshStandardMaterial({ color: 0xb86068, roughness: 0.5 });
  const lipLowerMat = new THREE.MeshStandardMaterial({ color: 0xc66878, roughness: 0.48 });
  /* 上唇 — slight arch */
  const upperLipGeo = new THREE.SphereGeometry(0.022, 14, 8, 0, Math.PI, 0, Math.PI / 2);
  upperLipGeo.scale(1.4, 0.32, 0.55);
  const upperLip = new THREE.Mesh(upperLipGeo, lipUpperMat);
  upperLip.position.set(0, -0.054, 0.124);
  upperLip.rotation.x = -0.15;
  g.add(upperLip);
  /* 下唇 — 較豐潤 */
  const lowerLipGeo = new THREE.SphereGeometry(0.024, 14, 8, 0, Math.PI, Math.PI / 2, Math.PI / 2);
  lowerLipGeo.scale(1.35, 0.42, 0.65);
  const lowerLip = new THREE.Mesh(lowerLipGeo, lipLowerMat);
  lowerLip.position.set(0, -0.064, 0.124);
  g.add(lowerLip);
  /* 唇縫 line */
  const mouthLine = new THREE.Mesh(
    new THREE.BoxGeometry(0.038, 0.0008, 0.001),
    new THREE.MeshBasicMaterial({ color: 0x5a2828 })
  );
  mouthLine.position.set(0, -0.0595, 0.133);
  g.add(mouthLine);
  /* === 7. 下巴陰影 (subtle warm gradient) === */
  const chinShade = new THREE.Mesh(
    new THREE.SphereGeometry(0.118, 16, 10, 0, Math.PI * 2, Math.PI / 2.5, Math.PI / 6),
    new THREE.MeshStandardMaterial({ color: new THREE.Color(skinColor).multiplyScalar(0.78), roughness: 0.88 })
  );
  chinShade.position.y = -0.06;
  g.add(chinShade);
  /* 脖子 connector (subtle skin column) — 已由 body 處理, 此處只 face 區塊 */
  g.userData.eyes = { L: eyeL, R: eyeR };
  return g;
}

/* 學長 飛機頭 — strand-based (60+ 條 cylinder 模擬髮絲), 上翻 quiff 由 strand grouping 形成 */
function buildSeniorHair() {
  const g = new THREE.Group();
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x0a0402, roughness: 0.42, metalness: 0.22 });
  const hairMat2 = new THREE.MeshStandardMaterial({ color: 0x140a04, roughness: 0.45, metalness: 0.18 });
  /* 1. 頭皮 base (緊貼頭骨, 短) */
  const baseGeo = new THREE.SphereGeometry(0.135, 22, 18, 0, Math.PI * 2, 0, Math.PI / 2.4);
  const base = new THREE.Mesh(baseGeo, hairMat);
  base.position.y = 0.003;
  g.add(base);
  /* 2. 飛機頭 quiff — 前髮 strands 上翻立起 */
  const quiffMat = new THREE.MeshStandardMaterial({ color: 0x080300, roughness: 0.4, metalness: 0.28 });
  for (let i = 0; i < 28; i++) {
    const tx = (Math.random() - 0.5) * 0.085;
    const tz = 0.04 + Math.random() * 0.045;
    const len = 0.085 + Math.random() * 0.04;
    const strand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.0025, 0.0009, len, 5),
      quiffMat
    );
    /* 從 額頭 anchor 升起,中央更高 */
    const centerBias = 1 - Math.abs(tx) / 0.045;
    strand.position.set(tx, 0.13 + centerBias * 0.04, tz);
    /* upturn rotation */
    strand.rotation.x = -0.45 - centerBias * 0.18 + (Math.random() - 0.5) * 0.12;
    strand.rotation.z = tx * 1.8 + (Math.random() - 0.5) * 0.12;
    g.add(strand);
  }
  /* 3. 側髮 short trim (兩側 18 strands) */
  for (let s of [-1, 1]) {
    for (let i = 0; i < 18; i++) {
      const yOff = -0.02 + (i / 18) * 0.1;
      const zOff = -0.05 + Math.random() * 0.12;
      const strand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.0018, 0.0007, 0.04 + Math.random() * 0.02, 4),
        hairMat
      );
      strand.position.set(s * (0.118 + Math.random() * 0.02), yOff, zOff);
      strand.rotation.x = (Math.random() - 0.5) * 0.3;
      strand.rotation.z = s * (0.22 + (Math.random() - 0.5) * 0.18);
      g.add(strand);
    }
  }
  /* 4. 後腦勺 strands (30 條) — 沿後半球分布 */
  for (let i = 0; i < 30; i++) {
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
    const yOff = -0.04 + Math.random() * 0.13;
    const r = 0.132 + Math.random() * 0.012;
    const x0 = Math.cos(ang) * r;
    const z0 = Math.sin(ang) * r;
    const strand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.002, 0.0008, 0.045 + Math.random() * 0.02, 4),
      hairMat2
    );
    strand.position.set(x0, yOff, z0);
    strand.rotation.x = (Math.random() - 0.5) * 0.25;
    strand.rotation.z = Math.cos(ang) * 0.45 + (Math.random() - 0.5) * 0.1;
    g.add(strand);
  }
  return g;
}

/* 學妹 長髮 — 60+ 條 strand 從頭頂往背後下垂, 12 條動態 sway 瀏海 */
function buildJuniorHair() {
  const g = new THREE.Group();
  g.userData.kind = 'juniorHair';
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x150a06, roughness: 0.4, metalness: 0.2 });
  const hairMat2 = new THREE.MeshStandardMaterial({ color: 0x1c1108, roughness: 0.42, metalness: 0.18 });
  /* 1. 頭頂 cap (覆蓋頭皮) */
  const cap = new THREE.Mesh(
    new THREE.SphereGeometry(0.142, 24, 18, 0, Math.PI * 2, 0, Math.PI / 1.85),
    hairMat
  );
  cap.position.y = -0.002;
  g.add(cap);
  /* 2. 長髮 strands (50 條 從頭頂後半圈下垂, 動態 sway) */
  const longStrands = [];
  for (let i = 0; i < 50; i++) {
    /* 沿後半圈 (ang 從 -π/2 到 -3π/2 ≡ π/2~3π/2) random */
    const ang = Math.PI / 2 + (Math.random() - 0.5) * 0.4 + ((i / 50) - 0.5) * Math.PI * 1.4;
    const r = 0.135 + Math.random() * 0.018;
    const x0 = Math.cos(ang) * r;
    const z0 = Math.sin(ang) * r;
    /* 長度隨機 0.35~0.50m */
    const len = 0.36 + Math.random() * 0.14;
    const strand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.003, 0.0012, len, 6),
      Math.random() > 0.5 ? hairMat : hairMat2
    );
    strand.position.set(x0, -len / 2 + 0.01, z0);
    /* 微 outward + 微 forward random */
    strand.rotation.x = (Math.random() - 0.5) * 0.18;
    strand.rotation.z = x0 * 0.35 + (Math.random() - 0.5) * 0.12;
    strand.userData.sway = true;
    strand.userData.baseX = x0;
    strand.userData.baseRotZ = strand.rotation.z;
    strand.userData.basePhase = i * 0.13;
    longStrands.push(strand);
    g.add(strand);
  }
  /* 3. 瀏海 (前髮) — 14 條短 strand 從額頭垂下 */
  for (let i = 0; i < 14; i++) {
    const tx = (Math.random() - 0.5) * 0.11;
    const len = 0.06 + Math.random() * 0.04;
    const strand = new THREE.Mesh(
      new THREE.CylinderGeometry(0.0025, 0.001, len, 5),
      hairMat
    );
    strand.position.set(tx, 0.05 + (Math.random() - 0.5) * 0.02, 0.108 + Math.random() * 0.012);
    strand.rotation.x = 0.55 + (Math.random() - 0.5) * 0.25;
    strand.rotation.z = tx * 2.4 + (Math.random() - 0.5) * 0.15;
    g.add(strand);
  }
  /* 4. 髮絲 hint — 兩側更外突幾條 (動態 sway, 框臉的長髮) */
  for (let s of [-1, 1]) {
    for (let i = 0; i < 4; i++) {
      const len = 0.32 + Math.random() * 0.1;
      const strand = new THREE.Mesh(
        new THREE.CylinderGeometry(0.0028, 0.001, len, 5),
        hairMat
      );
      const baseX = s * (0.13 + Math.random() * 0.02);
      strand.position.set(baseX, -len / 2 + 0.03, 0.03 + Math.random() * 0.04);
      strand.rotation.z = s * 0.18 + (Math.random() - 0.5) * 0.1;
      strand.userData.sway = true;
      strand.userData.baseX = baseX;
      strand.userData.baseRotZ = strand.rotation.z;
      strand.userData.basePhase = i * 0.4 + (s > 0 ? Math.PI : 0);
      longStrands.push(strand);
      g.add(strand);
    }
  }
  g.userData.strands = longStrands;
  return g;
}

/* 學長 粗框眼鏡 */
function buildGlasses() {
  const g = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x121212, roughness: 0.3, metalness: 0.48 });
  const lensMat = new THREE.MeshPhysicalMaterial({ color: 0x88a0b8, transparent: true, opacity: 0.25, roughness: 0.1, metalness: 0, transmission: 0.6, ior: 1.4 });
  const lensRimL = new THREE.Mesh(new THREE.TorusGeometry(0.048, 0.012, 10, 20), frameMat);
  lensRimL.position.set(-0.052, 0.028, 0.122); g.add(lensRimL);
  const lensRimR = lensRimL.clone(); lensRimR.position.set(0.052, 0.028, 0.122); g.add(lensRimR);
  /* 鏡片 — slight reflective glass */
  const lensGeo = new THREE.CircleGeometry(0.038, 16);
  const lensL = new THREE.Mesh(lensGeo, lensMat); lensL.position.set(-0.052, 0.028, 0.119); g.add(lensL);
  const lensR = new THREE.Mesh(lensGeo, lensMat); lensR.position.set(0.052, 0.028, 0.119); g.add(lensR);
  /* 鼻樑 */
  const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.028, 0.012, 0.012), frameMat);

  }
  return g;
}

/* 通用 body (上半 + 下半) */
/* Palm + 5 finger cylinders — replaces the previous sphere hand */
function buildHand(skinMat, side) {
  const handG = new THREE.Group();
  /* palm — rounded box (4 segments per side enables vertex smoothing) */
  const palmGeo = new THREE.BoxGeometry(0.062, 0.018, 0.072, 3, 2, 3);
  const ppos = palmGeo.attributes.position;
  for (let i = 0; i < ppos.count; i++) {
    const x = ppos.getX(i), y = ppos.getY(i), z = ppos.getZ(i);
    /* Smooth edges by scaling corner vertices toward an inscribed ellipsoid */
    const nx = x / 0.031, ny = y / 0.009, nz = z / 0.036;
    const d = Math.sqrt(nx*nx + ny*ny + nz*nz);
    if (d > 0.95) {
      const k = 0.95 / d;
      ppos.setXYZ(i, x * (0.85 + 0.15*k), y * (0.85 + 0.15*k), z * (0.85 + 0.15*k));
    }
  }
  palmGeo.computeVertexNormals();
  const palm = new THREE.Mesh(palmGeo, skinMat);
  handG.add(palm);
  /* knuckle ridge — slight bump at top */
  const knuckle = new THREE.Mesh(new THREE.BoxGeometry(0.058, 0.005, 0.018), skinMat);
  knuckle.position.set(0, 0.011, -0.024);
  handG.add(knuckle);
  /* 4 fingers (index→pinky) + thumb */
  const fingerSpecs = [
    /* x offset,  base radius, tip radius, length, z offset (forward = -) */
    { x: -0.022, rB: 0.0075, rT: 0.0058, L: 0.058, z: -0.038, bend: 0.10 },  /* index */
    { x: -0.007, rB: 0.0078, rT: 0.006,  L: 0.062, z: -0.040, bend: 0.08 },  /* middle */
    { x:  0.008, rB: 0.0075, rT: 0.0058, L: 0.058, z: -0.038, bend: 0.10 },  /* ring */
    { x:  0.022, rB: 0.0068, rT: 0.0052, L: 0.048, z: -0.034, bend: 0.14 }   /* pinky */
  ];
  for (const f of fingerSpecs) {
    const fingerG = new THREE.Group();
    const fg = new THREE.CylinderGeometry(f.rT, f.rB, f.L, 8);
    fg.translate(0, -f.L / 2, 0);
    const finger = new THREE.Mesh(fg, skinMat);
    /* slight curl forward */
    finger.rotation.x = Math.PI / 2 + f.bend;
    fingerG.add(finger);
    /* knuckle joint */
    const joint = new THREE.Mesh(new THREE.SphereGeometry(f.rB + 0.0008, 8, 6), skinMat);
    fingerG.add(joint);
    /* nail — small light box at tip */
    const nail = new THREE.Mesh(
      new THREE.BoxGeometry(f.rT * 1.4, 0.0006, f.rT * 1.8),
      new THREE.MeshStandardMaterial({ color: 0xf8e4cf, roughness: 0.32, metalness: 0.08 })
    );
    /* place nail at the curved-forward tip — derived from rotated finger geometry */
    const tipZ = f.z - Math.sin(f.bend) * f.L * 0.6 - Math.cos(f.bend) * 0.001;
    const tipY = -Math.cos(f.bend) * f.L * 0.6 + 0.005;
    nail.position.set(0, tipY, tipZ);
    nail.rotation.x = -0.3 - f.bend;
    fingerG.add(nail);
    fingerG.position.set(f.x, 0.002, f.z * 0.0);  /* fingers attach at palm front */
    fingerG.position.z = f.z;
    handG.add(fingerG);
  }
  /* thumb — offset to side, rotated outward */
  const thumbG = new THREE.Group();
  const thumbGeo = new THREE.CylinderGeometry(0.0062, 0.008, 0.048, 8);
  thumbGeo.translate(0, -0.024, 0);
  const thumb = new THREE.Mesh(thumbGeo, skinMat);
  thumb.rotation.z = -side * 0.6;
  thumb.rotation.x = 1.0;
  thumbG.add(thumb);
  const thumbJoint = new THREE.Mesh(new THREE.SphereGeometry(0.009, 8, 6), skinMat);
  thumbG.add(thumbJoint);
  thumbG.position.set(side * 0.028, -0.005, -0.012);
  handG.add(thumbG);
  return handG;
}

function buildBody(opts) {
  const g = new THREE.Group();
  /* Sheen layer on cloth approximates fabric weave catching grazing light */
  const shirtMat = new THREE.MeshPhysicalMaterial({
    color: opts.shirtColor, roughness: 0.78, metalness: 0.0,
    sheen: 0.45, sheenColor: new THREE.Color(opts.shirtColor).lerp(new THREE.Color(0xffffff), 0.5),
    sheenRoughness: 0.7
  });
  const pantMat = new THREE.MeshPhysicalMaterial({
    color: opts.pantColor, roughness: 0.7, metalness: 0.02,
    sheen: 0.35, sheenColor: new THREE.Color(opts.pantColor).lerp(new THREE.Color(0xffffff), 0.3),
    sheenRoughness: 0.8
  });
  const skinMat = makeSkinMaterial(opts.skinColor || 0xe8c8b0);
  const shoeMat = new THREE.MeshStandardMaterial({ color: opts.shoeColor || 0xf0e8d0, roughness: 0.85 });

  /* 脖子 */
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.05, 0.08, 12), skinMat);
  neck.position.y = 0.32; g.add(neck);
  /* 軀幹 — taper bottom (腰較窄) — add cloth wrinkles via vertex displacement */
  const torsoGeo = new THREE.CylinderGeometry(0.14, opts.female ? 0.108 : 0.124, 0.45, 24, 12);
  /* shirt wrinkles — vertical fold lines + horizontal stretch ripples */
  const tpos = torsoGeo.attributes.position;
  for (let i = 0; i < tpos.count; i++) {
    const x = tpos.getX(i), y = tpos.getY(i), z = tpos.getZ(i);
    const r = Math.sqrt(x*x + z*z);
    if (r < 0.001) continue;
    const ang = Math.atan2(z, x);
    /* vertical folds — 6 around the body, depth varies with height */
    const fold = Math.sin(ang * 6) * 0.0028 * Math.max(0, 1 - Math.abs(y) * 2.2);
    /* horizontal stretch ripple near waist + chest */
    const ripple = Math.sin(y * 18) * 0.0012;
    /* combined inward/outward displacement along radial direction */
    const scl = 1 + (fold + ripple) / r;
    tpos.setXYZ(i, x * scl, y, z * scl);
  }
  torsoGeo.computeVertexNormals();
  const torso = new THREE.Mesh(torsoGeo, shirtMat);
  torso.position.y = 0.05; g.add(torso);
  /* 肩 connect spheres */
  const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(0.075, 14, 12), shirtMat);
  shoulderL.position.set(-0.158, 0.24, 0); g.add(shoulderL);
  const shoulderR = new THREE.Mesh(new THREE.SphereGeometry(0.075, 14, 12), shirtMat);
  shoulderR.position.set(0.158, 0.24, 0); g.add(shoulderR);

  /* 上臂 + 下臂 + 手 */
  function buildArm(side, opts2) {
    const armG = new THREE.Group();
    const upperGeo = new THREE.CylinderGeometry(0.04, 0.038, 0.22, 10);
    const upper = new THREE.Mesh(upperGeo, shirtMat);
    upper.position.y = -0.11; armG.add(upper);
    /* 肘 */
    const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 8), shirtMat);
    elbow.position.y = -0.22; armG.add(elbow);
    /* 下臂 — exposed skin if short sleeves OR same shirt material */
    const lowerMat = opts.shortSleeve ? skinMat : shirtMat;
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.032, 0.21, 10), lowerMat);
    lower.position.y = -0.34; armG.add(lower);
    /* 手 — palm + 5 fingers (replaces previous sphere) */
    const hand = buildHand(skinMat, side);
    hand.position.y = -0.456;
    /* fingers curl forward (downward when arm hangs) */
    hand.rotation.x = 0.1;
    armG.add(hand);
    armG.userData.lower = lower;
    armG.userData.hand = hand;
    armG.position.set(side * 0.158, 0.24, 0);
    return armG;
  }
  const armL = buildArm(-1, opts);
  const armR = buildArm(1, opts);
  /* 學長右手 holding phone — bent up to ear */
  if (opts.pose === 'phoneCall') {
    armR.rotation.x = -0.5;
    armR.rotation.z = -1.2;
  }
  g.add(armL); g.add(armR);

  /* 大腿 + 小腿 + 鞋 */
  function buildLeg(side) {
    const legG = new THREE.Group();
    const upperGeo = new THREE.CylinderGeometry(0.062, 0.055, 0.36, 10);
    const upper = new THREE.Mesh(upperGeo, pantMat);
    upper.position.y = -0.18; legG.add(upper);
    /* 膝 */
    const knee = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 8), pantMat);
    knee.position.y = -0.36; legG.add(knee);
    const lowerGeo = new THREE.CylinderGeometry(0.05, 0.046, 0.34, 10);
    const lowerMat = opts.shorts ? skinMat : pantMat;
    const lower = new THREE.Mesh(lowerGeo, lowerMat);
    lower.position.y = -0.535; legG.add(lower);
    /* 鞋 */
    const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.06, 0.18), shoeMat);
    shoe.position.set(0, -0.74, 0.035); legG.add(shoe);
    /* 鞋帶 hint */
    const lace = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.005, 0.02), new THREE.MeshStandardMaterial({ color: 0x666666 }));
    lace.position.set(0, -0.71, 0.03); legG.add(lace);
    legG.position.set(side * 0.062, -0.18, 0);
    legG.userData.lower = lower;
    legG.userData.shoe = shoe;
    return legG;
  }
  const legL = buildLeg(-1);
  const legR = buildLeg(1);
  g.add(legL); g.add(legR);
  g.userData.armL = armL; g.userData.armR = armR;
  g.userData.legL = legL; g.userData.legR = legR;
  return g;
}

/* ===================================================================
   紅線 from 學長手 to 學妹頭
   =================================================================== */
const redLineUniforms = {
  uTime: { value: 0 },
  uPulse: { value: 0.62 },
  uIntensity: { value: 1.0 }
};
const redLineMat = new THREE.ShaderMaterial({
  uniforms: redLineUniforms,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  vertexShader: `
    varying float vT;
    attribute float aT;
    void main() {
      vT = aT;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uTime; uniform float uPulse; uniform float uIntensity;
    varying float vT;
    void main() {
      float flow = sin(vT * 22.0 - uTime * 2.6) * 0.5 + 0.5;
      float pulse = sin(uTime * 1.4) * 0.5 + 0.5;
      float edge = 1.0 - smoothstep(0.0, 0.4, abs(vT - 0.5) * 2.0);
      vec3 colA = vec3(0.85, 0.12, 0.16);
      vec3 colB = vec3(1.0, 0.32, 0.28);
      vec3 colC = vec3(1.0, 0.88, 0.62);
      vec3 c = mix(colA, colB, flow);
      c = mix(c, colC, pulse * 0.38);
      float alpha = (0.55 + flow * 0.45 + pulse * 0.18) * (0.5 + edge * 0.5) * uIntensity;
      gl_FragColor = vec4(c, alpha);
    }
  `
});
function makeRedLineGeo() {
  const N = 120;
  const positions = new Float32Array(N * 3);
  const tAttrs = new Float32Array(N);
  /* from senior right hand (~1.55, 0.15, 0) world to junior head (~3.0, 1.55, -7.8) */
  const a = new THREE.Vector3(1.75, 1.55, -2.45);
  const b = new THREE.Vector3(3.0, 1.6, -7.8);
  for (let i = 0; i < N; i++) {
    const t = i / (N - 1);
    /* 微弧 + 微擾動 */
    const x = a.x + t * (b.x - a.x) + (Math.random() - 0.5) * 0.02;
    const y = a.y + t * (b.y - a.y) + Math.sin(t * Math.PI) * 0.45;
    const z = a.z + t * (b.z - a.z) + (Math.random() - 0.5) * 0.02;
    positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
    tAttrs[i] = t;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aT', new THREE.BufferAttribute(tAttrs, 1));
  return geo;
}
const redLineGeo = makeRedLineGeo();
const redLine = new THREE.Line(redLineGeo, redLineMat);
scene.add(redLine);

/* ===================================================================
   塵粒 (in beam)
   =================================================================== */
const DUST_N = 320;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_N * 3);
const dustOff = new Float32Array(DUST_N);
for (let i = 0; i < DUST_N; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 8.5;
  dustPos[i * 3 + 1] = Math.random() * 3.4;
  dustPos[i * 3 + 2] = -Math.random() * 18;
  dustOff[i] = Math.random();
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
dustGeo.setAttribute('aOff', new THREE.BufferAttribute(dustOff, 1));
const dustMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uIntensity: { value: 1.0 } },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aOff;
    uniform float uTime;
    varying float vDepth; varying float vOff;
    void main() {
      vOff = aOff;
      vec3 pos = position;
      pos.y += sin(uTime * 0.3 + aOff * 6.28) * 0.12;
      pos.x += cos(uTime * 0.18 + aOff * 4.2) * 0.08;
      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      vDepth = -mv.z;
      gl_Position = projectionMatrix * mv;
      gl_PointSize = (4.0 + aOff * 6.0) * (60.0 / vDepth);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform float uTime; uniform float uIntensity;
    varying float vDepth; varying float vOff;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float soft = 1.0 - smoothstep(0.0, 0.5, d);
      float beamHint = smoothstep(0.0, 1.0, (vOff + sin(uTime * 0.2) * 0.2));
      vec3 c = mix(vec3(0.85, 0.78, 0.62), vec3(1.0, 0.95, 0.78), beamHint);
      float a = soft * (0.16 + beamHint * 0.42) * uIntensity;
      gl_FragColor = vec4(c, a);
    }
  `
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

/* ===================================================================
   體積光 (god rays surrogate)
   =================================================================== */
function makeGodRayLayer(z, opacity, scale) {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 4, 128, 128, 128);
  g.addColorStop(0, 'rgba(255, 235, 180, 0.88)');
  g.addColorStop(0.35, 'rgba(255, 212, 150, 0.42)');
  g.addColorStop(0.7, 'rgba(255, 196, 132, 0.16)');
  g.addColorStop(1, 'rgba(255, 196, 132, 0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, fog: false, opacity: opacity });
  const m = new THREE.Mesh(new THREE.PlaneGeometry(scale, scale), mat);
  m.position.set(0, 1.95, z);
  return m;
}
const godRays = new THREE.Group();
godRays.add(makeGodRayLayer(-16, 0.95, 5.6));
godRays.add(makeGodRayLayer(-12.5, 0.62, 4.4));
godRays.add(makeGodRayLayer(-9, 0.42, 3.6));
godRays.add(makeGodRayLayer(-5.5, 0.28, 2.8));
scene.add(godRays);

/* ===================================================================
   光照 — multi-light 設置
   =================================================================== */
const sun = new THREE.DirectionalLight(0xffd388, 1.55);
sun.position.set(0, 4.5, -15);
sun.target.position.set(0, 1.2, 0);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -7;  sun.shadow.camera.right = 7;
sun.shadow.camera.top = 6;    sun.shadow.camera.bottom = -2;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 28;
sun.shadow.bias = -0.0004;
sun.shadow.normalBias = 0.02;
scene.add(sun, sun.target);
const ambient = new THREE.AmbientLight(0x4a3024, 0.42);
scene.add(ambient);
/* Key light from window */
const keyWin = new THREE.PointLight(0xffd388, 1.2, 18);
keyWin.position.set(0, 2.2, -16);
scene.add(keyWin);
/* Fill light cool (走廊另一頭) */
const fillCool = new THREE.PointLight(0x6a8aa8, 0.42, 14);
fillCool.position.set(0, 2.4, 3);
scene.add(fillCool);
/* Rim light red (從紅線方向 cast) */
const rimRed = new THREE.PointLight(0xff7858, 0.88, 6);
rimRed.position.set(2.0, 1.7, -5);
scene.add(rimRed);
/* 學長 facial fill */
const seniorFace = new THREE.PointLight(0xfff0d8, 0.42, 2.4);
seniorFace.position.set(1.6, 1.7, -1.9);
scene.add(seniorFace);
/* 學妹 facial fill */
const juniorFace = new THREE.PointLight(0xfff0e8, 0.42, 2.4);
juniorFace.position.set(3.0, 1.65, -7.2);
scene.add(juniorFace);

/* ===================================================================
   PostFX (多 pass) — bright extract + 兩向 blur + 合成
   =================================================================== */
class PostFX {
  constructor(renderer) {
    this.renderer = renderer;
    this.rtMain = this.makeRT(1);
    this.rtBlurA = this.makeRT(0.5);
    this.rtBlurB = this.makeRT(0.5);
    this.fsCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    this.fsScene = new THREE.Scene();
    this.fsQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), this.makeBrightMat());
    this.fsScene.add(this.fsQuad);
    this.matBright = this.fsQuad.material;
    this.matBlur = this.makeBlurMat();
    this.matFinal = this.makeFinalMat();
  }
  makeRT(scale) {
    return new THREE.WebGLRenderTarget(
      Math.floor(innerWidth * (devicePixelRatio || 1) * scale),
      Math.floor(innerHeight * (devicePixelRatio || 1) * scale),
      { minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, type: THREE.HalfFloatType }
    );
  }
  resize() {
    this.rtMain.setSize(innerWidth * (devicePixelRatio || 1), innerHeight * (devicePixelRatio || 1));
    this.rtBlurA.setSize(innerWidth * (devicePixelRatio || 1) * 0.5, innerHeight * (devicePixelRatio || 1) * 0.5);
    this.rtBlurB.setSize(innerWidth * (devicePixelRatio || 1) * 0.5, innerHeight * (devicePixelRatio || 1) * 0.5);
  }
  makeBrightMat() {
    return new THREE.ShaderMaterial({
      uniforms: { tDiffuse: { value: null }, uThreshold: { value: 0.74 } },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }',
      fragmentShader: `
        uniform sampler2D tDiffuse; uniform float uThreshold; varying vec2 vUv;
        void main() {
          vec4 c = texture2D(tDiffuse, vUv);
          float lum = dot(c.rgb, vec3(0.299, 0.587, 0.114));
          float w = smoothstep(uThreshold, uThreshold + 0.18, lum);
          gl_FragColor = vec4(c.rgb * w, c.a);
        }
      `
    });
  }
  makeBlurMat() {
    return new THREE.ShaderMaterial({
      uniforms: { tDiffuse: { value: null }, uDir: { value: new THREE.Vector2(1, 0) }, uRes: { value: new THREE.Vector2(innerWidth, innerHeight) } },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }',
      fragmentShader: `
        uniform sampler2D tDiffuse; uniform vec2 uDir; uniform vec2 uRes; varying vec2 vUv;
        void main() {
          vec2 px = uDir / uRes;
          vec4 sum = vec4(0.0);
          sum += texture2D(tDiffuse, vUv - px * 4.0) * 0.05;
          sum += texture2D(tDiffuse, vUv - px * 3.0) * 0.09;
          sum += texture2D(tDiffuse, vUv - px * 2.0) * 0.12;
          sum += texture2D(tDiffuse, vUv - px * 1.0) * 0.15;
          sum += texture2D(tDiffuse, vUv) * 0.18;
          sum += texture2D(tDiffuse, vUv + px * 1.0) * 0.15;
          sum += texture2D(tDiffuse, vUv + px * 2.0) * 0.12;
          sum += texture2D(tDiffuse, vUv + px * 3.0) * 0.09;
          sum += texture2D(tDiffuse, vUv + px * 4.0) * 0.05;
          gl_FragColor = sum;
        }
      `
    });
  }
  makeFinalMat() {
    return new THREE.ShaderMaterial({
      uniforms: {
        tDiffuse: { value: null }, tBloom: { value: null },
        uTime: { value: 0 },
        uBloomStrength: { value: 0.62 }, uChromaStrength: { value: 1.0 }, uGrainStrength: { value: 1.0 }
      },
      vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }',
      fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse; uniform sampler2D tBloom;
        uniform float uTime; uniform float uBloomStrength; uniform float uChromaStrength; uniform float uGrainStrength;
        varying vec2 vUv;
        float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
        void main() {
          vec2 uv = vUv;
          vec2 toCenter = uv - 0.5;
          float dist = length(toCenter);
          float chromaAmt = 0.0028 * uChromaStrength * smoothstep(0.0, 0.7, dist);
          vec2 dir = normalize(toCenter + 1e-5);
          vec3 col;
          col.r = texture2D(tDiffuse, uv - dir * chromaAmt).r;
          col.g = texture2D(tDiffuse, uv).g;
          col.b = texture2D(tDiffuse, uv + dir * chromaAmt).b;
          vec3 bloom = texture2D(tBloom, uv).rgb;
          col += bloom * uBloomStrength;
          col = col / (1.0 + col);
          col = pow(col, vec3(1.0 / 2.2));
          float grain = (hash(uv * 1024.0 + uTime * 60.0) - 0.5) * 0.072 * uGrainStrength;
          col += grain;
          float vig = smoothstep(0.7, 0.42, dist);
          col *= 0.92 + vig * 0.08;
          col.r = col.r * 1.04 + 0.01;
          col.b = col.b * 0.96 - 0.005;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
  }
  render(scene, cam, fx, time) {
    this.renderer.setRenderTarget(this.rtMain);
    this.renderer.clear();
    this.renderer.render(scene, cam);
    if (fx.bloom) {
      this.fsQuad.material = this.matBright;
      this.matBright.uniforms.tDiffuse.value = this.rtMain.texture;
      this.renderer.setRenderTarget(this.rtBlurA);
      this.renderer.render(this.fsScene, this.fsCam);
      this.fsQuad.material = this.matBlur;
      this.matBlur.uniforms.tDiffuse.value = this.rtBlurA.texture;
      this.matBlur.uniforms.uDir.value.set(1, 0);
      this.matBlur.uniforms.uRes.value.set(this.rtBlurA.width, this.rtBlurA.height);
      this.renderer.setRenderTarget(this.rtBlurB);
      this.renderer.render(this.fsScene, this.fsCam);
      this.matBlur.uniforms.tDiffuse.value = this.rtBlurB.texture;
      this.matBlur.uniforms.uDir.value.set(0, 1);
      this.renderer.setRenderTarget(this.rtBlurA);
      this.renderer.render(this.fsScene, this.fsCam);
    }
    this.fsQuad.material = this.matFinal;
    this.matFinal.uniforms.tDiffuse.value = this.rtMain.texture;
    this.matFinal.uniforms.tBloom.value = fx.bloom ? this.rtBlurA.texture : this.rtMain.texture;
    this.matFinal.uniforms.uTime.value = time;
    this.matFinal.uniforms.uBloomStrength.value = fx.bloom ? 0.62 : 0.0;
    this.matFinal.uniforms.uChromaStrength.value = fx.chroma ? 1.0 : 0.0;
    this.matFinal.uniforms.uGrainStrength.value = fx.grain ? 1.0 : 0.0;
    this.renderer.setRenderTarget(null);
    this.renderer.render(this.fsScene, this.fsCam);
  }
}
const postfx = new PostFX(renderer);

/* ===================================================================
   FX toggles + UI
   =================================================================== */
const FX = { floor: true, godRays: true, dust: true, redLine: true, breath: true, hairSway: true, bloom: true, chroma: true, grain: true };
function applyFX() {
  floor.material = FX.floor ? floorMat : floorPlainMat;
  godRays.visible = FX.godRays;
  dust.visible = FX.dust;
  redLine.visible = FX.redLine;
  updateLegendUI();
}
function updateLegendUI() {
  const map = { 1: FX.floor, 2: FX.godRays, 3: FX.dust, 4: FX.redLine, 5: FX.breath, 6: FX.hairSway, 7: FX.bloom, 8: FX.grain };
  document.querySelectorAll('#effectsList .fx-item').forEach(function (el) {
    el.classList.toggle('on', !!map[parseInt(el.dataset.fx, 10)]);
  });
}

let paused = false;
/* Camera lock — sweep (default auto pan) vs junior/senior close-ups (fixed) */
const camLock = { mode: 'sweep' };
const pauseInd = document.getElementById('pauseIndicator');
document.addEventListener('keydown', function (e) {
  switch (e.code) {
    case 'KeyP': paused = !paused; pauseInd.classList.toggle('show', paused); break;
    case 'KeyR':
      camLock.mode = 'sweep';
      cam.position.set(0.4, 1.62, 4.2); cam.lookAt(0, 1.45, -2);
      break;
    case 'KeyC':
      /* close-up on junior — inspect skin SSS / hair strands / hand fingers / cloth wrinkles */
      camLock.mode = 'junior';
      cam.position.set(2.6, 1.55, -7.0);
      cam.lookAt(3.0, 1.5, -7.8);
      break;
    case 'KeyS':
      /* close-up on senior — inspect glasses, pompadour strands, phone-call pose */
      camLock.mode = 'senior';
      cam.position.set(0.7, 1.55, -1.4);
      cam.lookAt(1.6, 1.5, -2.5);
      break;
    case 'Digit1': FX.floor = !FX.floor; applyFX(); break;
    case 'Digit2': FX.godRays = !FX.godRays; applyFX(); break;
    case 'Digit3': FX.dust = !FX.dust; applyFX(); break;
    case 'Digit4': FX.redLine = !FX.redLine; applyFX(); break;
    case 'Digit5': FX.breath = !FX.breath; applyFX(); break;
    case 'Digit6': FX.hairSway = !FX.hairSway; applyFX(); break;
    case 'Digit7': FX.bloom = !FX.bloom; FX.chroma = FX.bloom; applyFX(); break;
    case 'Digit8': FX.grain = !FX.grain; applyFX(); break;
  }
});
document.querySelectorAll('#effectsList .fx-item').forEach(function (el) {
  el.addEventListener('click', function () {
    const n = parseInt(el.dataset.fx, 10);
    const keys = ['', 'floor', 'godRays', 'dust', 'redLine', 'breath', 'hairSway', 'bloom', 'grain'];
    if (n === 7) { FX.bloom = !FX.bloom; FX.chroma = FX.bloom; }
    else if (keys[n]) FX[keys[n]] = !FX[keys[n]];
    applyFX();
  });
});

/* ===================================================================
   主迴圈 — 角色呼吸 + 髮絲 sway + camera breathing
   =================================================================== */
const stats = document.getElementById('stats');
let lastStatsUpdate = 0, frameCount = 0;
function updateStats(now) {
  frameCount++;
  if (now - lastStatsUpdate >= 500) {
    const fps = Math.round((frameCount * 1000) / (now - lastStatsUpdate));
    const tri = renderer.info.render.triangles;
    stats.textContent = 'FPS ' + fps + ' · Tri ' + (tri / 1000).toFixed(1) + 'k · Char 6';
    lastStatsUpdate = now; frameCount = 0;
  }
}

let last = performance.now();
let elapsed = 0;
function loop() {
  const now = performance.now();
  const dt = Math.min(0.06, (now - last) / 1000);
  last = now;
  if (!paused) elapsed += dt;

  redLineUniforms.uTime.value = elapsed;
  dustMat.uniforms.uTime.value = elapsed;

  /* 角色 breathing */
  if (FX.breath) {
    const bb = 1 + Math.sin(elapsed * 1.4) * 0.012;
    [senior, junior].concat(friends).forEach(function (c, i) {
      const phase = i * 0.4;
      const b = 1 + Math.sin(elapsed * 1.4 + phase) * 0.012;
      const body = c.userData.body;
      if (body) body.scale.y = b * (c === junior ? 0.92 : 0.96);
    });
    /* 學長微 head turn */
    senior.userData.head.rotation.y = Math.sin(elapsed * 0.3) * 0.05;
    junior.userData.head.rotation.y = -Math.PI / 16 + Math.sin(elapsed * 0.4) * 0.08;
  }

  /* 學妹髮絲 sway */
  if (FX.hairSway && junior.userData.hair && junior.userData.hair.userData.strands) {
    junior.userData.hair.userData.strands.forEach(function (s, idx) {
      s.position.x = s.userData.baseX + Math.sin(elapsed * 0.8 + s.userData.basePhase) * 0.012;
      s.rotation.z = Math.sin(elapsed * 0.6 + s.userData.basePhase) * 0.06;
    });
  }

  /* camera breathing — 緩慢漂浮 + 微 dolly (sweep mode only; close-ups stay fixed) */
  if (camLock.mode === 'sweep') {
    cam.position.x = 0.4 + Math.sin(elapsed * 0.18) * 0.18;
    cam.position.y = 1.62 + Math.sin(elapsed * 0.32) * 0.045;
    cam.position.z = 4.2 + Math.sin(elapsed * 0.12) * 0.4;
    cam.lookAt(Math.sin(elapsed * 0.1) * 0.18, 1.45, -2);
  } else if (camLock.mode === 'junior') {
    /* micro hover for life — re-lookAt every frame */
    cam.position.x = 2.6 + Math.sin(elapsed * 0.5) * 0.04;
    cam.position.y = 1.55 + Math.sin(elapsed * 0.7) * 0.015;
    cam.lookAt(3.0, 1.5, -7.8);
  } else if (camLock.mode === 'senior') {
    cam.position.x = 0.7 + Math.sin(elapsed * 0.5) * 0.04;
    cam.position.y = 1.55 + Math.sin(elapsed * 0.7) * 0.015;
    cam.lookAt(1.6, 1.5, -2.5);
  }

  /* god ray 平面 always face camera */
  godRays.children.forEach(function (layer, i) {
    layer.material.opacity = (i === 0 ? 0.95 : i === 1 ? 0.62 : i === 2 ? 0.42 : 0.28) * (0.85 + Math.sin(elapsed * 0.4 + i * 0.7) * 0.15);
    layer.lookAt(cam.position);
  });

  postfx.render(scene, cam, FX, elapsed);
  updateStats(now);
  requestAnimationFrame(loop);
}
applyFX();
loop();

addEventListener('resize', function () {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  postfx.resize();
});

window.__TECH_DEMO__ = {
  cam: cam, scene: scene, postfx: postfx, fx: FX,
  senior: senior, junior: junior, friends: friends,
  applyFX: applyFX,
  version: 'v2-full-cast'
};
</script>
</body>
</html>
